<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agar Clone</title>
<style>
body{margin:0;overflow:hidden;background:#f2f2f2;font-family:Arial}
canvas{display:block}
#hud{
position:fixed;
top:10px;
right:15px;
text-align:right;
font-size:14px;
}
#info{
position:fixed;
left:10px;
top:10px;
background:rgba(0,0,0,0.6);
color:white;
padding:8px;
font-size:12px;
}
</style>
</head>
<body>

<div id="info">
<b>HOW TO PLAY</b><br><br>
Mouse: Move<br>
SPACE: Split<br>
Eat smaller cells<br>
Avoid bigger cells
</div>

<div id="hud"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

const worldSize = 4000;

let camera={x:0,y:0};
let mouse={x:0,y:0};
canvas.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

class Cell{
constructor(x,y,mass,color,player=false){
this.x=x;
this.y=y;
this.mass=mass;
this.color=color;
this.player=player;
this.mergeCooldown=0;
}
get radius(){
return Math.sqrt(this.mass)*4;
}
draw(){
ctx.beginPath();
ctx.fillStyle=this.color;
ctx.arc(this.x-camera.x,this.y-camera.y,this.radius,0,Math.PI*2);
ctx.fill();
}
update(){
if(this.player){
let dx = mouse.x - canvas.width/2;
let dy = mouse.y - canvas.height/2;
let angle = Math.atan2(dy,dx);
let speed = 200/this.mass;
this.x += Math.cos(angle)*speed;
this.y += Math.sin(angle)*speed;
this.x=Math.max(0,Math.min(worldSize,this.x));
this.y=Math.max(0,Math.min(worldSize,this.y));
}
if(this.mergeCooldown>0)this.mergeCooldown--;
}
}

let playerCells=[new Cell(worldSize/2,worldSize/2,40,"lime",true)];
let foods=[];
let bots=[];

function spawnFood(){
for(let i=0;i<300;i++){
foods.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
mass:5
});
}
}
spawnFood();

function spawnBots(){
for(let i=0;i<20;i++){
bots.push(new Cell(Math.random()*worldSize,Math.random()*worldSize,rand(30,120),"red"));
}
}
spawnBots();

function rand(a,b){return Math.random()*(b-a)+a;}

document.addEventListener("keydown",e=>{
if(e.code==="Space") split();
});

function split(){
let newCells=[];
playerCells.forEach(cell=>{
if(cell.mass>20){
cell.mass/=2;
let angle=Math.atan2(mouse.y-canvas.height/2,mouse.x-canvas.width/2);
let newCell=new Cell(
cell.x+Math.cos(angle)*cell.radius,
cell.y+Math.sin(angle)*cell.radius,
cell.mass,
"lime",
true
);
newCell.mergeCooldown=200;
newCells.push(newCell);
}
});
playerCells.push(...newCells);
}

function collision(){
playerCells.forEach(cell=>{
foods.forEach((food,i)=>{
let dx=cell.x-food.x;
let dy=cell.y-food.y;
if(Math.sqrt(dx*dx+dy*dy)<cell.radius){
cell.mass+=food.mass;
foods.splice(i,1);
foods.push({
x:Math.random()*worldSize,
y:Math.random()*worldSize,
mass:5
});
}
});
});

bots.forEach((bot,b)=>{
playerCells.forEach((cell,c)=>{
let dx=cell.x-bot.x;
let dy=cell.y-bot.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist < cell.radius && cell.mass>bot.mass*1.1){
cell.mass+=bot.mass;
bots.splice(b,1);
spawnBots();
}
if(dist < bot.radius && bot.mass>cell.mass*1.1){
alert("Game Over");
location.reload();
}
});
});
}

function mergeSystem(){
for(let i=0;i<playerCells.length;i++){
for(let j=i+1;j<playerCells.length;j++){
let a=playerCells[i];
let b=playerCells[j];
let dx=a.x-b.x;
let dy=a.y-b.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist < a.radius && a.mergeCooldown<=0 && b.mergeCooldown<=0){
a.mass+=b.mass;
playerCells.splice(j,1);
}
}
}
}

function updateCamera(){
let avgX=0,avgY=0;
playerCells.forEach(c=>{
avgX+=c.x;
avgY+=c.y;
});
avgX/=playerCells.length;
avgY/=playerCells.length;

camera.x=avgX-canvas.width/2;
camera.y=avgY-canvas.height/2;
}

function drawGrid(){
ctx.strokeStyle="#ddd";
for(let x=0;x<worldSize;x+=100){
ctx.beginPath();
ctx.moveTo(x-camera.x,0-camera.y);
ctx.lineTo(x-camera.x,worldSize-camera.y);
ctx.stroke();
}
for(let y=0;y<worldSize;y+=100){
ctx.beginPath();
ctx.moveTo(0-camera.x,y-camera.y);
ctx.lineTo(worldSize-camera.x,y-camera.y);
ctx.stroke();
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawGrid();

foods.forEach(food=>{
ctx.beginPath();
ctx.fillStyle="orange";
ctx.arc(food.x-camera.x,food.y-camera.y,4,0,Math.PI*2);
ctx.fill();
});

bots.forEach(bot=>bot.draw());
playerCells.forEach(cell=>cell.draw());

document.getElementById("hud").innerHTML=
"Cells: "+playerCells.length+"<br>"+
"Mass: "+Math.floor(playerCells.reduce((a,b)=>a+b.mass,0));
}

function gameLoop(){
playerCells.forEach(c=>c.update());
collision();
mergeSystem();
updateCamera();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
