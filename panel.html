<!DOCTYPE html>
<html>
<head>
    <title>GameArea Panel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
<div class="logo">GameArea</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="request.html">Request Bot</a>
<a href="panel.html">Panel</a>
</div>
</div>

<header>
🎛 GameArea Control Panel
</header>

<div class="container">

<div class="card">
<h3>Bot Name</h3>
<p>GameArea MusicBot</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status" class="neon-text">Online</p>
</div>

<div class="card">
<h3>Users Listening</h3>
<p id="users">12</p>
</div>

<div class="card">
<h3>Now Playing</h3>
<p id="song">Alan Walker - Fade</p>
</div>

</div>

<footer>
GameArea TS3 Service Panel
</footer>

<script>

// status değişimi
let status = document.getElementById("status");
setInterval(()=>{
    status.textContent =
        status.textContent === "Online" ? "Online" : "Online";
},4000);

// kullanıcı sayısı simülasyonu
let users = document.getElementById("users");
setInterval(()=>{
    users.textContent = Math.floor(Math.random()*30)+1;
},3000);

// şarkı listesi
const songs = [
"Alan Walker - Fade",
"NEFFEX - Fight Back",
"TheFatRat - Unity",
"Elektronomia - Sky High",
"Different Heaven - Safe & Sound"
];

let song = document.getElementById("song");

setInterval(()=>{
    song.textContent =
        songs[Math.floor(Math.random()*songs.length)];
},5000);

</script>

</body>
</html>
