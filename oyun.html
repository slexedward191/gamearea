<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie Team 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-family:Arial;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}
#crosshair{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:20px;
color:white;
}
</style>
</head>
<body>

<div id="hud">HP: 100<br>Score: 0</div>
<div id="crosshair">+</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* IŞIK */
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

/* ZEMİN */
let floorGeo = new THREE.PlaneGeometry(200,200);
let floorMat = new THREE.MeshStandardMaterial({color:0x222222});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* PLAYER */
let player = {
hp:100,
speed:0.15,
score:0
};

camera.position.set(0,2,5);

/* CONTROLS */
let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* ZOMBIE CLASS */
let zombies = [];

function spawnZombie(){
let geo = new THREE.BoxGeometry(1,2,1);
let mat = new THREE.MeshStandardMaterial({color:0x00ff00});
let zombie = new THREE.Mesh(geo,mat);

zombie.position.set(
(Math.random()-0.5)*50,
1,
(Math.random()-0.5)*50
);

zombie.hp = 50;
scene.add(zombie);
zombies.push(zombie);
}

setInterval(spawnZombie,2000);

/* SHOOT */
document.addEventListener("click",()=>{
let raycaster = new THREE.Raycaster();
raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
let intersects = raycaster.intersectObjects(zombies);

if(intersects.length>0){
let hit = intersects[0].object;
hit.hp -= 25;
if(hit.hp<=0){
scene.remove(hit);
zombies.splice(zombies.indexOf(hit),1);
player.score += 10;
}
}
});

/* UPDATE */
function update(){

/* Movement */
if(keys["w"]) camera.position.z -= player.speed;
if(keys["s"]) camera.position.z += player.speed;
if(keys["a"]) camera.position.x -= player.speed;
if(keys["d"]) camera.position.x += player.speed;

/* Zombies follow */
zombies.forEach(z=>{
let dx = camera.position.x - z.position.x;
let dz = camera.position.z - z.position.z;
let dist = Math.sqrt(dx*dx+dz*dz);

z.position.x += dx/dist * 0.03;
z.position.z += dz/dist * 0.03;

if(dist<1.5){
player.hp -= 0.1;
if(player.hp<=0){
alert("Öldün! Skor: "+player.score);
location.reload();
}
}
});

/* HUD */
document.getElementById("hud").innerHTML =
"HP: "+Math.floor(player.hp)+
"<br>Score: "+player.score;

}

/* LOOP */
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
