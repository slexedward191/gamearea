<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hamster Arena</title>
<style>
body{margin:0;overflow:hidden;background:#0f172a;font-family:Arial}
canvas{display:block}
.ui{position:fixed;top:20px;right:20px;color:white;text-align:right}
.bar{width:220px;height:18px;background:#334155;border-radius:8px;overflow:hidden;margin-bottom:6px;position:relative}
.fill{height:100%}
.hpText{position:absolute;width:100%;text-align:center;font-size:12px;top:1px}
.topLeft{position:fixed;top:20px;left:20px}
.bottomRight{position:fixed;bottom:20px;right:20px;background:#1e293b;padding:15px;border-radius:10px;color:white}
button{padding:10px 15px;border:none;border-radius:6px;cursor:pointer}
.rulesBtn{background:#3b82f6;color:white}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center}
.panel{background:#1e293b;padding:30px;border-radius:12px;color:white;width:420px;text-align:center}
.panel button{background:#22c55e;color:white;margin-top:15px}
.startBtn{font-size:22px;padding:15px 30px}
</style>
</head>
<body>

<div class="topLeft">
<button class="rulesBtn" onclick="openRules()">Oyun Kuralları</button>
</div>

<div class="ui">
<div class="bar">
<div id="healthBar" class="fill" style="background:#22c55e;width:100%"></div>
<div id="hpText" class="hpText">100 HP</div>
</div>
<div class="bar"><div id="xpBar" class="fill" style="background:#38bdf8;width:0%"></div></div>
<div id="info">Kill: 0 | Level: 1</div>
<div>Ulti: <span id="ultiCD">Hazır</span></div>
</div>

<div class="bottomRight">
<h4>Eklentiler</h4>
<div>Hasar: <span id="damageStat">1</span></div>
<div>Ateş Hızı: <span id="fireRateStat">250</span> ms</div>
</div>

<!-- START -->
<div class="overlay" id="startOverlay">
<div class="panel">
<h1>Hamster Arena</h1>
<button class="startBtn" onclick="startGame()">Oyunu Başlat</button>
</div>
</div>

<!-- RULES -->
<div class="overlay" id="rulesOverlay" style="display:none;">
<div class="panel">
<h2>Oyun Kuralları</h2>
<p>Sağ Tık Ulti → Hasarın %25’i kadar alan hasarı vurur.</p>
<button onclick="closeRules()">Kapat</button>
</div>
</div>

<!-- GAME OVER -->
<div class="overlay" id="gameOverOverlay" style="display:none;">
<div class="panel">
<h1>ÖLDÜN 💀</h1>
<button onclick="restartGame()">Tekrar Başlat</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const arena={x:100,y:100,w:canvas.width-200,h:canvas.height-200};

let running=false;
let player,bullets=[],enemies=[],healthPacks=[];
let keys={},mouse={x:0,y:0},mouseDown=false;
let kills=0,level=1,killNeed=10;
let lastShot=0,lastUlti=0,ultiEffectTime=0;

function init(){
player={
x:canvas.width/2,
y:canvas.height/2,
r:22,
health:100,
maxHealth:100,
speed:4,
damage:1,
fireRate:250
};
kills=0;level=1;killNeed=10;
bullets=[];enemies=[];healthPacks=[];
lastShot=0;lastUlti=0;
}
init();

function startGame(){
startOverlay.style.display="none";
running=true;
}

function restartGame(){
gameOverOverlay.style.display="none";
init();
running=true;
}

function openRules(){rulesOverlay.style.display="flex";}
function closeRules(){rulesOverlay.style.display="none";}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
document.addEventListener("mousedown",e=>{
if(e.button===0) mouseDown=true;
if(e.button===2) useUlti();
});
document.addEventListener("mouseup",()=>mouseDown=false);
document.addEventListener("contextmenu",e=>e.preventDefault());

function shoot(){
let now=Date.now();
if(now-lastShot<player.fireRate)return;
lastShot=now;
let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({x:player.x,y:player.y,dx:Math.cos(a)*9,dy:Math.sin(a)*9});
}

function useUlti(){
let now=Date.now();
if(now-lastUlti<10000)return;
lastUlti=now;
ultiEffectTime=20;
let ultiDamage=player.damage*0.25;

enemies.forEach((e,i)=>{
if(Math.hypot(player.x-e.x,player.y-e.y)<200){
e.health-=ultiDamage;
if(e.health<=0){
if(e.type==="boss")healthPacks.push({x:e.x,y:e.y,r:12});
enemies.splice(i,1);
kills++;
}
}
});
}

function spawnEnemy(){
enemies.push({
x:arena.x+Math.random()*arena.w,
y:arena.y+Math.random()*arena.h,
r:20,
health:5+level,
maxHealth:5+level,
speed:1.5+level*0.05,
type:"normal"
});
}

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(running){

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

player.x=Math.max(arena.x+player.r,Math.min(arena.x+arena.w-player.r,player.x));
player.y=Math.max(arena.y+player.r,Math.min(arena.y+arena.h-player.r,player.y));

if(mouseDown)shoot();

bullets.forEach((b,i)=>{
b.x+=b.dx;b.y+=b.dy;
ctx.fillStyle="yellow";
ctx.beginPath();ctx.arc(b.x,b.y,4,0,6.28);ctx.fill();

enemies.forEach((e,j)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
e.health-=player.damage;
bullets.splice(i,1);
if(e.health<=0){
enemies.splice(j,1);
kills++;
}
}
});
});

enemies.forEach(e=>{
let ang=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(ang)*e.speed;
e.y+=Math.sin(ang)*e.speed;

ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,6.28);
ctx.fillStyle="red";
ctx.fill();

if(Math.hypot(player.x-e.x,player.y-e.y)<player.r+e.r){
player.health-=0.4;
}
});

if(player.health<=0){
running=false;
gameOverOverlay.style.display="flex";
}

healthBar.style.width=(player.health/player.maxHealth*100)+"%";
hpText.innerText=Math.max(0,Math.floor(player.health))+" HP";
xpBar.style.width=(kills/killNeed*100)+"%";
info.innerText="Kill: "+kills+" / "+killNeed+" | Level: "+level;

damageStat.innerText=player.damage;
fireRateStat.innerText=player.fireRate;

let cd=Math.max(0,10-Math.floor((Date.now()-lastUlti)/1000));
ultiCD.innerText=cd===0?"Hazır":cd+"s";

if(ultiEffectTime>0){
ctx.beginPath();
ctx.arc(player.x,player.y,200-ultiEffectTime*5,0,6.28);
ctx.strokeStyle="rgba(0,200,255,0.6)";
ctx.lineWidth=8;
ctx.stroke();
ultiEffectTime--;
}
}

ctx.beginPath();
ctx.arc(player.x,player.y,22,0,6.28);
ctx.fillStyle="#d2b48c";
ctx.fill();

requestAnimationFrame(loop);
}

setInterval(()=>{if(running)spawnEnemy();},1500);
loop();
</script>
</body>
</html>
