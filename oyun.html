<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lordz RPG - Boss Hunt</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #2c3e50; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #skills { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .skill-slot { 
            width: 60px; height: 60px; background: rgba(0,0,0,0.7); border: 2px solid #f1c40f; 
            border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 12px;
        }
        .cooldown { color: #e74c3c; font-size: 10px; }
        .stat { font-size: 18px; color: #f1c40f; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">⚔️ Hasar: <span id="dmg">10</span></div>
        <div class="stat">💎 Ganimet: <span id="loot">0</span></div>
        <div class="stat">👑 Seviye: <span id="lvl">1</span></div>
    </div>

    <div id="skills">
        <div class="skill-slot">1<br>Hamle<div id="cd1" class="cooldown">Hazır</div></div>
        <div class="skill-slot">2<br>Kasırga<div id="cd2" class="cooldown">Hazır</div></div>
        <div class="skill-slot">3<br>Şok Dalgası<div id="cd3" class="cooldown">Hazır</div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { 
    x: canvas.width/2, y: canvas.height/2, radius: 20, 
    angle: 0, loot: 0, lvl: 1, 
    isAttacking: false, attackFrame: 0 
};

let enemies = [];
let effects = []; // Skill efektleri için
let loots = [];
let skills = {
    1: { name: "Dash", cd: 0, maxCd: 100 },
    2: { name: "Spin", cd: 0, maxCd: 300 },
    3: { name: "Shock", cd: 0, maxCd: 500 }
};

// Başlangıç düşmanları ve Boss
spawnEnemies();
function spawnEnemies() {
    for(let i=0; i<5; i++) spawnMob(false);
    spawnMob(true); // Bir adet Boss
}

function spawnMob(isBoss) {
    enemies.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: isBoss ? 50 : 20,
        hp: isBoss ? 500 : 50,
        maxHp: isBoss ? 500 : 50,
        isBoss: isBoss,
        color: isBoss ? '#8e44ad' : '#c0392b'
    });
}

window.addEventListener('mousemove', (e) => {
    player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
});

// Sol tık - Kılıç Sallama
window.addEventListener('mousedown', () => {
    if(!player.isAttacking) {
        player.isAttacking = true;
        checkHit(120, 1.5); // Kılıç menzili ve hasar çarpanı
    }
});

// Skill Tuşları
window.addEventListener('keydown', (e) => {
    if(e.key === '1' && skills[1].cd <= 0) useSkill1();
    if(e.key === '2' && skills[2].cd <= 0) useSkill2();
    if(e.key === '3' && skills[3].cd <= 0) useSkill3();
});

function useSkill1() { // DASH (Hızlı İleri Atılma)
    player.x += Math.cos(player.angle) * 150;
    player.y += Math.sin(player.angle) * 150;
    createEffect(player.x, player.y, 40, '#3498db', 'circle');
    skills[1].cd = skills[1].maxCd;
}
