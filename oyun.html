<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arena Survivor</title>
<style>
body{
margin:0;
background:#0e0e0e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
overflow:hidden;
}
canvas{
background:#1a1a1a;
border:4px solid #333;
}
.panel{
position:absolute;
background:rgba(0,0,0,0.7);
padding:10px;
font-size:14px;
}
#upgradePanel{bottom:10px;left:10px;width:260px;}
#statsPanel{bottom:10px;right:10px;width:260px;}
#overlay{
position:absolute;
width:1200px;
height:700px;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}
button{
padding:12px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<canvas id="game" width="1200" height="700"></canvas>
<div id="overlay"></div>
<div id="upgradePanel" class="panel"></div>
<div id="statsPanel" class="panel"></div>

<script>

/* ================= ENGINE ================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const upgradePanel = document.getElementById("upgradePanel");
const statsPanel = document.getElementById("statsPanel");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let last=0;
let dt=0;
let gameState="menu";
let screenShake=0;

/* ================= INPUT ================= */

let keys={};
let mouse={x:0,y:0};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove",e=>{
const r=canvas.getBoundingClientRect();
mouse.x=e.clientX-r.left;
mouse.y=e.clientY-r.top;
});

/* ================= PLAYER ================= */

class Player{
constructor(){this.reset();}
reset(){
this.x=WIDTH/2;
this.y=HEIGHT/2;
this.r=18;
this.speed=240;
this.maxHp=100;
this.hp=100;
this.hearts=3;
this.damage=20;
this.fireRate=0.25;
this.fireTimer=0;
this.level=1;
this.xp=0;
this.xpNeed=100;
this.upgrades=[];
}
update(dt){
let vx=0,vy=0;
if(keys["w"])vy--;
if(keys["s"])vy++;
if(keys["a"])vx--;
if(keys["d"])vx++;
let len=Math.hypot(vx,vy);
if(len){vx/=len;vy/=len;}
this.x+=vx*this.speed*dt;
this.y+=vy*this.speed*dt;
this.x=Math.max(this.r,Math.min(WIDTH-this.r,this.x));
this.y=Math.max(this.r,Math.min(HEIGHT-this.r,this.y));

this.fireTimer-=dt;
if(this.fireTimer<=0){
this.shoot();
this.fireTimer=this.fireRate;
}
}
shoot(){
let ang=Math.atan2(mouse.y-this.y,mouse.x-this.x);
bullets.push(new Bullet(this.x,this.y,Math.cos(ang),Math.sin(ang),this.damage));
}
gainXP(v){
this.xp+=v;
if(this.xp>=this.xpNeed){
this.level++;
this.xp=0;
this.xpNeed+=80;
openUpgrade();
}
}
draw(){
ctx.fillStyle="#3498db";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}
const player=new Player();

/* ================= BULLET ================= */

class Bullet{
constructor(x,y,dx,dy,dmg){
this.x=x;this.y=y;
this.dx=dx;this.dy=dy;
this.speed=650;
this.r=4;
this.dmg=dmg;
}
update(dt){
this.x+=this.dx*this.speed*dt;
this.y+=this.dy*this.speed*dt;
}
draw(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}
let bullets=[];

/* ================= ENEMY ================= */

class Enemy{
constructor(boss=false){
this.boss=boss;
this.r=boss?50:18;
this.speed=boss?80:110+wave*8;
this.maxHp=boss?2000:200+wave*40;
this.hp=this.maxHp;
this.x=Math.random()<0.5?0:WIDTH;
this.y=Math.random()*HEIGHT;
}
update(dt){
let a=Math.atan2(player.y-this.y,player.x-this.x);
this.x+=Math.cos(a)*this.speed*dt;
this.y+=Math.sin(a)*this.speed*dt;

if(Math.hypot(player.x-this.x,player.y-this.y)<player.r+this.r){
player.hp-=50*dt;
screenShake=8;
if(player.hp<=0){
player.hearts--;
player.hp=player.maxHp;
if(player.hearts<=0)gameOver();
}
}
}
draw(){
ctx.fillStyle=this.boss?"purple":"green";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}
let enemies=[];

/* ================= WAVE ================= */

let wave=1;
let spawn=10;
let spawnTimer=0;

function nextWave(){
wave++;
spawn=10+wave*4;
if(wave%5===0)enemies.push(new Enemy(true));
}

/* ================= UPGRADE ================= */

function openUpgrade(){
gameState="upgrade";
overlay.style.display="flex";
overlay.innerHTML="<h1>YÜKSELTME SEÇ</h1>";
let ups=[
{text:"+15 Hasar",f:()=>player.damage+=15},
{text:"Ateş Hızı+",f:()=>player.fireRate*=0.85},
{text:"+1 Kalp",f:()=>player.hearts++},
{text:"+20 HP",f:()=>player.maxHp+=20}
];
ups.sort(()=>0.5-Math.random());
ups.slice(0,3).forEach(u=>{
let b=document.createElement("button");
b.textContent=u.text;
b.onclick=()=>{
u.f();
player.upgrades.push(u.text);
overlay.style.display="none";
gameState="play";
};
overlay.appendChild(b);
});
}

/* ================= GAME STATES ================= */

function gameOver(){
gameState="gameover";
overlay.style.display="flex";
overlay.innerHTML="<h1>OYUN BİTTİ</h1><button onclick='restart()'>Yeniden Başla</button>";
}

function restart(){
player.reset();
wave=1;
spawn=10;
enemies=[];
bullets=[];
gameState="play";
overlay.style.display="none";
}

/* ================= MENU ================= */

overlay.innerHTML=`
<h1>ARENA SURVIVOR</h1>
<p>WASD ile hareket</p>
<p>Mouse ile ateş</p>
<p>Her 5 wave Boss</p>
<button onclick="start()">BAŞLA</button>
`;

function start(){
overlay.style.display="none";
gameState="play";
}

/* ================= LOOP ================= */

function loop(t){
dt=(t-last)/1000;
last=t;

if(gameState==="play"){
player.update(dt);

spawnTimer-=dt;
if(spawnTimer<=0 && spawn>0){
enemies.push(new Enemy());
spawn--;
spawnTimer=1.2;
}
if(spawn<=0 && enemies.length===0)nextWave();

bullets.forEach((b,bi)=>{
b.update(dt);
enemies.forEach((e,ei)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
e.hp-=b.dmg;
bullets.splice(bi,1);
screenShake=5;
if(e.hp<=0){
player.gainXP(e.boss?300:40);
enemies.splice(ei,1);
}
}
});
});
}

draw();
requestAnimationFrame(loop);
}

function draw(){
ctx.save();
if(screenShake>0){
ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
screenShake*=0.9;
}
ctx.clearRect(0,0,WIDTH,HEIGHT);

bullets.forEach(b=>b.draw());
enemies.forEach(e=>e.draw());
player.draw();

/* HUD */
ctx.fillStyle="red";
for(let i=0;i<player.hearts;i++){
ctx.fillRect(10+i*30,10,20,20);
}

ctx.fillStyle="purple";
ctx.fillRect(200,660,800*(player.xp/player.xpNeed),20);

ctx.fillStyle="white";
ctx.fillText("Wave: "+wave,560,30);

ctx.restore();

upgradePanel.innerHTML="<b>Yükseltmeler</b><br>"+player.upgrades.join("<br>");
statsPanel.innerHTML=`
<b>İstatistik</b><br>
Hasar: ${player.damage}<br>
Ateş Hızı: ${(1/player.fireRate).toFixed(1)}<br>
Max HP: ${player.maxHp}<br>
Kalp: ${player.hearts}
`;
}

requestAnimationFrame(loop);

</script>
</body>
</html>
