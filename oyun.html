<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zombie Apocalypse - Pro Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            background: radial-gradient(circle, #222 0%, #000 100%);
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-left: 5px solid #ff004c;
            margin-bottom: 10px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #wave-announcer {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ff004c;
            text-shadow: 0 0 20px rgba(255, 0, 76, 0.5);
            opacity: 0;
            transition: opacity 0.5s;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 50px;
            border: 2px solid #ff004c;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #ff004c;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stat-box">HP: <span id="hp-val">100</span></div>
    <div class="stat-box">SKOR: <span id="score-val">0</span></div>
    <div class="stat-box">DALGA: <span id="wave-val">1</span></div>
    <div class="stat-box">MERMİ: <span id="ammo-val">∞</span></div>
</div>

<div id="wave-announcer">DALGA 1</div>

<div id="game-over">
    <h1>ÖLDÜN!</h1>
    <p>Zombiler dünyayı ele geçirdi.</p>
    <h2 id="final-score">Skor: 0</h2>
    <button onclick="location.reload()">TEKRAR DENE</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * OYUN MOTORU AYARLARI
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpEl = document.getElementById('hp-val');
const scoreEl = document.getElementById('score-val');
const waveEl = document.getElementById('wave-val');
const waveAnnouncer = document.getElementById('wave-announcer');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Oyun Durumu
let player, projectiles, enemies, particles, keys;
let score = 0;
let wave = 0;
let isGameOver = false;
let frameCount = 0;

// Mouse Pozisyonu
const mouse = { x: 0, y: 0 };

/**
 * NESNE SINIFLARI
 */

class Player {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.radius = 20;
        this.color = '#00d4ff';
        this.hp = 100;
        this.speed = 5;
    }

    draw() {
        // Silah çizimi (Mouse'a bakan)
        const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(angle);
        ctx.fillStyle = '#555';
        ctx.fillRect(10, -5, 25, 10);
        ctx.restore();

        // Karakter gövdesi
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.closePath();
    }

    update() {
        if (keys['w'] && this.y > this.radius) this.y -= this.speed;
        if (keys['s'] && this.y < canvas.height - this.radius) this.y += this.speed;
        if (keys['a'] && this.x > this.radius) this.x -= this.speed;
        if (keys['d'] && this.x < canvas.width - this.radius) this.x += this.speed;
        this.draw();
    }
}

class Enemy {
    constructor(x, y, type = 'normal') {
        this.x = x;
        this.y = y;
        this.type = type;
        
        if (type === 'normal') {
            this.radius = 18;
            this.color = '#76ff03';
            this.hp = 50;
            this.maxHp = 50;
            this.speed = 1.5 + (wave * 0.2);
            this.damage = 0.5;
        } else if (type === 'boss') {
            this.radius = 60;
            this.color = '#ff004c';
            this.hp = 1000 + (wave * 200);
            this.maxHp = this.hp;
            this.speed = 0.8;
            this.damage = 2;
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.closePath();

        // HP Bar
        const barW = this.radius * 2;
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, barW, 6);
        ctx.fillStyle = '#ff004c';
        ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, barW * (this.hp / this.maxHp), 6);
    }

    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
        this.draw();
    }
}

class Projectile {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.velocity = {
            x: Math.cos(angle) * 10,
            y: Math.sin(angle) * 10
        };
        this.radius = 4;
        this.damage = 25;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffff00';
        ctx.fill();
    }

    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.draw();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.velocity = {
            x: (Math.random() - 0.5) * 5,
            y: (Math.random() - 0.5) * 5
        };
        this.alpha = 1;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }

    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.alpha -= 0.02;
        this.draw();
    }
}

/**
 * OYUN MANTIĞI
 */

function init() {
    player = new Player();
    projectiles = [];
    enemies = [];
    particles = [];
    keys = {};
    score = 0;
    wave = 0;
    isGameOver = false;
    nextWave();
    animate();
}

function nextWave() {
    wave++;
    waveEl.innerText = wave;
    waveAnnouncer.innerText = `DALGA ${wave}`;
    waveAnnouncer.style.opacity = 1;
    
    setTimeout(() => { waveAnnouncer.style.opacity = 0; }, 2000);

    // Düşman spawnlama
    const count = 5 + (wave * 3);
    for (let i = 0; i < count; i++) {
        spawnEnemy('normal');
    }

    // Her 5 dalgada bir Boss
    if (wave % 5 === 0) {
        spawnEnemy('boss');
    }
}

function spawnEnemy(type) {
    let x, y;
    if (Math.random() < 0.5) {
        x = Math.random() < 0.5 ? -100 : canvas.width + 100;
        y = Math.random() * canvas.height;
    } else {
        x = Math.random() * canvas.width;
        y = Math.random() < 0.5 ? -100 : canvas.height + 100;
    }
    enemies.push(new Enemy(x, y, type));
}

function animate() {
    if (isGameOver) return;
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    player.update();

    // HP Güncelleme
    hpEl.innerText = Math.ceil(player.hp);
    if (player.hp <= 0) {
        endGame();
    }

    // Parçacıklar
    particles.forEach((p, index) => {
        if (p.alpha <= 0) particles.splice(index, 1);
        else p.update();
    });

    // Mermiler
    projectiles.forEach((p, pIndex) => {
        p.update();
        // Ekran dışı temizlik
        if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
            projectiles.splice(pIndex, 1);
        }
    });

    // Düşmanlar
    enemies.forEach((enemy, eIndex) => {
        enemy.update();

        // Oyuncuyla çarpışma
        const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
        if (dist - enemy.radius - player.radius < 1) {
            player.hp -= enemy.damage;
            // Geri tepme efekti
            player.x += (player.x - enemy.x) * 0.1;
            player.y += (player.y - enemy.y) * 0.1;
        }

        // Mermiyle çarpışma
        projectiles.forEach((bullet, bIndex) => {
            const bDist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
            if (bDist - enemy.radius - bullet.radius < 1) {
                // Efekt yarat
                for(let i=0; i<8; i++) particles.push(new Particle(bullet.x, bullet.y, enemy.color));
                
                enemy.hp -= bullet.damage;
                projectiles.splice(bIndex, 1);

                if (enemy.hp <= 0) {
                    score += enemy.type === 'boss' ? 500 : 100;
                    scoreEl.innerText = score;
                    enemies.splice(eIndex, 1);
                }
            }
        });
    });

    // Dalga bitti mi?
    if (enemies.length === 0) {
        nextWave();
    }
}

function endGame() {
    isGameOver = true;
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('final-score').innerText = `Skor: ${score}`;
}

/**
 * KONTROLLER
 */
window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mousedown', () => {
    if (isGameOver) return;
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    projectiles.push(new Projectile(player.x, player.y, angle));
});

// Başlat
init();

</script>
</body>
</html>
