<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Abyssal Waters | Pirate Overlord</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --neon-blue: #00f2ff; --blood: #ff0044; --wood: #3d2b1f; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Pirata One', cursive; }
        canvas { display: block; background: radial-gradient(circle, #001a33 0%, #00050a 100%); }

        /* --- MODERN SOL ÜST MENÜ --- */
        #top-ui {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 15px; pointer-events: none;
        }
        .glass-panel {
            background: rgba(0, 20, 40, 0.8); border: 2px solid var(--gold);
            padding: 15px; border-radius: 0 20px 0 20px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px); pointer-events: auto;
        }
        .stat-row { display: flex; align-items: center; gap: 10px; color: white; font-size: 24px; }
        .bar-bg { width: 200px; height: 12px; background: #111; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        .bar-fill { height: 100%; transition: 0.3s; }

        /* --- SAĞ ALT MİNİ MAP --- */
        #minimap {
            position: absolute; bottom: 20px; right: 20px; width: 180px; height: 180px;
            background: rgba(0, 10, 20, 0.9); border: 3px solid var(--gold);
            border-radius: 50%; overflow: hidden; box-shadow: 0 0 30px #000; z-index: 100;
        }
        #minimap-canvas { width: 100%; height: 100%; opacity: 0.8; }

        /* --- MARKET & ULTİ BUTONLARI --- */
        #action-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 100;
        }
        .glow-btn {
            background: var(--wood); color: var(--gold); border: 2px solid var(--gold);
            padding: 10px 25px; font-family: 'Pirata One'; font-size: 22px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5); border-radius: 5px;
        }
        .glow-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); transform: translateY(-5px); }
        .ulti-btn { border-color: var(--neon-blue); color: var(--neon-blue); }
        .ulti-btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        /* --- MARKET MODAL --- */
        #market-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .market-content {
            background: var(--wood); width: 80%; max-width: 900px; border: 5px ridge var(--gold);
            padding: 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
        }
        .ship-card { border: 2px solid #555; padding: 15px; text-align: center; color: white; transition: 0.3s; }
        .ship-card:hover { border-color: var(--gold); background: rgba(255,215,0,0.1); }
        .ship-card img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="top-ui">
    <div class="glass-panel">
        <div class="stat-row">⚓ <span id="p-name">KAPTAN</span></div>
        <div class="stat-row" style="color:var(--gold)">💰 <span id="p-gold">0</span></div>
        <div class="stat-row">
            HP <div class="bar-bg"><div id="hp-bar" class="bar-fill" style="background:var(--blood); width:100%"></div></div>
        </div>
        <div class="stat-row">
            XP <div class="bar-bg"><div id="xp-bar" class="bar-fill" style="background:var(--neon-blue); width:0%"></div></div>
        </div>
    </div>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<div id="action-bar">
    <button class="glow-btn" onclick="toggleMarket()">LİMAN MARKETİ</button>
    <button id="ulti-btn" class="glow-btn ulti-btn" onclick="useUlti()" disabled>🔥 ABYSSAL BLAST (Q)</button>
</div>

<div id="market-modal">
    <div class="market-content" id="market-grid">
        </div>
</div>

<canvas id="game"></canvas>

<script>
/**
 * ELITE PIRATE ENGINE
 */
const App = {
    gold: 500, hp: 100, maxHp: 100, xp: 0, lvl: 1,
    bullets: [], enemies: [], creatures: [], particles: [],
    keys: {}, ultiReady: false,
    shipType: 'starter',
    ships: {
        starter: { name: "Sandal", img: "https://www.freeiconspng.com/uploads/pirate-ship-png-image-6.png", dmg: 10, spd: 3, price: 0 },
        warship: { name: "Kraliyet Gemisi", img: "https://www.freeiconspng.com/uploads/pirate-ship-png-2.png", dmg: 25, spd: 4.5, price: 2000 },
        ghost: { name: "Uçan Hollandalı", img: "https://www.freeiconspng.com/uploads/pirate-ship-png-8.png", dmg: 50, spd: 6, price: 5000 }
    },

    init() {
        this.cvs = document.getElementById('game');
        this.ctx = this.cvs.getContext('2d');
        this.mmCvs = document.getElementById('minimap-canvas');
        this.mmCtx = this.mmCvs.getContext('2d');
        this.resize();

        this.player = { x: 2000, y: 2000, angle: 0, spd: 0 }; // Dev harita
        this.cam = { x: 0, y: 0 };

        window.onkeydown = (e) => { this.keys[e.code] = true; if(e.code === 'KeyQ' && this.ultiReady) this.useUlti(); };
        window.onkeyup = (e) => this.keys[e.code] = false;

        this.setupMarket();
        this.loop();
        setInterval(() => this.spawnManager(), 2000);
    },

    resize() {
        this.cvs.width = window.innerWidth;
        this.cvs.height = window.innerHeight;
        this.mmCvs.width = 180;
        this.mmCvs.height = 180;
    },

    setupMarket() {
        const grid = document.getElementById('market-grid');
        Object.keys(this.ships).forEach(key => {
            const s = this.ships[key];
            grid.innerHTML += `
                <div class="ship-card">
                    <img src="${s.img}">
                    <h3>${s.name}</h3>
                    <p>HASAR: ${s.dmg} | HIZ: ${s.spd}</p>
                    <button class="glow-btn" onclick="App.buyShip('${key}')">${s.price} ALTIN</button>
                </div>
            `;
        });
    },

    buyShip(key) {
        const s = this.ships[key];
        if(this.gold >= s.price) {
            this.gold -= s.price;
            this.shipType = key;
            this.updateUI();
            toggleMarket();
            this.createEffect(this.player.x, this.player.y, varName('--neon-blue'), 50);
        }
    },

    spawnManager() {
        if(this.enemies.length < 10) {
            this.enemies.push({
                x: this.player.x + (Math.random()-0.5)*2000,
                y: this.player.y + (Math.random()-0.5)*2000,
                hp: 50 * this.lvl, type: 'ship', spd: 1 + Math.random()
            });
        }
        // Deniz Yaratığı (Kraken/Sea Monster)
        if(Math.random() > 0.7 && this.creatures.length < 3) {
            this.creatures.push({
                x: this.player.x + (Math.random()-0.5)*3000,
                y: this.player.y + (Math.random()-0.5)*3000,
                hp: 500, type: 'kraken', size: 100 + Math.random()*100,
                color: '#1a4d1a', lastUlti: 0
            });
        }
    },

    useUlti() {
        this.ultiReady = false;
        document.getElementById('ulti-btn').disabled = true;
        this.createEffect(this.player.x, this.player.y, varName('--neon-blue'), 100);
        this.enemies.concat(this.creatures).forEach(e => {
            const dist = Math.hypot(this.player.x - e.x, this.player.y - e.y);
            if(dist < 500) e.hp -= 200;
        });
    },

    update() {
        const s = this.ships[this.shipType];
        if(this.keys['KeyW']) this.player.spd = Math.min(this.player.spd + 0.1, s.spd);
        else this.player.spd *= 0.98;

        if(this.keys['KeyA']) this.player.angle -= 0.04;
        if(this.keys['KeyD']) this.player.angle += 0.04;

        this.player.x += Math.cos(this.player.angle) * this.player.spd;
        this.player.y += Math.sin(this.player.angle) * this.player.spd;

        if(this.keys['Space']) this.fire();

        // Kamera
        this.cam.x = this.player.x - this.cvs.width/2;
        this.cam.y = this.player.y - this.cvs.height/2;

        // Mermiler ve Çarpışma
        this.bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            [...this.enemies, ...this.creatures].forEach(e => {
                if(Math.hypot(e.x - b.x, e.y - b.y) < (e.size || 40)) {
                    e.hp -= s.dmg;
                    this.bullets.splice(i, 1);
                    if(e.hp <= 0) this.kill(e);
                }
            });
        });

        // Yaratık Saldırıları (Ulti Atarlar)
        this.creatures.forEach(c => {
            const dist = Math.hypot(this.player.x - c.x, this.player.y - c.y);
            if(dist < 400 && Date.now() - c.lastUlti > 3000) {
                this.hp -= 20;
                c.lastUlti = Date.now();
                this.createEffect(c.x, c.y, 'purple', 40);
                this.updateUI();
            }
        });
    },

    kill(e) {
        if(e.type === 'ship') { this.gold += 200; this.xp += 100; }
        else { this.gold += 1000; this.xp += 500; }
        
        if(this.xp >= 1000) { this.xp = 0; this.lvl++; this.ultiReady = true; document.getElementById('ulti-btn').disabled = false; }
        
        const idx = e.type === 'ship' ? this.enemies.indexOf(e) : this.creatures.indexOf(e);
        if(e.type === 'ship') this.enemies.splice(idx, 1); else this.creatures.splice(idx, 1);
        this.updateUI();
    },

    updateUI() {
        document.getElementById('p-gold').innerText = this.gold;
        document.getElementById('hp-bar').style.width = (this.hp) + "%";
        document.getElementById('xp-bar').style.width = (this.xp / 10) + "%";
    },

    fire() {
        if(this.lastFire && Date.now() - this.lastFire < 300) return;
        this.lastFire = Date.now();
        this.bullets.push({
            x: this.player.x, y: this.player.y,
            vx: Math.cos(this.player.angle) * 10,
            vy: Math.sin(this.player.angle) * 10
        });
    },

    createEffect(x, y, color, count) {
        for(let i=0; i<count; i++) this.particles.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, l: 1, c: color
        });
    },

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.cvs.width, this.cvs.height);

        ctx.save();
        ctx.translate(-this.cam.x, -this.cam.y);

        // Okyanus Izgarası
        ctx.strokeStyle = '#002244';
        for(let i=0; i<4000; i+=200) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 4000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(4000, i); ctx.stroke();
        }

        // Oyuncu
        ctx.save();
        ctx.translate(this.player.x, this.player.y);
        ctx.rotate(this.player.angle + Math.PI/2);
        const img = new Image(); img.src = this.ships[this.shipType].img;
        ctx.drawImage(img, -40, -40, 80, 80);
        ctx.restore();

        // Yaratıklar (Kraken)
        this.creatures.forEach(c => {
            ctx.fillStyle = c.color;
            ctx.beginPath(); ctx.arc(c.x, c.y, c.size/2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = varName('--blood'); ctx.lineWidth = 5; ctx.stroke();
        });

        // Düşmanlar
        this.enemies.forEach(e => {
            ctx.fillStyle = '#444'; ctx.fillRect(e.x-20, e.y-20, 40, 40);
        });

        // Efektler
        this.particles.forEach((p, i) => {
            ctx.globalAlpha = p.l; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 4, 4);
            p.x += p.vx; p.y += p.vy; p.l -= 0.02;
            if(p.l <= 0) this.particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Mermiler
        ctx.fillStyle = varName('--gold');
        this.bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); });

        ctx.restore();
        this.drawMinimap();
    },

    drawMinimap() {
        this.mmCtx.fillStyle = 'rgba(0,10,20,0.9)';
        this.mmCtx.fillRect(0,0,180,180);
        const scale = 180 / 4000;
        this.mmCtx.fillStyle = varName('--neon-blue');
        this.mmCtx.fillRect(this.player.x * scale, this.player.y * scale, 4, 4);
        this.mmCtx.fillStyle = 'red';
        this.enemies.forEach(e => this.mmCtx.fillRect(e.x * scale, e.y * scale, 2, 2));
    },

    loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
};

function toggleMarket() {
    const m = document.getElementById('market-modal');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

function varName(n) { return getComputedStyle(document.documentElement).getPropertyValue(n); }

App.init();
</script>
</body>
</html>
