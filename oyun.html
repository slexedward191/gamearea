<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Legends: Black Flag</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --deep-sea: #001a33; --wood: #3d2b1f; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Pirata One', cursive; }
        
        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; background: #000; color: var(--gold);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }

        /* HUD Layer */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 20px; box-sizing: border-box; display: none;
        }
        .stat-box {
            background: rgba(0,0,0,0.6); border: 2px solid var(--gold);
            padding: 10px 20px; display: inline-block; margin-right: 20px;
        }
        .health-bar { width: 200px; height: 15px; background: #440000; border: 1px solid #fff; position: relative; }
        #health-fill { width: 100%; height: 100%; background: #ff0000; transition: 0.3s; }

        /* Market */
        #market-ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 800px; background: var(--wood); border: 4px ridge var(--gold);
            display: none; z-index: 1000; padding: 30px; box-shadow: 0 0 100px #000;
        }
        .market-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .item-card { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--gold); padding: 15px; 
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .item-card:hover { background: rgba(255,215,0,0.2); }
        .btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; font-family: 'Pirata One'; cursor: pointer; }

        canvas { display: block; background: #001a33; }
    </style>
</head>
<body>

<div id="loader">
    <h1 style="font-size: 60px;">BÜYÜK OKYANUS YÜKLENİYOR...</h1>
    <input type="text" id="captain-name" placeholder="KAPTANIN ADINI YAZ..." 
           style="background:transparent; border:2px solid var(--gold); color:white; padding:15px; text-align:center; font-family:'Pirata One'; font-size:24px;">
    <button class="btn" style="margin-top:20px; font-size:30px;" onclick="initGame()">DENİZE AÇIL!</button>
</div>

<div id="hud">
    <div class="stat-box">KAPTAN: <span id="ui-name">---</span></div>
    <div class="stat-box" style="color:var(--gold)">ALTIN: <span id="ui-gold">0</span></div>
    <div class="stat-box">
        CAN: <div class="health-bar"><div id="health-fill"></div></div>
    </div>
    <div style="float: right; color: white;">[M] MARKET | [BOŞLUK] ATEŞ | [WASD] DÜMEN</div>
</div>

<div id="market-ui">
    <h2 style="text-align:center; font-size:40px; color:var(--gold); margin-top:0;">LİMAN MARKETİ</h2>
    <div class="market-grid">
        <div class="item-card" onclick="buyItem('cannon')">
            <h3>ÇELİK TOP</h3>
            <p>Hasarı Artırır</p>
            <p style="color:var(--gold)">300 ALTIN</p>
        </div>
        <div class="item-card" onclick="buyItem('hull')">
            <h3>GÜÇLÜ GÖVDE</h3>
            <p>Can Yeniler</p>
            <p style="color:var(--gold)">200 ALTIN</p>
        </div>
        <div class="item-card" onclick="buyItem('sails')">
            <h3>HIZLI YELKEN</h3>
            <p>Hızı Artırır</p>
            <p style="color:var(--gold)">500 ALTIN</p>
        </div>
    </div>
    <button class="btn" style="width:100%; margin-top:30px;" onclick="toggleMarket()">DENİZE DÖN</button>
</div>

<canvas id="game"></canvas>

<script>
/**
 * PROFESYONEL OYUN MOTORU YAPILANDIRMASI
 */
const cfg = {
    canvas: document.getElementById('game'),
    ctx: null,
    w: window.innerWidth,
    h: window.innerHeight,
    isPaused: false,
    gold: 0,
    health: 100,
    maxHealth: 100,
    damage: 10,
    speedMult: 1
};

const player = {
    x: cfg.w / 2, y: cfg.h / 2,
    angle: 0, speed: 0, rotSpeed: 0.04,
    size: 60
};

const bullets = [];
const enemies = [];
const particles = [];
const keys = {};

function initGame() {
    const name = document.getElementById('captain-name').value || "Kaptan Jack";
    document.getElementById('ui-name').innerText = name.toUpperCase();
    document.getElementById('loader').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    cfg.ctx = cfg.canvas.getContext('2d');
    cfg.canvas.width = cfg.w;
    cfg.canvas.height = cfg.h;

    // Ses sistemini başlat (Martı ve Deniz Sesleri)
    startAmbience();

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('keypress', e => {
        if(e.code === 'KeyM') toggleMarket();
        if(e.code === 'Space') fireCannon();
    });

    // Düşman gemilerini düzenli spawn et
    setInterval(spawnEnemy, 3000);
    
    requestAnimationFrame(gameLoop);
}

function startAmbience() {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    setInterval(() => {
        if(cfg.isPaused) return;
        // Martı çığlığı simülasyonu
        if(Math.random() > 0.95) playTone(ac, 800 + Math.random()*400, 0.2, 0.02);
    }, 1000);
}

function playTone(ctx, freq, dur, vol) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
}

function fireCannon() {
    if(cfg.isPaused) return;
    bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(player.angle) * 8,
        vy: Math.sin(player.angle) * 8,
        life: 100
    });
}

function spawnEnemy() {
    if(cfg.isPaused || enemies.length > 5) return;
    const side = Math.random() > 0.5;
    enemies.push({
        x: side ? -50 : cfg.w + 50,
        y: Math.random() * cfg.h,
        hp: 30,
        speed: 1 + Math.random()
    });
}

function toggleMarket() {
    cfg.isPaused = !cfg.isPaused;
    document.getElementById('market-ui').style.display = cfg.isPaused ? 'block' : 'none';
}

function buyItem(type) {
    if(type === 'cannon' && cfg.gold >= 300) { cfg.gold -= 300; cfg.damage += 10; }
    if(type === 'hull' && cfg.gold >= 200) { cfg.gold -= 200; cfg.health = cfg.maxHealth; }
    if(type === 'sails' && cfg.gold >= 500) { cfg.gold -= 500; cfg.speedMult += 0.5; }
    updateHUD();
}

function updateHUD() {
    document.getElementById('ui-gold').innerText = cfg.gold;
    document.getElementById('health-fill').style.width = (cfg.health / cfg.maxHealth * 100) + '%';
}

function update() {
    if(cfg.isPaused) return;

    // Gemi Hareket Kontrolü
    if(keys['KeyW']) player.speed = Math.min(player.speed + 0.1, 4 * cfg.speedMult);
    else player.speed *= 0.98;

    if(keys['KeyA']) player.angle -= player.rotSpeed;
    if(keys['KeyD']) player.angle += player.rotSpeed;

    player.x += Math.cos(player.angle) * player.speed;
    player.y += Math.sin(player.angle) * player.speed;

    // Sınır Kontrolü
    if(player.x < 0) player.x = cfg.w;
    if(player.x > cfg.w) player.x = 0;
    if(player.y < 0) player.y = cfg.h;
    if(player.y > cfg.h) player.y = 0;

    // Mermiler
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        if(b.life <= 0) bullets.splice(i, 1);
    });

    // Düşmanlar ve Çarpışma
    enemies.forEach((en, ei) => {
        const dx = player.x - en.x;
        const dy = player.y - en.y;
        const dist = Math.hypot(dx, dy);
        
        // Oyuncuya doğru yönel
        en.x += (dx / dist) * en.speed;
        en.y += (dy / dist) * en.speed;

        // Gemi çarpışması
        if(dist < 40) {
            cfg.health -= 0.2;
            updateHUD();
        }

        // Mermi çarpışması
        bullets.forEach((b, bi) => {
            if(Math.hypot(en.x - b.x, en.y - b.y) < 30) {
                en.hp -= cfg.damage;
                bullets.splice(bi, 1);
                if(en.hp <= 0) {
                    enemies.splice(ei, 1);
                    cfg.gold += 100;
                    updateHUD();
                }
            }
        });
    });

    if(cfg.health <= 0) {
        alert("GEMİNİZ BATTI! SKORUNUZ: " + cfg.gold);
        location.reload();
    }
}

function draw() {
    const ctx = cfg.ctx;
    // Okyanus Temizliği
    ctx.fillStyle = '#001a33';
    ctx.fillRect(0, 0, cfg.w, cfg.h);

    // Dinamik Dalgalar
    ctx.strokeStyle = '#003366';
    ctx.lineWidth = 2;
    const time = Date.now() * 0.002;
    for(let i=0; i<cfg.h; i+=50) {
        ctx.beginPath();
        for(let j=0; j<cfg.w; j+=20) {
            ctx.lineTo(j, i + Math.sin(j*0.01 + time) * 10);
        }
        ctx.stroke();
    }

    // Oyuncu Gemisi (Detaylı Vektörel Çizim)
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    
    // Gemi Gövdesi
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.moveTo(30, 0);
    ctx.lineTo(-20, -20);
    ctx.lineTo(-20, 20);
    ctx.closePath();
    ctx.fill();
    
    // Yelkenler
    ctx.fillStyle = 'white';
    ctx.fillRect(-10, -15, 10, 30);
    ctx.restore();

    // Düşman Gemileri
    ctx.fillStyle = '#222';
    enemies.forEach(en => {
        ctx.save();
        ctx.translate(en.x, en.y);
        ctx.fillRect(-15, -15, 30, 30);
        ctx.fillStyle = 'red';
        ctx.fillRect(-15, -25, en.hp, 5); // Düşman Can Barı
        ctx.restore();
    });

    // Mermiler
    ctx.fillStyle = '#gold';
    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Pencere boyutu değiştiğinde ayarla
window.onresize = () => {
    cfg.w = window.innerWidth;
    cfg.h = window.innerHeight;
    cfg.canvas.width = cfg.w;
    cfg.canvas.height = cfg.h;
};
</script>
</body>
</html>
