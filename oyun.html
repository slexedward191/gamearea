<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NAVAL SURVIVAL: BLACK FLAG</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --sea: #004d7a; --night: #0a0e1a; --danger: #ff3300; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Almendra', serif; color: #fff; user-select: none; }
        canvas { display: block; margin: 0 auto; cursor: crosshair; }

        /* UI Katmanları */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; padding: 20px; }
        .stats-panel { background: rgba(0,0,0,0.7); padding: 15px; border: 2px solid var(--gold); backdrop-filter: blur(5px); pointer-events: all; }
        .bar { width: 200px; height: 10px; background: #333; border: 1px solid #555; margin: 5px 0; border-radius: 5px; overflow: hidden; }
        .fill { height: 100%; transition: width 0.3s; }
        #hp-fill { background: #2ecc71; }
        #island-hp-fill { background: #f1c40f; }

        /* Market (Sol Üst) */
        #market-ui { position: absolute; top: 120px; left: 20px; display: none; pointer-events: all; }
        .market-card { background: #1a1a1a; border: 2px solid var(--gold); padding: 10px; margin-bottom: 5px; }

        /* Duyuru Yazıları */
        #alert-text { position: absolute; top: 25%; width: 100%; text-align: center; font-size: 40px; font-family: 'Pirata One'; color: var(--danger); text-shadow: 2px 2px #000; opacity: 0; transition: 0.5s; }

        /* Başlangıç ve Ölüm Ekranı */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: all; }
        .modal input { padding: 10px; font-size: 20px; text-align: center; margin: 20px; background: #222; color: var(--gold); border: 2px solid var(--gold); outline: none; }
        .btn { background: var(--gold); color: #000; padding: 15px 40px; font-weight: bold; cursor: pointer; border: none; font-family: 'Pirata One'; font-size: 24px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }
        .hidden { display: none !important; }

        /* Envanter */
        #inventory { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .plugin-tag { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 5px 10px; font-size: 12px; color: var(--gold); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stats-panel" style="width: fit-content;">
        <div id="player-name-ui" style="font-size: 20px; color: var(--gold); font-family: 'Pirata One';">KAPTAN</div>
        <div>GEMİ GÜCÜ</div>
        <div class="bar"><div id="hp-fill" class="fill" style="width: 100%;"></div></div>
        <div>ADANIN DURUMU</div>
        <div class="bar"><div id="island-hp-fill" class="fill" style="width: 100%;"></div></div>
        <div style="margin-top: 10px; font-size: 18px; color: var(--gold);">🪙 <span id="gold-txt">0</span></div>
        <div id="time-txt" style="font-size: 14px; color: #aaa;">GÜNDÜZ</div>
    </div>

    <div id="market-ui">
        <div class="market-card">
            <div>GEMİ ONARIMI (500 Altın)</div>
            <button class="btn" style="padding: 5px 10px; font-size: 14px;" onclick="buyItem('repair')">SATIN AL</button>
        </div>
        <div class="market-card">
            <div>HASAR ARTIRICI (1000 Altın)</div>
            <button class="btn" style="padding: 5px 10px; font-size: 14px;" onclick="buyItem('dmg')">SATIN AL</button>
        </div>
    </div>

    <div id="alert-text">KORSANLAR BASKIN YAPIYOR!</div>
    <div id="inventory"></div>
</div>

<div id="start-screen" class="modal">
    <h1 style="font-family: 'Pirata One'; font-size: 80px; color: var(--gold);">BLACK FLAG</h1>
    <input type="text" id="p-name" placeholder="Geminin Adını Yaz..." maxlength="12">
    <button class="btn" onclick="initGame()">DENİZE AÇIL</button>
</div>

<div id="death-screen" class="modal hidden">
    <h1 style="color: var(--danger); font-family: 'Pirata One'; font-size: 60px;">GEMİN BATTI!</h1>
    <p id="death-info">Tüm altınların denizin dibine karıştı...</p>
    <button class="btn" onclick="location.reload()">YENİDEN DENE</button>
</div>

<canvas id="game"></canvas>

<script>
/** 🔊 SES MOTORU **/
const SFX = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    play(f, t, d, v) {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
        g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime+d);
        o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d);
    },
    shoot() { this.play(150, 'triangle', 0.2, 0.1); },
    hit() { this.play(80, 'sawtooth', 0.1, 0.1); },
    pirate() { this.play(200, 'square', 0.5, 0.05); } // Korsan/Zombi hırıltısı simülasyonu
};

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 1200; canvas.height = 850;

let player, entities = [], bullets = [], particles = [];
let gold = 0, gameTime = 0, isDay = true, gameState = 'START';
const keys = {}; const mouse = {x:0, y:0, down:false};

// Koordinat Sabitleri
const MARKET_POS = {x: 100, y: 100, r: 80};
const ISLAND_POS = {x: 1000, y: 700, r: 100};
let islandHP = 5000;
let marketOccupied = true;

class Player {
    constructor(name) {
        this.name = name; this.x = 600; this.y = 425; this.r = 20;
        this.hp = 100; this.maxHp = 100; this.speed = 3; this.dmg = 35;
        this.angle = 0;
    }
    update() {
        let vx = 0, vy = 0;
        if(keys['w']) vy -= this.speed; if(keys['s']) vy += this.speed;
        if(keys['a']) vx -= this.speed; if(keys['d']) vx += this.speed;
        this.x = Math.max(20, Math.min(1180, this.x + vx));
        this.y = Math.max(20, Math.min(830, this.y + vy));
        this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        ctx.fillStyle = '#8b4513'; ctx.fillRect(-25, -12, 50, 24); // Gemi gövdesi
        ctx.fillStyle = '#fff'; ctx.fillRect(-5, -20, 10, 40); // Yelken
        ctx.restore();
    }
}

class Entity {
    constructor(type, x, y) {
        this.type = type; // 'monster', 'pirate', 'raider'
        this.x = x; this.y = y; this.r = type === 'monster' ? 40 : 18;
        this.hp = type === 'monster' ? 300 : 100;
        this.speed = type === 'raider' ? 2.5 : 1.5;
        this.color = {monster: '#8e44ad', pirate: '#c0392b', raider: '#d35400'}[type];
    }
    update() {
        if(this.type !== 'monster') {
            const target = (this.type === 'raider' && gameTime % 18000 < 3000) ? ISLAND_POS : player;
            const dist = Math.hypot(target.x - this.x, target.y - this.y);
            if(dist < 400 || this.type === 'raider') {
                const ang = Math.atan2(target.y - this.y, target.x - this.x);
                this.x += Math.cos(ang) * this.speed;
                this.y += Math.sin(ang) * this.speed;
            }
        }
    }
    draw() {
        ctx.strokeStyle = this.color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.stroke();
        // HP Bar
        ctx.fillStyle = '#f00'; ctx.fillRect(this.x-20, this.y-this.r-10, 40, 4);
        ctx.fillStyle = '#0f0'; ctx.fillRect(this.x-20, this.y-this.r-10, 40 * (this.hp/(this.type==='monster'?300:100)), 4);
    }
}

function initGame() {
    const name = document.getElementById('p-name').value || "Kaptan";
    player = new Player(name);
    document.getElementById('player-name-ui').innerText = name;
    document.getElementById('start-screen').classList.add('hidden');
    gameState = 'PLAYING';
    spawnStaticMonsters();
    spawnMarketGuards();
    requestAnimationFrame(gameLoop);
}

function spawnStaticMonsters() {
    for(let i=0; i<8; i++) {
        entities.push(new Entity('monster', Math.random()*1000 + 100, Math.random()*600 + 100));
    }
}

function spawnMarketGuards() {
    marketOccupied = true;
    for(let i=0; i<4; i++) {
        entities.push(new Entity('pirate', MARKET_POS.x + (Math.random()-0.5)*100, MARKET_POS.y + (Math.random()-0.5)*100));
    }
}

function buyItem(type) {
    if(type === 'repair' && gold >= 500) {
        gold -= 500; player.hp = player.maxHp;
        addPluginTag("TAMİR KİTİ");
    } else if(type === 'dmg' && gold >= 1000) {
        gold -= 1000; player.dmg += 20;
        addPluginTag("KESKİN GÜLLE");
    }
}

function addPluginTag(txt) {
    const tag = document.createElement('div');
    tag.className = 'plugin-tag'; tag.innerText = txt;
    document.getElementById('inventory').appendChild(tag);
}

function gameLoop() {
    if(gameState !== 'PLAYING') return;
    gameTime++;

    // Gün/Gece Döngüsü (1 Dakika Gündüz, 1 Dakika Gece - Toplam 7200 frame civarı)
    isDay = (gameTime % 7200) < 3600;
    document.getElementById('time-txt').innerText = isDay ? "GÜNDÜZ (Yamyamlar Aktif)" : "GECE (Korsanlar Aktif)";
    
    // Arkaplan
    ctx.fillStyle = isDay ? '#005b8e' : '#050a14';
    ctx.fillRect(0,0,1200,850);
    
    // Güneş / Ay
    ctx.fillStyle = isDay ? '#f1c40f' : '#ecf0f1';
    ctx.beginPath(); ctx.arc(isDay?100:1100, 100, 40, 0, Math.PI*2); ctx.fill();

    // Market ve Ada Görseli
    ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(MARKET_POS.x, MARKET_POS.y, MARKET_POS.r, 0, Math.PI*2); ctx.fill(); // Market Kayalığı
    ctx.fillStyle = '#2d5a27'; ctx.beginPath(); ctx.arc(ISLAND_POS.x, ISLAND_POS.y, ISLAND_POS.r, 0, Math.PI*2); ctx.fill(); // Kendi Adamız
    
    // Market Kontrolü
    const distToMarket = Math.hypot(player.x - MARKET_POS.x, player.y - MARKET_POS.y);
    const guards = entities.filter(e => e.type === 'pirate');
    marketOccupied = guards.length > 0;
    document.getElementById('market-ui').style.display = (distToMarket < 150 && !marketOccupied) ? 'block' : 'none';

    // Periyodik Korsan Baskını (Her 3 Dakikada bir - 10800 frame)
    if(gameTime % 10800 === 9000) { // Baskından 30 sn önce
        const alert = document.getElementById('alert-text');
        alert.innerText = "30 SANİYE SONRA ADANIZA BASKIN YAPILACAK!"; alert.style.opacity = 1;
        setTimeout(() => alert.style.opacity = 0, 5000);
    }
    if(gameTime % 10800 === 0) {
        for(let i=0; i<15; i++) entities.push(new Entity('raider', 0, Math.random()*850));
    }

    // Market Korumaları Spawn (Her 1 dakikada)
    if(gameTime % 3600 === 0 && guards.length === 0) spawnMarketGuards();

    player.update(); player.draw();

    // Ateş Etme
    if(mouse.down && gameTime % 15 === 0) {
        const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        bullets.push({x: player.x, y: player.y, vx: Math.cos(ang)*12, vy: Math.sin(ang)*12});
        SFX.shoot();
    }

    // Varlıklar İşleme
    entities.forEach((en, ei) => {
        en.update(); en.draw();
        
        // Oyuncuya saldırı
        const d = Math.hypot(en.x - player.x, en.y - player.y);
        if(d < en.r + player.r) {
            player.hp -= 0.5;
            if(player.hp <= 0) {
                gameState = 'DEAD';
                document.getElementById('death-screen').classList.remove('hidden');
            }
        }

        // Adaya saldırı
        if(en.type === 'raider') {
            const di = Math.hypot(en.x - ISLAND_POS.x, en.y - ISLAND_POS.y);
            if(di < en.r + ISLAND_POS.r) islandHP -= 20;
        }

        // Mermi Çarpışma
        bullets.forEach((b, bi) => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < en.r) {
                en.hp -= player.dmg; bullets.splice(bi, 1);
                SFX.hit();
                if(en.hp <= 0) {
                    gold += 100; entities.splice(ei, 1);
                    if(en.type === 'pirate') SFX.pirate();
                }
            }
        });
    });

    bullets.forEach((b, i) => { 
        b.x += b.vx; b.y += b.vy; 
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
        if(b.x<0 || b.x>1200 || b.y<0 || b.y>850) bullets.splice(i,1);
    });

    // UI Güncelleme
    document.getElementById('hp-fill').style.width = player.hp + '%';
    document.getElementById('island-hp-fill').style.width = (islandHP/5000*100) + '%';
    document.getElementById('gold-txt').innerText = gold;

    requestAnimationFrame(gameLoop);
}

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => { mouse.down = true; if(SFX.ctx.state === 'suspended') SFX.ctx.resume(); };
window.onmouseup = () => mouse.down = false;

</script>
</body>
</html>
