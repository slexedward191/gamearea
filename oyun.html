<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Neon Vault: Celebrity Escape</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-green: #0dff00; --bg: #020205; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Orbitron', sans-serif; color: white; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        
        /* GİRİŞ EKRANI */
        #login-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        input { 
            background: transparent; border: 2px solid var(--neon-blue); color: white;
            padding: 15px; font-size: 20px; font-family: 'Orbitron'; text-align: center; margin: 20px;
            box-shadow: 0 0 15px var(--neon-blue); outline: none;
        }
        .btn { 
            background: var(--neon-blue); border: none; padding: 15px 40px; 
            font-family: 'Syncopate'; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--neon-blue); }

        /* OYUN UI */
        #hud {
            position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; gap: 5px;
        }
        .celeb-frame {
            position: absolute; top: 20px; right: 20px; width: 150px; height: 150px;
            border: 3px solid var(--neon-pink); border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 20px var(--neon-pink); opacity: 0.8;
        }
        .celeb-frame img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="font-family: 'Syncopate'; font-size: 40px; color: var(--neon-blue);">NEON VAULT PRO</h1>
    <input type="text" id="player-name" placeholder="ADINI YAZ ŞAMPİYON" maxlength="12">
    <button class="btn" onclick="Game.init()">SİSTEME GİR</button>
</div>

<div id="hud">
    <div style="font-size: 20px; color: var(--neon-blue);">PLAYER: <span id="ui-name">---</span></div>
    <div style="font-size: 14px;">LEVEL: <span id="ui-lvl">1</span></div>
    <div style="font-size: 12px; color: var(--neon-pink);">STATUS: <span id="ui-celeb">PENDING</span></div>
</div>

<div class="celeb-frame" id="celeb-box">
    <img src="" id="celeb-img" alt="Celebrity">
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * PROFESYONEL SES VE MÜZİK ÜRETECİ (Dinamik)
 */
const AudioEngine = {
    ctx: null,
    osc: null,
    init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.playMusic(); },
    play(f, t, d, v=0.1) {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
        g.gain.setValueAtTime(v, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + d);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + d);
    },
    playMusic() {
        setInterval(() => {
            const notes = [110, 147, 165, 196]; // Deep bass notes
            this.play(notes[Game.level % 4], 'sine', 0.5, 0.2); // Her level değişen temel nota
            if(Math.random() > 0.7) this.play(800 + Math.random()*1000, 'square', 0.1, 0.02);
        }, 400);
    }
};

/**
 * OYUN MOTORU (PROFESSIONAL DESIGN)
 */
const Game = {
    canvas: document.getElementById('gameCanvas'),
    ctx: null,
    level: 1, playerName: "",
    player: { x: 50, y: 50, vx: 0, vy: 0, w: 25, h: 25, jumps: 0, maxJumps: 2 },
    platforms: [], lasers: [], movingCrushers: [],
    celebrities: [
        { name: "ELON MUSK", img: "https://picsum.photos/200/200?sig=1" },
        { name: "CRISTIANO RONALDO", img: "https://picsum.photos/200/200?sig=2" },
        { name: "MR BEAST", img: "https://picsum.photos/200/200?sig=3" },
        { name: "STEVE JOBS", img: "https://picsum.photos/200/200?sig=4" },
        { name: "TARKAN", img: "https://picsum.photos/200/200?sig=5" }
    ],

    init() {
        this.playerName = document.getElementById('player-name').value || "PLAYER1";
        if(this.playerName === "ADINI YAZ ŞAMPİYON") this.playerName = "GHOST";
        document.getElementById('ui-name').innerText = this.playerName.toUpperCase();
        document.getElementById('login-overlay').style.display = 'none';
        
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        
        AudioEngine.init();
        
        window.addEventListener('keydown', e => this.handleInput(e, true));
        window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
        this.keys = {};

        this.loadLevel(1);
        this.loop();
    },

    loadLevel(n) {
        this.level = n;
        this.player.x = 100; this.player.y = 100; this.player.vx = 0; this.player.vy = 0;
        
        // Seviye Verileri
        const celeb = this.celebrities[(n-1) % this.celebrities.length];
        document.getElementById('celeb-img').src = celeb.img;
        document.getElementById('ui-celeb').innerText = celeb.name;
        document.getElementById('ui-lvl').innerText = n;

        // Oda Tasarımı (Kare Oda)
        const W = this.canvas.width; const H = this.canvas.height;
        this.platforms = [
            { x: 0, y: 0, w: W, h: 20 }, // Tavan
            { x: 0, y: H-20, w: W, h: 20 }, // Yer
            { x: 0, y: 0, w: 20, h: H }, // Sol Duvar
            { x: W-20, y: 0, w: 20, h: H }, // Sağ Duvar
            { x: 100, y: 200, w: 200, h: 20 } // Start platform
        ];

        // Hareketli Engeller (Yukarı-Aşağı Giden Bloklar)
        this.movingCrushers = [];
        for(let i=0; i<3+(n%4); i++) {
            this.movingCrushers.push({
                x: 400 + (i*250), y: 100, w: 40, h: 40, 
                range: 300, speed: 2 + (n*0.5), offset: Math.random()*Math.PI*2
            });
        }

        // Lazerler (Sağa Sola Giden İnce Işınlar)
        this.lasers = [];
        if(n > 1) {
            for(let i=0; i<2; i++) {
                this.lasers.push({
                    y: 300 + (i*200), x: 100, w: 200, h: 5, 
                    dir: 1, speed: 5 + n
                });
            }
        }

        // Çıkış Kapısı (Farklı Köşe)
        this.exit = { x: W - 100, y: H - 120, w: 50, h: 80 };
    },

    handleInput(e, state) {
        let k = e.key.toLowerCase();
        if(state && (k === ' ' || k === 'w' || k === 'arrowup')) {
            if(this.player.jumps < this.player.maxJumps) {
                this.player.vy = -10;
                this.player.jumps++;
                AudioEngine.play(200 + (this.player.jumps*100), 'triangle', 0.2);
            }
        }
        this.keys[k] = state;
    },

    update() {
        const p = this.player;
        const gravity = 0.45; // Azıcık yerçekimi

        if(this.keys['a'] || this.keys['arrowleft']) p.vx -= 0.8;
        if(this.keys['d'] || this.keys['arrowright']) p.vx += 0.8;
        
        p.vy += gravity;
        p.vx *= 0.9;
        p.x += p.vx; p.y += p.vy;

        // Platform Çarpışma
        this.platforms.forEach(plat => {
            if(p.x < plat.x + plat.w && p.x + p.w > plat.x && p.y < plat.y + plat.h && p.y + p.h > plat.y) {
                let overlapX = Math.min(p.x + p.w - plat.x, plat.x + plat.w - p.x);
                let overlapY = Math.min(p.y + p.h - plat.y, plat.y + plat.h - p.y);
                if(overlapX > overlapY) {
                    if(p.vy > 0 && p.y < plat.y) { p.y = plat.y - p.h; p.vy = 0; p.jumps = 0; }
                    else if(p.vy < 0) { p.y = plat.y + plat.h; p.vy = 0; }
                } else {
                    if(p.vx > 0) p.x = plat.x - p.w; else p.x = plat.x + plat.w;
                    p.vx = 0;
                }
            }
        });

        // Hareketli Engel Mantığı
        this.movingCrushers.forEach(c => {
            c.y = 200 + Math.sin(Date.now()*0.002 * c.speed + c.offset) * c.range/2;
            if(p.x < c.x + c.w && p.x + p.w > c.x && p.y < c.y + c.h && p.y + p.h > c.y) this.die();
        });

        // Lazer Mantığı
        this.lasers.forEach(l => {
            l.x += l.speed * l.dir;
            if(l.x > this.canvas.width - 300 || l.x < 100) l.dir *= -1;
            if(p.x < l.x + l.w && p.x + p.w > l.x && p.y < l.y + l.h && p.y + p.h > l.y) this.die();
        });

        // Çıkış Kontrolü
        if(p.x < this.exit.x + this.exit.w && p.x + p.w > this.exit.x && p.y < this.exit.y + this.exit.h && p.y + p.h > this.exit.y) {
            AudioEngine.play(800, 'sine', 0.5);
            this.loadLevel(this.level + 1);
        }
    },

    die() {
        AudioEngine.play(100, 'sawtooth', 0.3);
        this.loadLevel(this.level);
    },

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Odadaki Izgara Efekti
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
        for(let i=0; i<this.canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,this.canvas.height); ctx.stroke(); }

        // Platformlar
        ctx.shadowBlur = 10; ctx.shadowColor = varName('--neon-blue');
        ctx.fillStyle = '#101020';
        this.platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        // Hareketli Crushers
        ctx.fillStyle = '#ff0055'; ctx.shadowColor = '#ff0055';
        this.movingCrushers.forEach(c => ctx.fillRect(c.x, c.y, c.w, c.h));

        // Lazerler
        ctx.fillStyle = varName('--neon-green'); ctx.shadowColor = varName('--neon-green');
        this.lasers.forEach(l => ctx.fillRect(l.x, l.y, l.w, l.h));

        // Çıkış Kapısı
        ctx.fillStyle = '#0dff00'; ctx.globalAlpha = 0.3; ctx.fillRect(this.exit.x, this.exit.y, this.exit.w, this.exit.h); ctx.globalAlpha = 1;

        // Player (Neon Cube)
        ctx.fillStyle = 'white'; ctx.shadowBlur = 20; ctx.shadowColor = 'white';
        ctx.fillRect(this.player.x, this.player.y, this.player.w, this.player.h);
        
        ctx.shadowBlur = 0;
        requestAnimationFrame(() => { this.update(); this.draw(); });
    }
};

function varName(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
</script>
</body>
</html>
