<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Supermarket Simulator</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
color:white;
padding:12px;
border-radius:10px;
width:220px;
}
#centerMsg{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:24px;
}
</style>
</head>
<body>

<div id="hud"></div>
<div id="centerMsg">Tıklayın ve Başlayın</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* IŞIK */
let light = new THREE.HemisphereLight(0xffffff,0x444444,1.2);
scene.add(light);

/* ZEMİN */
let floorGeo = new THREE.PlaneGeometry(60,60);
let floorMat = new THREE.MeshStandardMaterial({color:0xdddddd});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* RAF OLUŞTUR */
function createShelf(x,z){
let shelfGeo = new THREE.BoxGeometry(4,4,1);
let shelfMat = new THREE.MeshStandardMaterial({color:0x8b5a2b});
let shelf = new THREE.Mesh(shelfGeo,shelfMat);
shelf.position.set(x,2,z);
scene.add(shelf);
}

/* Rafları diz */
for(let i=-20;i<=20;i+=10){
createShelf(i,-10);
createShelf(i,10);
}

/* ÜRÜNLER */
let products=[];
const productTypes=[
{ name:"Süt", color:0xffffff },
{ name:"Elma", color:0xff0000 },
{ name:"Ekmek", color:0xffd700 },
{ name:"Su", color:0x3399ff }
];

function spawnProducts(){
productTypes.forEach((p,i)=>{
let geo = new THREE.BoxGeometry(1,1,1);
let mat = new THREE.MeshStandardMaterial({color:p.color});
let item = new THREE.Mesh(geo,mat);

item.position.set(-15+i*10,1,-10);
item.productName = p.name;

scene.add(item);
products.push(item);
});
}
spawnProducts();

/* KASA */
let kasaGeo = new THREE.BoxGeometry(4,2,2);
let kasaMat = new THREE.MeshStandardMaterial({color:0x333333});
let kasa = new THREE.Mesh(kasaGeo,kasaMat);
kasa.position.set(0,1,20);
scene.add(kasa);

/* PLAYER */
camera.position.set(0,2,30);

let keys={};
document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;

if(e.key.toLowerCase()==="e") interact();
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* POINTER LOCK */
document.body.addEventListener("click",()=>{
renderer.domElement.requestPointerLock();
document.getElementById("centerMsg").style.display="none";
});

let yaw=0;
document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===renderer.domElement){
yaw -= e.movementX*0.002;
camera.rotation.y = yaw;
}
});

/* GAME LOGIC */
let shoppingList=["Süt","Elma"];
let cart=[];
let timeLeft=120;
let score=0;

function interact(){
let raycaster=new THREE.Raycaster();
raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
let intersects=raycaster.intersectObjects(products);

if(intersects.length>0){
let hit=intersects[0].object;
cart.push(hit.productName);
scene.remove(hit);
products.splice(products.indexOf(hit),1);
}

let kasaDist=camera.position.distanceTo(kasa.position);
if(kasaDist<3){
checkOut();
}
}

function checkOut(){
let success=true;
shoppingList.forEach(item=>{
if(!cart.includes(item)) success=false;
});
if(success){
score+=100;
shoppingList=["Su","Ekmek"];
cart=[];
alert("Alışveriş Tamamlandı!");
}else{
alert("Eksik Ürün Var!");
}
}

/* UPDATE */
function update(){

if(keys["w"]) camera.position.z -= Math.cos(yaw)*0.2;
if(keys["s"]) camera.position.z += Math.cos(yaw)*0.2;
if(keys["a"]) camera.position.x -= Math.cos(yaw)*0.2;
if(keys["d"]) camera.position.x += Math.cos(yaw)*0.2;

timeLeft-=0.01;
if(timeLeft<=0){
alert("Süre Bitti! Skor: "+score);
location.reload();
}

document.getElementById("hud").innerHTML=
"<b>Alışveriş Listesi</b><br>"+shoppingList.join("<br>")+
"<br><br><b>Sepet</b><br>"+cart.join("<br>")+
"<br><br>Süre: "+Math.floor(timeLeft)+
"<br>Skor: "+score+
"<br><br>E = Al / Kasa";
}

/* LOOP */
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
