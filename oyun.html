<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pro Fishing HTML5</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 5px solid #fff; background: linear-gradient(#87CEEB, #1E90FF); cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Oyun Değişkenleri
        let score = 0;
        let fish = { x: 400, y: 300, vx: 2, vy: 1 };
        let hook = { x: 400, y: 100, isMoving: false };

        // Oyun Döngüsü (Game Loop)
        function update() {
            // Balık hareketi
            fish.x += fish.vx;
            fish.y += fish.vy;
            if (fish.x < 0 || fish.x > 800) fish.vx *= -1;
            if (fish.y < 200 || fish.y > 550) fish.vy *= -1;

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            // Çizim: Balık
            ctx.fillStyle = "orange";
            ctx.fillRect(fish.x, fish.y, 40, 20);

            // Çizim: Olta
            ctx.strokeStyle = "white";
            ctx.beginPath();
            ctx.moveTo(400, 0);
            ctx.lineTo(hook.x, hook.y);
            ctx.stroke();
            ctx.fillStyle = "gray";
            ctx.fillRect(hook.x-5, hook.y, 10, 10);
            
            // Skor
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Skor: " + score, 20, 30);
        }

        canvas.addEventListener('mousemove', (e) => {
            hook.x = e.clientX - canvas.offsetLeft;
            hook.y = e.clientY - canvas.offsetTop;
        });

        canvas.addEventListener('click', () => {
            // Basit vuruş algılama
            if(Math.abs(hook.x - fish.x) < 50 && Math.abs(hook.y - fish.y) < 50) {
                score += 10;
                fish.x = Math.random() * 700;
            }
        });

        update();
    </script>
</body>
</html>
