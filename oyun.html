<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Diep.io Clone</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
    }
    canvas {
        display: block;
        background: #1e1e1e;
    }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let bullets = [];
let enemies = [];
let xp = 0;
let level = 1;

const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    radius: 25,
    speed: 4,
    angle: 0,
    color: "cyan"
};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e => {
    const dx = e.clientX - player.x;
    const dy = e.clientY - player.y;
    player.angle = Math.atan2(dy, dx);
});

canvas.addEventListener("mousedown", () => {
    bullets.push({
        x: player.x,
        y: player.y,
        dx: Math.cos(player.angle)*8,
        dy: Math.sin(player.angle)*8,
        radius: 6
    });
});

function spawnEnemy() {
    enemies.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: 30,
        hp: 3
    });
}

setInterval(spawnEnemy, 1500);

function update() {
    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    bullets.forEach((b, i) => {
        b.x += b.dx;
        b.y += b.dy;

        enemies.forEach((e, j) => {
            if(Math.abs(b.x - e.x) < e.size/2 &&
               Math.abs(b.y - e.y) < e.size/2) {
                e.hp--;
                bullets.splice(i,1);
                if(e.hp <= 0){
                    enemies.splice(j,1);
                    xp += 10;
                    if(xp >= level*50){
                        xp = 0;
                        level++;
                        player.radius += 3;
                    }
                }
            }
        });
    });

    bullets = bullets.filter(b =>
        b.x>0 && b.x<canvas.width &&
        b.y>0 && b.y<canvas.height);
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);

    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(0,0,player.radius,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.fillRect(0,-5,40,10);

    ctx.restore();
}

function drawBullets(){
    ctx.fillStyle = "yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fill();
    });
}

function drawEnemies(){
    ctx.fillStyle = "orange";
    enemies.forEach(e=>{
        ctx.fillRect(e.x-e.size/2,e.y-e.size/2,e.size,e.size);
    });
}

function drawUI(){
    ctx.fillStyle="white";
    ctx.font="20px Arial";
    ctx.fillText("Level: "+level,20,30);
    ctx.fillText("XP: "+xp+"/"+(level*50),20,60);
}

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    update();
    drawPlayer();
    drawBullets();
    drawEnemies();
    drawUI();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
