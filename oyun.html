<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ABYSS ENGINE v3 | Kaptan'ın Gazabı</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --neon: #00f2ff; --crimson: #ff0044; --fog: rgba(0, 30, 60, 0.4); }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Pirata One', cursive; }
        
        /* --- DİNAMIK UI PANELİ --- */
        #game-ui { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .top-left { position: absolute; top: 20px; left: 20px; width: 350px; pointer-events: auto; }
        .glass-morphism { 
            background: rgba(0, 15, 30, 0.85); border: 2px solid var(--gold); 
            padding: 20px; border-radius: 0 30px 0 30px; backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        
        /* BARLAR */
        .bar-wrap { background: #111; height: 15px; border-radius: 10px; border: 1px solid #444; margin: 10px 0; overflow: hidden; }
        .bar-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #800000); transition: 0.4s; }
        .bar-xp { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #0044ff); transition: 0.4s; }
        .bar-shield { width: 0%; height: 100%; background: #00ff88; transition: 0.2s; }

        /* YETENEK SLOTLARI */
        .skills { display: flex; gap: 10px; margin-top: 15px; }
        .skill-slot { 
            width: 50px; height: 50px; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.5); display: flex; align-items: center; 
            justify-content: center; font-family: 'Orbitron'; font-size: 12px; color: var(--neon);
        }
        .ready { background: rgba(0, 242, 255, 0.2); }

        /* RADAR */
        #radar { 
            position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px; 
            border: 4px solid var(--gold); border-radius: 50%; background: rgba(0,10,20,0.95);
            pointer-events: auto; box-shadow: 0 0 50px #000;
        }

        canvas { display: block; }
        #weather-fx { position: absolute; inset: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="top-left glass-morphism">
        <div style="font-size: 35px; color: var(--gold); letter-spacing: 2px;">KAPTAN <span id="cap-name">---</span></div>
        <div style="display:flex; justify-content: space-between; color: #0f0; font-family: 'Orbitron'; font-size: 14px;">
            <span>ALTIN: <b id="gold-val">1500</b></span>
            <span>LEVEL: <b id="lvl-val">1</b></span>
        </div>
        <div class="bar-wrap"><div id="hp-bar" class="bar-hp"></div></div>
        <div class="bar-wrap"><div id="shield-bar" class="bar-shield"></div></div>
        <div class="bar-wrap"><div id="xp-bar" class="bar-xp"></div></div>
        
        <div class="skills">
            <div id="skill-q" class="skill-slot ready">Q<br>HIZ</div>
            <div id="skill-e" class="skill-slot ready">E<br>KALKAN</div>
            <div id="skill-r" class="skill-slot ready">R<br>YAĞMUR</div>
        </div>
    </div>
</div>

<div id="radar"><canvas id="radar-cvs"></canvas></div>
<div id="weather-fx"></div>

<canvas id="game"></canvas>

<script>
/**
 * PLUGIN 1: WEATHER & AMBIENCE SYSTEM
 */
const Weather = {
    isThunder: false,
    fogDensity: 0.1,
    update() {
        if(Math.random() > 0.998) this.thunderStrike();
    },
    thunderStrike() {
        document.body.style.background = "#fff";
        setTimeout(() => document.body.style.background = "#000", 50);
        setTimeout(() => document.body.style.background = "#fff", 30);
        setTimeout(() => document.body.style.background = "#000", 100);
    }
};

/**
 * MODULE 2: PHYSICS & CORE ENGINE
 */
const Engine = {
    canvas: document.getElementById('game'),
    ctx: null,
    worldSize: 10000,
    entities: [],
    bullets: [],
    particles: [],
    loots: [],
    
    init() {
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.player = new Ship(5000, 5000, true);
        this.name = prompt("Gemi Adını Belirle Kaptan:") || "Kara İnci";
        document.getElementById('cap-name').innerText = this.name.toUpperCase();
        
        this.loop();
        for(let i=0; i<20; i++) this.spawnAI();
    },
    
    spawnAI() {
        this.entities.push(new Ship(Math.random()*this.worldSize, Math.random()*this.worldSize, false));
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    },

    update() {
        Weather.update();
        this.player.update();
        
        this.bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy; b.life--;
            if(b.life < 0) this.bullets.splice(i, 1);
            
            this.entities.forEach((en, ei) => {
                if(Math.hypot(b.x - en.x, b.y - en.y) < 40) {
                    en.hp -= 25;
                    this.bullets.splice(i, 1);
                    this.createEffect(en.x, en.y, 'orange', 10);
                    if(en.hp <= 0) {
                        this.loots.push({x: en.x, y: en.y, type: 'gold', val: 500});
                        this.entities.splice(ei, 1);
                        this.player.xp += 200;
                        this.spawnAI();
                    }
                }
            });
        });

        this.entities.forEach(en => en.updateAI(this.player));
        
        this.loots.forEach((l, i) => {
            if(Math.hypot(this.player.x - l.x, this.player.y - l.y) < 60) {
                this.player.gold += l.val;
                this.loots.splice(i, 1);
                this.updateUI();
            }
        });

        this.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) this.particles.splice(i, 1);
        });

        if(this.player.xp >= 1000) {
            this.player.lvl++;
            this.player.xp = 0;
            this.updateUI();
        }
    },

    createEffect(x, y, color, count) {
        for(let i=0; i<count; i++) this.particles.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color
        });
    },

    updateUI() {
        document.getElementById('hp-bar').style.width = this.player.hp + "%";
        document.getElementById('xp-bar').style.width = (this.player.xp / 10) + "%";
        document.getElementById('gold-val').innerText = this.player.gold;
        document.getElementById('lvl-val').innerText = this.player.lvl;
        document.getElementById('shield-bar').style.width = this.player.shield + "%";
    },

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        ctx.save();
        ctx.translate(this.canvas.width/2 - this.player.x, this.canvas.height/2 - this.player.y);

        // Okyanus Çizimi
        ctx.fillStyle = '#00081a';
        ctx.fillRect(0,0, this.worldSize, this.worldSize);

        // Ganimetler
        this.loots.forEach(l => {
            ctx.fillStyle = 'gold'; ctx.shadowBlur = 20; ctx.shadowColor = 'gold';
            ctx.beginPath(); ctx.arc(l.x, l.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Düşmanlar
        this.entities.forEach(en => en.draw(ctx));
        
        // Oyuncu
        this.player.draw(ctx);

        // Mermiler ve Efektler
        this.bullets.forEach(b => {
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
        });
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3);
        });

        ctx.restore();
        this.drawRadar();
    },

    drawRadar() {
        const rC = document.getElementById('radar-cvs');
        const rCtx = rC.getContext('2d');
        rC.width = 220; rC.height = 220;
        rCtx.fillStyle = 'rgba(0,20,40,0.8)'; rCtx.fillRect(0,0,220,220);
        const s = 220 / this.worldSize;
        rCtx.fillStyle = '#00f2ff'; rCtx.fillRect(this.player.x*s, this.player.y*s, 6, 6);
        rCtx.fillStyle = 'red';
        this.entities.forEach(en => rCtx.fillRect(en.x*s, en.y*s, 4, 4));
    }
};

/**
 * CLASS: SHIP (Dinamik Gemi Sınıfı)
 */
class Ship {
    constructor(x, y, isPlayer) {
        this.x = x; this.y = y; this.angle = 0; this.speed = 0;
        this.hp = 100; this.shield = 0; this.gold = 0; this.xp = 0; this.lvl = 1;
        this.isPlayer = isPlayer;
    }

    update() {
        // Kontroller
        if(keys['KeyW']) this.speed = Math.min(this.speed + 0.1, 5);
        else if(keys['KeyS']) this.speed = Math.max(this.speed - 0.1, -2);
        else this.speed *= 0.98;

        if(keys['KeyA']) this.angle -= 0.04;
        if(keys['KeyD']) this.angle += 0.04;

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Yetenekler
        if(keys['KeyQ']) { this.speed = 10; Engine.createEffect(this.x, this.y, 'cyan', 2); }
        if(keys['KeyE']) { this.shield = 100; }
        if(this.shield > 0) this.shield -= 0.2;
    }

    updateAI(player) {
        if(this.isPlayer) return;
        const d = Math.hypot(player.x - this.x, player.y - this.y);
        if(d < 800) {
            this.angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
            this.speed = 2;
            if(d < 400 && Math.random() > 0.98) this.fire();
        }
    }

    fire() {
        Engine.bullets.push({
            x: this.x, y: this.y, 
            vx: Math.cos(this.angle) * 10, vy: Math.sin(this.angle) * 10,
            life: 100
        });
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle + Math.PI/2);
        
        // Gemi Gövdesi
        ctx.fillStyle = this.isPlayer ? '#3d2b1f' : '#222';
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(25, 20); ctx.lineTo(-25, 20); ctx.closePath(); ctx.fill();
        
        // Kalkan Efekti
        if(this.shield > 0) {
            ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.stroke();
        }

        ctx.fillStyle = 'white'; ctx.fillRect(-5, -10, 10, 25); // Yelken
        ctx.restore();
    }
}

const keys = {};
window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'Space') Engine.player.fire(); };
window.onkeyup = (e) => keys[e.code] = false;

Engine.init();
</script>
</body>
</html>
