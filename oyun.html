<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Korsanlar Kralı - Eğitim Modu</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc33; --crimson: #8b0000; --sea: #001221; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        
        /* GİRİŞ EKRANI */
        #auth-overlay { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 1000; }
        .auth-box { width: 400px; padding: 30px; background: #0a141d; border: 2px solid var(--gold); text-align: center; color: white; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #1a2533; border: 1px solid #444; color: #fff; }
        .btn { padding: 12px 25px; cursor: pointer; font-weight: bold; border: none; margin: 5px; font-family: 'Cinzel'; }
        .btn-gold { background: var(--gold); color: #000; }

        /* NPC EĞİTİM SİSTEMİ */
        #npc-overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 800px; height: 200px; background: rgba(10, 20, 30, 0.95);
            border: 3px solid var(--gold); display: none; z-index: 2000;
            padding: 20px; box-sizing: border-box; border-radius: 15px;
        }
        .npc-portrait {
            position: absolute; left: -100px; bottom: 0; width: 250px;
            filter: drop-shadow(0 0 15px var(--gold));
        }
        .npc-text-box { margin-left: 150px; color: white; }
        .npc-name { font-family: 'Pirata One'; color: var(--gold); font-size: 32px; margin: 0; }
        .npc-dialog { font-size: 18px; line-height: 1.4; margin-top: 10px; font-style: italic; }

        /* OYUN HUD */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: none; pointer-events: none; z-index: 100; color: var(--gold); font-family: 'Pirata One'; font-size: 24px; }
        canvas { background: var(--sea); display: none; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="font-family: 'Pirata One'; font-size: 45px; color: var(--gold);">KORSANLAR KRALI</h1>
        <input type="text" id="u" placeholder="Kaptan Adı">
        <input type="password" id="p" placeholder="Şifre">
        <button class="btn btn-gold" onclick="login()">DENİZE AÇIL</button>
    </div>
</div>

<div id="npc-overlay">
    <img src="https://cdna.artstation.com/p/assets/images/images/021/325/252/original/shane-whelan-pirate-render-01.jpg" class="npc-portrait" alt="Kaptan Sakal">
    <div class="npc-text-box">
        <p class="npc-name">Kaptan Sakal</p>
        <p class="npc-dialog" id="dialog-text">Buralarda yeni bir yüz ha? Dinle evlat, bu denizlerde hayatta kalmak istiyorsan gemini kullanmayı öğrenmelisin!</p>
        <button class="btn btn-gold" id="npc-btn" onclick="nextTutorial()" style="float: right;">Devam Et</button>
    </div>
</div>

<div id="game-ui">
    ALTIN: <span id="ui-gold">0</span> | HP: <span id="ui-hp">100</span> | [M] MARKET
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let player = { x: 400, y: 300, angle: 0, speed: 0, hp: 100, gold: 0 };
    let tutorialStep = 0;
    let keys = {};

    function login() {
        document.getElementById('auth-overlay').style.display = 'none';
        canvas.style.display = 'block';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('npc-overlay').style.display = 'block';
        resize();
        requestAnimationFrame(loop);
    }

    // EĞİTİM ADIMLARI
    const dialogs = [
        "Buralarda yeni bir yüz ha? Dinle evlat, bu denizlerde hayatta kalmak istiyorsan gemini kullanmayı öğrenmelisin!",
        "Gemiye yön vermek için [W-A-S-D] tuşlarını kullan. Hadi bir tur at bakalım!",
        "Güzel! Şimdi o topları ateşleme vakti. [BOŞLUK] tuşuna basarak gülle fırlatabilirsin.",
        "Düşmanları batırdıkça altın kazanırsın. [M] tuşuna basarak Tersane'ye uğra ve gemini güçlendir.",
        "Şimdi hazırsın evlat. Unutma, Kızıl Deniz'de sadece en güçlüler kral olur. Rastgele!"
    ];

    function nextTutorial() {
        tutorialStep++;
        if(tutorialStep < dialogs.length) {
            document.getElementById('dialog-text').innerText = dialogs[tutorialStep];
        } else {
            document.getElementById('npc-overlay').style.display = 'none';
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        if(keys['KeyW']) player.speed = Math.min(player.speed + 0.1, 3);
        else player.speed *= 0.98;
        if(keys['KeyA']) player.angle -= 0.04;
        if(keys['KeyD']) player.angle += 0.04;

        player.x += Math.cos(player.angle) * player.speed;
        player.y += Math.sin(player.angle) * player.speed;
    }

    function draw() {
        ctx.fillStyle = "#001a33";
        ctx.fillRect(0,0, canvas.width, canvas.height);

        // Gemi Çizimi
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        ctx.fillStyle = "#5d4037";
        ctx.beginPath();
        ctx.moveTo(30, 0); ctx.lineTo(-15, -15); ctx.lineTo(-15, 15);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }
</script>
</body>
</html>
