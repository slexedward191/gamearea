<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avcısı - Seviyeli</title>
    <style>
        :root { --p-color: #6366f1; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .game-card { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        #level-indicator { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }
        #scrambled-word { font-size: 2.5rem; letter-spacing: 8px; color: #fbbf24; margin: 20px 0; font-weight: bold; text-transform: uppercase; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; font-size: 1.1rem; text-align: center; outline: none; }
        button { margin-top: 15px; padding: 12px 25px; border: none; border-radius: 8px; background: var(--p-color); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        #message { margin-top: 15px; height: 20px; font-weight: bold; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
