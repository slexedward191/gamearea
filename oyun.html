<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Neon Void: Zero-G</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --s: #ff00ff; --danger: #ff3300; --bg: #010105; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Syncopate'; color: white; }
        canvas { display: block; filter: saturate(1.5) contrast(1.2); }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none; padding: 40px;
            display: flex; flex-direction: column; justify-content:空间-between;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--p); padding-bottom: 10px; }
        .celeb-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vh; height: 80vh; opacity: 0.05; pointer-events: none;
            filter: grayscale(1) brightness(2); z-index: -1;
        }
        .warning { color: var(--danger); font-size: 10px; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="header">
        <div>SECTOR: <span id="lvl-num">01</span></div>
        <div class="warning">! GRAVITY INTERFERENCE DETECTED !</div>
        <div id="p-label">CORE_UNIT: ACTIVE</div>
    </div>
    <div style="margin-top: auto; font-size: 12px; color: var(--s);">
        SHIFT/CLICK: FLIP GRAVITY | WASD: MOVE
    </div>
</div>

<img src="" id="celeb-back" class="celeb-bg">
<canvas id="game"></canvas>

<script>
/**
 * ULTRA PRO AUDIO ENGINE
 */
const Audio = {
    ctx: null,
    init() { this.ctx = new AudioContext(); this.beat(); },
    play(f, t, d, v=0.1) {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = v;
        g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + d);
    },
    beat() {
        setInterval(() => {
            this.play(40 + (Engine.lvl * 5), 'sine', 0.3, 0.3); // Heavy Kick
            if(Math.random() > 0.6) this.play(1000, 'square', 0.05, 0.02); // Glitch Snare
        }, 250); // Faster Tempo (High Difficulty)
    }
};

/**
 * CORE ENGINE: ZERO-G PROTOCOL
 */
const Engine = {
    lvl: 1, 
    gravity: 0.6,
    flip: 1, // 1: Down, -1: Up
    particles: [],
    mines: [],
    player: { x: 100, y: 300, vx: 0, vy: 0, w: 20, h: 20, color: '#00f2ff' },
    keys: {},
    celebs: ["ELON", "CR7", "MESSI", "BEAST", "TARKAN"],

    init() {
        this.cvs = document.getElementById('game');
        this.ctx = this.cvs.getContext('2d');
        this.resize();
        window.onresize = () => this.resize();
        window.onkeydown = (e) => { 
            this.keys[e.key.toLowerCase()] = true;
            if(e.key === 'Shift' || e.key === ' ') this.toggleGravity();
        };
        window.onkeyup = (e) => this.keys[e.key.toLowerCase()] = false;
        window.onmousedown = () => this.toggleGravity();

        Audio.init();
        this.load(1);
        this.loop();
    },

    resize() { this.cvs.width = window.innerWidth; this.cvs.height = window.innerHeight; },

    toggleGravity() {
        this.flip *= -1;
        this.player.vy = 0;
        Audio.play(400, 'triangle', 0.2, 0.1);
        this.burst(this.player.x, this.player.y, '#ff00ff', 20);
    },

    load(n) {
        this.lvl = n;
        this.flip = 1;
        this.player.x = 100; this.player.y = 300;
        this.player.vx = 0; this.player.vy = 0;
        
        document.getElementById('lvl-num').innerText = n.toString().padStart(2, '0');
        document.getElementById('celeb-back').src = `https://picsum.photos/800/800?sig=${n}`;

        // Level Design: Hardcore Geometry
        const W = this.cvs.width; const H = this.cvs.height;
        this.walls = [
            {x: 0, y: 0, w: W, h: 40}, // Ceiling
            {x: 0, y: H-40, w: W, h: 40}, // Floor
            {x: 0, y: 0, w: 40, h: H}, // Left
            {x: W-40, y: 0, w: 40, h: H}, // Right
            // Mid Obstacles
            {x: W/2 - 100, y: H/2 - 150, w: 200, h: 20},
            {x: W/2 - 100, y: H/2 + 150, w: 200, h: 20}
        ];

        // Homing Mines (Takip Eden Mayınlar)
        this.mines = [];
        for(let i=0; i<Math.min(n, 10); i++) {
            this.mines.push({ x: W-200, y: Math.random()*H, r: 10, speed: 1 + (n*0.2) });
        }

        this.exit = { x: W-100, y: H/2 - 50, w: 40, h: 100 };
    },

    burst(x, y, c, n) {
        for(let i=0; i<n; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, l: 1, c });
    },

    die() {
        this.burst(this.player.x, this.player.y, '#ff0000', 40);
        Audio.play(60, 'sawtooth', 0.4);
        this.load(this.lvl);
    },

    update() {
        const p = this.player;
        if(this.keys['a']) p.vx -= 0.8;
        if(this.keys['d']) p.vx += 0.8;
        
        p.vy += this.gravity * this.flip;
        p.vx *= 0.92;
        p.x += p.vx; p.y += p.vy;

        // Wall Collision
        this.walls.forEach(w => {
            if(p.x < w.x+w.w && p.x+p.w > w.x && p.y < w.y+w.h && p.y+p.h > w.y) {
                // Determine side
                let dx = (p.x + p.w/2) - (w.x + w.w/2);
                let dy = (p.y + p.h/2) - (w.y + w.h/2);
                let width = (p.w + w.w)/2;
                let height = (p.h + w.h)/2;
                let crossWidth = width * dy;
                let crossHeight = height * dx;

                if(Math.abs(dx) <= width && Math.abs(dy) <= height) {
                    if(crossWidth > crossHeight) {
                        if(crossWidth > (-crossHeight)) { p.y = w.y + w.h; p.vy = 0; } // Bottom
                        else { p.x = w.x - p.w; p.vx = 0; } // Left
                    } else {
                        if(crossWidth > (-crossHeight)) { p.x = w.x + w.w; p.vx = 0; } // Right
                        else { p.y = w.y - p.h; p.vy = 0; } // Top
                    }
                }
            }
        });

        // Mine Logic (Homing)
        this.mines.forEach(m => {
            let dx = p.x - m.x;
            let dy = p.y - m.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            m.x += (dx/dist) * m.speed;
            m.y += (dy/dist) * m.speed;
            if(dist < 20) this.die();
        });

        // Exit
        if(p.x > this.exit.x && p.y > this.exit.y && p.y < this.exit.y + this.exit.h) {
            Audio.play(800, 'sine', 0.6);
            this.load(this.lvl + 1);
        }

        this.particles.forEach((pt, i) => {
            pt.x += pt.vx; pt.y += pt.vy; pt.l -= 0.02;
            if(pt.l <= 0) this.particles.splice(i, 1);
        });
    },

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#010105'; ctx.fillRect(0, 0, this.cvs.width, this.cvs.height);

        // Scanline Effect
        ctx.fillStyle = 'rgba(0, 242, 255, 0.03)';
        for(let i=0; i<this.cvs.height; i+=4) ctx.fillRect(0, i, this.cvs.width, 1);

        // Walls
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
        ctx.fillStyle = '#050515';
        this.walls.forEach(w => {
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.strokeStyle = '#00f2ff55'; ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        // Mines
        this.mines.forEach(m => {
            ctx.fillStyle = '#ff0055'; ctx.shadowColor = '#ff0055';
            ctx.beginPath(); ctx.arc(m.x, m.y, 8, 0, Math.PI*2); ctx.fill();
            // Glow circle
            ctx.strokeStyle = '#ff0055'; ctx.beginPath(); ctx.arc(m.x, m.y, 15 + Math.sin(Date.now()*0.01)*5, 0, Math.PI*2); ctx.stroke();
        });

        // Particles
        this.particles.forEach(pt => { ctx.globalAlpha = pt.l; ctx.fillStyle = pt.c; ctx.fillRect(pt.x, pt.y, 3, 3); });
        ctx.globalAlpha = 1;

        // Player (Kinetic Cube)
        ctx.fillStyle = '#fff'; ctx.shadowBlur = 25; ctx.shadowColor = '#00f2ff';
        ctx.save();
        ctx.translate(this.player.x + 10, this.player.y + 10);
        ctx.rotate(this.player.vx * 0.1);
        ctx.fillRect(-10, -10, 20, 20);
        ctx.restore();

        // Exit Portal
        ctx.fillStyle = '#0dff0022'; ctx.strokeStyle = '#0dff00';
        ctx.strokeRect(this.exit.x, this.exit.y, this.exit.w, this.exit.h);

        requestAnimationFrame(() => this.loop());
    },

    loop() { this.update(); this.draw(); }
};

Engine.init();
</script>
</body>
</html>
