<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EmpireX - Prototype</title>
<style>
body { margin:0; overflow:hidden; background:#0f0f0f; font-family:Arial; }
canvas { display:block; }
#ui {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:8px;
}
button {
  margin-top:5px;
  padding:5px 10px;
  cursor:pointer;
}
</style>
</head>
<body>
<div id="ui">
  <div>Gold: <span id="gold">0</span></div>
  <div>Health: <span id="health">100</span></div>
  <button onclick="spawnSoldier()">Spawn Soldier (10 Gold)</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const WORLD = 3000;
let keys = {};
let zoom = 1;

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
window.addEventListener("wheel", e=>{
  zoom += e.deltaY * -0.001;
  zoom = Math.min(Math.max(0.5, zoom), 2);
});

class Entity {
  constructor(x,y,size,color){
    this.x=x; this.y=y;
    this.size=size;
    this.color=color;
    this.health=100;
  }
  draw(){
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

class Player extends Entity{
  constructor(){
    super(WORLD/2,WORLD/2,20,"cyan");
    this.speed=4;
    this.gold=0;
  }
  update(){
    if(keys["w"]) this.y-=this.speed;
    if(keys["s"]) this.y+=this.speed;
    if(keys["a"]) this.x-=this.speed;
    if(keys["d"]) this.x+=this.speed;
    this.x=Math.max(0,Math.min(WORLD,this.x));
    this.y=Math.max(0,Math.min(WORLD,this.y));
  }
}

class Soldier extends Entity{
  constructor(x,y){
    super(x,y,10,"lime");
    this.speed=2;
  }
  update(){
    let dx=player.x-this.x;
    let dy=player.y-this.y;
    let dist=Math.hypot(dx,dy);
    if(dist>40){
      this.x+=dx/dist*this.speed;
      this.y+=dy/dist*this.speed;
    }
  }
}

class Enemy extends Entity{
  constructor(){
    super(Math.random()*WORLD,Math.random()*WORLD,18,"red");
    this.speed=1.5;
  }
  update(){
    let dx=player.x-this.x;
    let dy=player.y-this.y;
    let dist=Math.hypot(dx,dy);
    if(dist<500){
      this.x+=dx/dist*this.speed;
      this.y+=dy/dist*this.speed;
    }
    if(dist<25){
      player.health-=0.1;
    }
  }
}

class Gold {
  constructor(){
    this.x=Math.random()*WORLD;
    this.y=Math.random()*WORLD;
    this.size=6;
  }
  draw(){
    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

const player=new Player();
const soldiers=[];
const enemies=[];
const golds=[];

for(let i=0;i<150;i++) golds.push(new Gold());
for(let i=0;i<5;i++) enemies.push(new Enemy());

function spawnSoldier(){
  if(player.gold>=10){
    player.gold-=10;
    soldiers.push(new Soldier(player.x,player.y));
  }
}

function drawGrid(){
  ctx.strokeStyle="#1a1a1a";
  for(let x=0;x<WORLD;x+=100){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,WORLD);
    ctx.stroke();
  }
  for(let y=0;y<WORLD;y+=100){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(WORLD,y);
    ctx.stroke();
  }
}

function update(){
  player.update();
  soldiers.forEach(s=>s.update());
  enemies.forEach(e=>e.update());

  golds.forEach((g,i)=>{
    if(Math.hypot(player.x-g.x,player.y-g.y)<20){
      player.gold++;
      golds.splice(i,1);
    }
  });

  enemies.forEach((e,ei)=>{
    soldiers.forEach((s,si)=>{
      if(Math.hypot(s.x-e.x,s.y-e.y)<20){
        e.health-=0.5;
        s.health-=0.3;
      }
    });
    if(e.health<=0){
      enemies.splice(ei,1);
      enemies.push(new Enemy());
      player.gold+=5;
    }
  });

  soldiers.forEach((s,i)=>{
    if(s.health<=0) soldiers.splice(i,1);
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(zoom,zoom);
  ctx.translate(
    -player.x + canvas.width/2/zoom,
    -player.y + canvas.height/2/zoom
  );

  drawGrid();
  golds.forEach(g=>g.draw());
  enemies.forEach(e=>e.draw());
  soldiers.forEach(s=>s.draw());
  player.draw();

  ctx.restore();

  document.getElementById("gold").innerText=Math.floor(player.gold);
  document.getElementById("health").innerText=Math.floor(player.health);
}

function loop(){
  update();
  draw();
  if(player.health>0){
    requestAnimationFrame(loop);
  }else{
    alert("Game Over");
  }
}

loop();
</script>
</body>
</html>
