```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameArea Fight - Mission Briefing</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap');

:root{
--neon-blue:#00f2ff;
--neon-red:#ff003c;
--neon-purple:#bc13fe;
--neon-gold:#ffcc00;
}

body{
margin:0;
background:#050505;
color:white;
font-family:'Orbitron',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#game-container{
position:relative;
width:1250px;
height:800px;
}

/* ARENA */

#arena-wrapper{
position:relative;
width:1250px;
height:800px;
border:10px solid;
border-image:linear-gradient(90deg,var(--neon-red) 50%,#ffffff 50%) 1;
background:#111;
overflow:hidden;
z-index:5;
}

canvas{
display:block;
}

/* UI */

.ui-panel{
position:absolute;
background:rgba(0,0,0,0.85);
border:2px solid var(--neon-blue);
padding:10px;
border-radius:8px;
z-index:50;
}

#stats-panel{
bottom:10px;
left:10px;
width:160px;
color:var(--neon-blue);
}

#xp-log{
right:10px;
top:50%;
transform:translateY(-50%);
width:140px;
border-color:var(--neon-purple);
}

#gold-display{
top:10px;
left:10px;
color:var(--neon-gold);
font-weight:bold;
border-color:var(--neon-gold);
}

#enemy-counter{
top:10px;
right:10px;
color:var(--neon-red);
font-weight:bold;
display:none;
}

#market-btn{
position:absolute;
bottom:10px;
right:10px;
padding:10px 25px;
background:var(--neon-gold);
color:black;
font-weight:bold;
border-radius:5px;
cursor:pointer;
z-index:60;
}

/* OVERLAYS */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

.level-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}

.level-card{
background:#222;
border:2px solid #444;
padding:15px;
text-align:center;
cursor:pointer;
opacity:0.4;
pointer-events:none;
}

.level-card.unlocked{
opacity:1;
border-color:var(--neon-blue);
pointer-events:auto;
}

#announcement{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:5rem;
color:var(--neon-red);
display:none;
z-index:500;
font-weight:bold;
}

</style>
</head>

<body>

<div id="game-container">

<div id="arena-wrapper">
<canvas id="gameCanvas" width="1250" height="800"></canvas>
<div id="announcement">DALGA 1</div>
</div>

<!-- UI PANELLERİ (ARENA DIŞI) -->

<div id="gold-display" class="ui-panel">
ALTIN: <span id="gold-count">0</span>
</div>

<div id="enemy-counter" class="ui-panel">
KALAN: <span id="enemy-count">0</span>
</div>

<div id="stats-panel" class="ui-panel">
<h5 style="margin:0 0 5px 0">STATS</h5>
<div style="font-size:11px">• Henüz eklenti yok</div>
</div>

<div id="xp-log" class="ui-panel">
<h5 style="margin:0 0 5px 0">ÖLDÜRME</h5>
<div id="log-list" style="font-size:10px"></div>
</div>

<div id="market-btn" onclick="toggleMarket()">MARKET</div>

<!-- AUTH -->

<div id="auth-screen" class="overlay">

<h2>GİRİŞ</h2>

<input id="username" placeholder="Kullanıcı Adı">
<input id="password" type="password" placeholder="Şifre">

<button onclick="handleAuth('login')">GİRİŞ</button>
<button onclick="handleAuth('guest')">MİSAFİR</button>

</div>

<!-- LEVEL -->

<div id="start-screen" class="overlay" style="display:none">

<h1>BÖLÜM SEÇ</h1>

<p id="welcome-msg"></p>

<div id="level-grid" class="level-grid"></div>

</div>

</div>

<script>

const canvas=document.getElementById('gameCanvas')
const ctx=canvas.getContext('2d')

let currentUser=null
let isGuest=false

const ENEMY_COLORS=['#ff003c','#00ff00','#bc13fe','#ffcc00','#ffffff','#00f2ff']

let gameState={
isRunning:false,
wave:0,
gold:0,
unlockedLevel:1
}

let enemies=[]
let keys={}
let player={}

window.onkeydown=e=>keys[e.code]=true
window.onkeyup=e=>keys[e.code]=false

function handleAuth(type){

if(type==='guest'){
isGuest=true
currentUser="Misafir"
}else{

const u=username.value
const p=password.value

if(!u||!p)return alert("Alanları doldur!")

let users=JSON.parse(localStorage.getItem('gf_users')||'{}')

if(users[u]){
if(users[u].password!==p)return alert("Hatalı şifre!")
gameState=users[u].state
}else{
users[u]={password:p,state:gameState}
localStorage.setItem('gf_users',JSON.stringify(users))
}

currentUser=u
}

showStart()

}

function showStart(){

document.getElementById('auth-screen').style.display='none'
document.getElementById('start-screen').style.display='flex'

document.getElementById('welcome-msg').innerText="Hoş geldin "+currentUser

renderLevels()

}

function renderLevels(){

const grid=document.getElementById('level-grid')

grid.innerHTML=''

for(let i=1;i<=20;i++){

const div=document.createElement('div')

div.className="level-card "+(i<=gameState.unlockedLevel?"unlocked":"")

div.innerText="Bölüm "+i

if(i<=gameState.unlockedLevel)
div.onclick=()=>startGame(i)

grid.appendChild(div)

}

}

function startGame(){

player={
x:625,
y:400,
hp:100,
speed:4,
color:'#00f2ff'
}

enemies=[]

document.getElementById('start-screen').style.display='none'
document.getElementById('enemy-counter').style.display='block'

gameState.wave=0
gameState.isRunning=true

nextWave()

}

function nextWave(){

if(gameState.wave>=5){

alert("Bölüm tamamlandı!")

location.reload()

return
}

gameState.wave++

announcement.innerText="DALGA "+gameState.wave
announcement.style.display="block"

setTimeout(()=>{

announcement.style.display="none"
spawnEnemies()

},2000)

}

function spawnEnemies(){

const count=gameState.wave*4

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*1200,
y:Math.random()<0.5?-50:850,
hp:100,
size:25,
speed:1.5+Math.random(),
color:ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)]

})

}

document.getElementById('enemy-count').innerText=enemies.length

}

function loop(){

ctx.clearRect(0,0,1250,800)

if(gameState.isRunning){

if(keys['KeyW'])player.y-=player.speed
if(keys['KeyS'])player.y+=player.speed
if(keys['KeyA'])player.x-=player.speed
if(keys['KeyD'])player.x+=player.speed

enemies.forEach((e,i)=>{

const ang=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(ang)*e.speed
e.y+=Math.sin(ang)*e.speed

ctx.fillStyle=e.color
ctx.fillRect(e.x-12,e.y-12,25,25)

if(e.hp<=0){

enemies.splice(i,1)

gameState.gold+=5
document.getElementById('gold-count').innerText=gameState.gold

document.getElementById('enemy-count').innerText=enemies.length

if(enemies.length===0)
nextWave()

}

})

}

ctx.fillStyle=player.color
ctx.beginPath()
ctx.arc(player.x,player.y,20,0,Math.PI*2)
ctx.fill()

requestAnimationFrame(loop)

}

requestAnimationFrame(loop)

function toggleMarket(){
alert("Market şu an kapalı!")
}

</script>

</body>
</html>
