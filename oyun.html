<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VECTOR OBLIVION</title>
<style>
body{margin:0;overflow:hidden;background:#0b0f1a;font-family:Arial}
canvas{display:block}
#ui{
position:absolute;
top:10px;left:10px;
color:white;
font-size:14px;
}
#overlay{
position:absolute;
top:0;left:0;
width:100%;height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
background:rgba(0,0,0,0.7);
visibility:hidden;
}
button{
padding:10px 20px;
margin:5px;
background:#111;
color:#0ff;
border:1px solid #0ff;
cursor:pointer;
}
button:hover{background:#0ff;color:#000}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>
<div id="overlay"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

let mouse={x:0,y:0};
canvas.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

function rand(a,b){return Math.random()*(b-a)+a}

let cameraShake=0;

let player={
x:canvas.width/2,
y:canvas.height/2,
r:18,
hp:120,
maxHp:120,
speed:3,
dashCooldown:0,
dashPower:120,
damage:12,
fireRate:250,
bulletSpeed:8,
crit:0.1,
xp:0,
level:1,
nextXp:100,
skillPoints:0,
combo:0,
lastShot:0
};

let bullets=[];
let enemies=[];
let particles=[];
let wave=1;
let gameOver=false;
let paused=false;

function spawnEnemy(){
let edge=Math.floor(Math.random()*4);
let x,y;
if(edge==0){x=0;y=rand(0,canvas.height)}
if(edge==1){x=canvas.width;y=rand(0,canvas.height)}
if(edge==2){x=rand(0,canvas.width);y=0}
if(edge==3){x=rand(0,canvas.width);y=canvas.height}

let type=Math.random();
let e={
x,y,
r:rand(15,30),
hp:50+wave*20,
speed:1.2+wave*0.15,
type
};
if(type>0.85){ e.r=40; e.hp*=4; e.speed*=0.7 }
enemies.push(e);
}

function shoot(){
if(Date.now()-player.lastShot<player.fireRate)return;
player.lastShot=Date.now();
let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*player.bulletSpeed,
dy:Math.sin(angle)*player.bulletSpeed
});
cameraShake=5;
}

function gainXP(v){
player.combo++;
player.xp+=v*(1+player.combo*0.05);
if(player.xp>=player.nextXp){
player.xp=0;
player.level++;
player.skillPoints++;
player.nextXp*=1.35;
paused=true;
showSkillMenu();
}
}

function dash(){
if(player.dashCooldown>0)return;
let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
player.x+=Math.cos(angle)*player.dashPower;
player.y+=Math.sin(angle)*player.dashPower;
player.dashCooldown=2000;
cameraShake=15;
}

function update(dt){
if(gameOver||paused)return;

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;
if(keys[" "])dash();
if(keys["Mouse0"])shoot();

if(keys["f"])shoot();

if(player.dashCooldown>0)player.dashCooldown-=dt;

bullets.forEach((b,i)=>{
b.x+=b.dx;
b.y+=b.dy;
if(b.x<0||b.y<0||b.x>canvas.width||b.y>canvas.height)bullets.splice(i,1);
});

enemies.forEach((e,i)=>{
let angle=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

let dx=e.x-player.x;
let dy=e.y-player.y;
let dist=Math.hypot(dx,dy);
if(dist<e.r+player.r){
player.hp-=0.5;
cameraShake=10;
if(player.hp<=0) endGame();
}
});

bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
let dmg=player.damage;
if(Math.random()<player.crit)dmg*=2;
e.hp-=dmg;
bullets.splice(bi,1);
if(e.hp<=0){
gainXP(25);
cameraShake=8;
enemies.splice(ei,1);
}
}
});
});

if(enemies.length<wave*3)spawnEnemy();
if(player.level%5==0)wave++;
}

function draw(){
ctx.save();
ctx.translate(rand(-cameraShake,cameraShake),rand(-cameraShake,cameraShake));
ctx.fillStyle="rgba(11,15,26,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fillStyle="#0ff";
ctx.fill();

ctx.fillStyle="#ff0";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,5,0,Math.PI*2);
ctx.fill();
});

enemies.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fillStyle=e.r>35?"purple":"red";
ctx.fill();
});

ctx.restore();
cameraShake*=0.9;

document.getElementById("ui").innerHTML=
"HP: "+Math.floor(player.hp)+"/"+player.maxHp+
"<br>Level: "+player.level+
"<br>XP: "+Math.floor(player.xp)+"/"+Math.floor(player.nextXp)+
"<br>Wave: "+wave+
"<br>Combo: "+player.combo+
"<br>Skill Points: "+player.skillPoints;
}

function showSkillMenu(){
let o=document.getElementById("overlay");
o.style.visibility="visible";
o.innerHTML="<h2>LEVEL UP</h2>"+
"<button onclick='upgrade(\"damage\")'>+Damage</button>"+
"<button onclick='upgrade(\"speed\")'>+Move Speed</button>"+
"<button onclick='upgrade(\"firerate\")'>+Fire Rate</button>"+
"<button onclick='upgrade(\"crit\")'>+Crit</button>";
}

function upgrade(s){
player.skillPoints--;
if(s=="damage")player.damage+=5;
if(s=="speed")player.speed+=0.5;
if(s=="firerate")player.fireRate-=20;
if(s=="crit")player.crit+=0.05;
document.getElementById("overlay").style.visibility="hidden";
paused=false;
}

function endGame(){
gameOver=true;
localStorage.setItem("highscore",
Math.max(player.level,localStorage.getItem("highscore")||0));
let o=document.getElementById("overlay");
o.style.visibility="visible";
o.innerHTML="<h1>GAME OVER</h1>"+
"<p>Level: "+player.level+"</p>"+
"<p>High Score: "+localStorage.getItem("highscore")+"</p>"+
"<button onclick='location.reload()'>Restart</button>";
}

let last=0;
function loop(t){
let dt=t-last;last=t;
update(dt);
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
