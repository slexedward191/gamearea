<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dino Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:#f7f7f7;
font-family:Arial;
}
canvas{
display:block;
margin:0 auto;
background:#ffffff;
}
#info{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:20px;
}
#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
display:none;
text-align:center;
}
</style>
</head>
<body>

<div id="info">Score: 0</div>
<div id="gameover">
GAME OVER<br><br>
Press SPACE to Restart
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=800;
canvas.height=300;

let groundY=250;

/* PLAYER */
let dino={
x:80,
y:groundY,
width:40,
height:40,
vy:0,
gravity:0.8,
jumpPower:-15,
jumping:false
};

/* GAME STATE */
let obstacles=[];
let speed=6;
let score=0;
let gameOver=false;

/* CONTROLS */
document.addEventListener("keydown",e=>{
if(e.code==="Space"){
if(gameOver){
restart();
}else if(!dino.jumping){
dino.vy=dino.jumpPower;
dino.jumping=true;
}
}
});

/* OBSTACLE SPAWN */
function spawnObstacle(){
let height=40;
obstacles.push({
x:canvas.width,
y:groundY,
width:20+Math.random()*20,
height:height
});
}
setInterval(()=>{
if(!gameOver) spawnObstacle();
},1500);

/* UPDATE */
function update(){

if(gameOver) return;

/* DINO PHYSICS */
dino.vy+=dino.gravity;
dino.y+=dino.vy;

if(dino.y>=groundY){
dino.y=groundY;
dino.vy=0;
dino.jumping=false;
}

/* OBSTACLES */
obstacles.forEach((o,i)=>{
o.x-=speed;

if(o.x+o.width<0){
obstacles.splice(i,1);
}

/* COLLISION */
if(
dino.x < o.x+o.width &&
dino.x+dino.width > o.x &&
dino.y < o.y+o.height &&
dino.y+dino.height > o.y
){
gameOver=true;
document.getElementById("gameover").style.display="block";
}
});

/* SPEED INCREASE */
speed+=0.002;

/* SCORE */
score++;
document.getElementById("info").innerText="Score: "+score;
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* GROUND */
ctx.fillStyle="black";
ctx.fillRect(0,groundY+40,canvas.width,3);

/* DINO */
ctx.fillStyle="black";
ctx.fillRect(dino.x,dino.y,dino.width,dino.height);

/* OBSTACLES */
obstacles.forEach(o=>{
ctx.fillRect(o.x,o.y,o.width,o.height);
});
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

/* RESTART */
function restart(){
obstacles=[];
score=0;
speed=6;
gameOver=false;
document.getElementById("gameover").style.display="none";
}
</script>

</body>
</html>
