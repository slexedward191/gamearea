<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Agarz Clone - Minimal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        canvas { display: block; background-image: 
            linear-gradient(#222 1px, transparent 1px),
            linear-gradient(90deg, #222 1px, transparent 1px);
            background-size: 50px 50px; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        .score { font-size: 24px; font-weight: bold; color: #00ff88; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score">Kütle: <span id="mass">10</span></div>
        <div style="font-size: 12px; color: #aaa;">Fareyi hareket ettir ve küçükleri ye!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const massDisplay = document.getElementById('mass');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = { x: canvas.width/2, y: canvas.height/2, radius: 20, color: '#00ff88' };
        let mouse = { x: canvas.width/2, y: canvas.height/2 };
        let foods = [];
        let enemies = [];

        // Başlangıç yiyeceklerini oluştur
        for (let i = 0; i < 100; i++) spawnFood();
        // Birkaç tane de bot (düşman) ekleyelim
        for (let i = 0; i < 5; i++) spawnEnemy();

        function spawnFood() {
            foods.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 5,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            });
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 15 + Math.random() * 30,
                color: '#ff4444',
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            });
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function update() {
            // Oyuncuyu fareye doğru yumuşakça hareket ettir
            let dx = mouse.x - player.x;
            let dy = mouse.y - player.y;
            player.x += dx * 0.05;
            player.y += dy * 0.05;

            // Yiyecek yeme kontrolü
            foods.forEach((food, index) => {
                let dist = Math.hypot(player.x - food.x, player.y - food.y);
                if (dist < player.radius + food.radius) {
                    foods.splice(index, 1);
                    player.radius += 0.5;
                    massDisplay.innerText = Math.floor(player.radius);
                    spawnFood();
                }
            });

            // Botların hareketi ve etkileşimi
            enemies.forEach((enemy, index) => {
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;

                // Duvarlara çarpma
                if (enemy.x < 0 || enemy.x > canvas.width) enemy.vx *= -1;
                if (enemy.y < 0 || enemy.y > canvas.height) enemy.vy *= -1;

                // Oyuncu düşmanı yerse veya tersi
                let dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (dist < player.radius + enemy.radius) {
                    if (player.radius > enemy.radius * 1.1) {
                        player.radius += enemy.radius / 2;
                        enemies.splice(index, 1);
                        spawnEnemy();
