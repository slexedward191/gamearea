<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramazan Davulcusu - Sahur Vakti</title>
    <style>
        body {
            margin: 0;
            background: #0b1026;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            border: 4px solid #f1c40f;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
        }

        #davul {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #e67e22 60%, #d35400 100%);
            border-radius: 50%;
            border: 10px solid #7f8c8d;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            user-select: none;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }

        #davul:active {
            transform: scale(0.95);
        }

        .mani {
            font-style: italic;
            color: #f1c40f;
            min-height: 50px;
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .stats {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.8rem;
            color: #bdc3c7;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>🌙 Sahur Vakti!</h1>
        <div class="stats">Uyandırılan Kişi: <span id="score">0</span></div>
        
        <div id="davul">🥁</div>
        
        <div class="mani" id="mani-text">Davulun sesi uzaktan gelir...</div>
        <p class="hint">Ekrana tıkla veya Boşluk (Space) tuşuna bas!</p>
    </div>

    <script>
        const scoreEl = document.getElementById('score');
        const davulEl = document.getElementById('davul');
        const maniEl = document.getElementById('mani-text');
        
        let score = 0;
        
        const maniler = [
            "Akşamdan pilavı yedim, Sahura Allah kerim dedim.",
            "Davulumun sesi güm güm eder, Sahur vakti çabuk geçer.",
            "Besmeleyle başladım, Sokağınızı turladım.",
            "Hayırlı ramazanlar dilerim, Sizi sahura beklerim!",
            "Eski cami direk ister, Söylemeye yürek ister."
        ];

        // Ses Efekti (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDrumSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(100, audioCtx.currentTime); // Bas ses
            oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        function vur() {
            score++;
            scoreEl.innerText = score;
            
            // Her 10 vuruşta bir mani değiştir
            if (score % 10 === 0) {
                const randomMani = maniler[Math.floor(Math.random() * maniler.length)];
                maniEl.innerText = randomMani;
                maniEl.style.color = "#2ecc71";
                setTimeout(() => maniEl.style.color = "#f1c40f", 500);
            }

            playDrumSound();
            
            // Görsel efekt
            davulEl.style.borderColor = "#f1c40f";
            setTimeout(() => davulEl.style.borderColor = "#7f8c8d", 100);
        }

        // Event Listeners
        davulEl.addEventListener('mousedown', vur);
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                vur();
                davulEl.style.transform = "scale(0.95)";
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                davulEl.style.transform = "scale(1)";
            }
        });

    </script>
</body>
</html>
