<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tofaş Arena Drive</title>
<style>
body{
margin:0;
overflow:hidden;
background:#0f172a;
font-family:Arial;
color:white;
}
canvas{display:block}
#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
font-size:14px;
}
#howto{
position:fixed;
left:10px;
top:140px;
background:#1f2937;
padding:12px;
border-radius:10px;
width:210px;
}
</style>
</head>
<body>

<div id="hud"></div>

<div id="howto">
<b>🚗 NASIL OYNANIR</b><br><br>
W - Gaz<br>
S - Fren / Geri<br>
A - Sola Dön<br>
D - Sağa Dön<br><br>
Amaç: Engellere çarpmadan<br>
olabildiğince uzun süre sür!
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ARENA */
const arena={
x:100,
y:100,
w:canvas.width-200,
h:canvas.height-200
};

/* INPUT */
let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* PLAYER (TOFAŞ) */
let car={
x:arena.x+arena.w/2,
y:arena.y+arena.h/2,
angle:0,
speed:0,
maxSpeed:6,
acceleration:0.15,
friction:0.05,
turnSpeed:0.05,
hp:100,
width:60,
height:30
};

/* OBSTACLES */
let obstacles=[];

function rand(a,b){return Math.random()*(b-a)+a;}

function spawnObstacle(){
let size=rand(40,80);
obstacles.push({
x:rand(arena.x+50,arena.x+arena.w-50),
y:rand(arena.y+50,arena.y+arena.h-50),
w:size,
h:size
});
}

for(let i=0;i<20;i++) spawnObstacle();

/* COLLISION */
function rectCollision(car,obs){
let dx=Math.abs(car.x-obs.x);
let dy=Math.abs(car.y-obs.y);
return dx < obs.w/2+car.width/2 &&
       dy < obs.h/2+car.height/2;
}

/* UPDATE */
let score=0;

function update(){

/* GAS */
if(keys["w"]) car.speed+=car.acceleration;
if(keys["s"]) car.speed-=car.acceleration;

/* LIMIT SPEED */
car.speed=Math.max(-car.maxSpeed/2,Math.min(car.maxSpeed,car.speed));

/* FRICTION */
if(!keys["w"] && !keys["s"]){
if(car.speed>0) car.speed-=car.friction;
if(car.speed<0) car.speed+=car.friction;
}

/* TURN */
if(keys["a"]) car.angle-=car.turnSpeed*car.speed;
if(keys["d"]) car.angle+=car.turnSpeed*car.speed;

/* MOVE */
car.x+=Math.cos(car.angle)*car.speed;
car.y+=Math.sin(car.angle)*car.speed;

/* ARENA LIMIT */
car.x=Math.max(arena.x+car.width/2,
Math.min(arena.x+arena.w-car.width/2,car.x));
car.y=Math.max(arena.y+car.height/2,
Math.min(arena.y+arena.h-car.height/2,car.y));

/* COLLISION CHECK */
obstacles.forEach(obs=>{
if(rectCollision(car,obs)){
car.hp-=0.5;
car.speed*=-0.5;
}
});

/* GAME OVER */
if(car.hp<=0){
alert("🚗 Tofaş pert oldu! Skor: "+Math.floor(score));
location.reload();
}

score+=Math.abs(car.speed)*0.1;
}

/* DRAW */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Arena */
ctx.strokeStyle="white";
ctx.lineWidth=3;
ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);

/* Obstacles */
ctx.fillStyle="#475569";
obstacles.forEach(obs=>{
ctx.fillRect(obs.x-obs.w/2,obs.y-obs.h/2,obs.w,obs.h);
});

/* Draw Car */
ctx.save();
ctx.translate(car.x,car.y);
ctx.rotate(car.angle);

/* Body */
ctx.fillStyle="white";
ctx.fillRect(-car.width/2,-car.height/2,car.width,car.height);

/* Windows */
ctx.fillStyle="black";
ctx.fillRect(-15,-10,30,20);

/* Emoji Tofaş vibe */
ctx.font="20px Arial";
ctx.fillText("🚗",-12,6);

ctx.restore();

/* HUD */
document.getElementById("hud").innerHTML=
"HP: "+Math.floor(car.hp)+"<br>"+
"Hız: "+car.speed.toFixed(2)+"<br>"+
"Skor: "+Math.floor(score);
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
