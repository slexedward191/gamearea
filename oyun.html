<script>

/* ================= CORE ================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const upgradePanel = document.getElementById("upgradePanel");
const perkPanel = document.getElementById("perkPanel");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let lastTime = 0;
let deltaTime = 0;
let gameOver = false;
let paused = false;
let restartTimer = 0;

/* ================= MODERN SHOOT SOUND ================= */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playShootSound(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(250, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.08);

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
}

/* ================= WAVE ================= */

let wave = 1;
let zombiesToSpawn = 10;
let spawnTimer = 0;
let spawnDelay = 2;

/* ================= PLAYER ================= */

class Player{
    constructor(){
        this.x = WIDTH/2;
        this.y = HEIGHT/2;
        this.r = 16;
        this.speed = 220;
        this.maxHp = 100;
        this.hp = 100;
        this.maxAmmo = 30;
        this.ammo = 30;
        this.reloadTime = 1.2;
        this.reloadTimer = 0;
        this.fireRate = 0.2;
        this.fireTimer = 0;
        this.damage = 20;
        this.level = 1;
        this.xp = 0;
        this.xpNeeded = 100;
    }

    update(dt){

        let vx=0, vy=0;
        if(keys["w"]) vy-=1;
        if(keys["s"]) vy+=1;
        if(keys["a"]) vx-=1;
        if(keys["d"]) vx+=1;

        let len = Math.hypot(vx,vy);
        if(len>0){ vx/=len; vy/=len; }

        this.x += vx*this.speed*dt;
        this.y += vy*this.speed*dt;

        this.x = Math.max(this.r,Math.min(WIDTH-this.r,this.x));
        this.y = Math.max(this.r,Math.min(HEIGHT-this.r,this.y));

        if(this.reloadTimer>0){
            this.reloadTimer-=dt;
            if(this.reloadTimer<=0){
                this.ammo=this.maxAmmo;
            }
        }

        if(this.ammo<=0 && this.reloadTimer<=0){
            this.reloadTimer=this.reloadTime;
        }

        this.fireTimer-=dt;
        if(this.fireTimer<=0 && this.ammo>0 && this.reloadTimer<=0){
            this.shoot();
            this.fireTimer=this.fireRate;
        }
    }

    shoot(){
        this.ammo--;
        playShootSound();

        let angle = Math.atan2(mouse.y-this.y, mouse.x-this.x);
        bullets.push(new Bullet(this.x,this.y,Math.cos(angle),Math.sin(angle),this.damage));
    }

    gainXP(amount){
        this.xp+=amount;
        if(this.xp>=this.xpNeeded){
            this.level++;
            this.xp=0;
            this.xpNeeded+=80;
        }
    }

    draw(){
        ctx.fillStyle="#3498db";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        // PLAYER HP BAR
        ctx.fillStyle="red";
        ctx.fillRect(this.x-25,this.y-30,50,6);
        ctx.fillStyle="lime";
        ctx.fillRect(this.x-25,this.y-30,50*(this.hp/this.maxHp),6);
    }
}

const player = new Player();

/* ================= BULLET ================= */

class Bullet{
    constructor(x,y,dx,dy,damage){
        this.x=x; this.y=y;
        this.dx=dx; this.dy=dy;
        this.speed=600;
        this.r=4;
        this.damage=damage;
    }
    update(dt){
        this.x+=this.dx*this.speed*dt;
        this.y+=this.dy*this.speed*dt;
    }
    draw(){
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

let bullets=[];

/* ================= ZOMBIE ================= */

class Zombie{
    constructor(type="normal"){
        this.type=type;
        this.x=Math.random()<0.5?0:WIDTH;
        this.y=Math.random()*HEIGHT;

        if(type==="boss"){
            this.speed=40;
            this.maxHp=20000;
            this.color="red";
            this.r=40;
        }else{
            this.speed=100;
            this.maxHp=250*Math.pow(2,wave-1);
            this.color="green";
            this.r=18;
        }

        this.hp=this.maxHp;
    }

    update(dt){
        let angle=Math.atan2(player.y-this.y,player.x-this.x);
        this.x+=Math.cos(angle)*this.speed*dt;
        this.y+=Math.sin(angle)*this.speed*dt;

        if(Math.hypot(player.x-this.x,player.y-this.y)<player.r+this.r){
            player.hp-=30*dt;
            if(player.hp<=0){
                triggerGameOver();
            }
        }
    }

    draw(){
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        // ZOMBIE HP BAR
        ctx.fillStyle="red";
        ctx.fillRect(this.x-20,this.y-30,40,5);
        ctx.fillStyle="lime";
        ctx.fillRect(this.x-20,this.y-30,40*(this.hp/this.maxHp),5);
    }
}

let zombies=[];

/* ================= GAME OVER ================= */

function triggerGameOver(){
    gameOver=true;
    restartTimer=3; // 3 saniye sonra restart
}

function restartGame(){
    wave=1;
    player.hp=player.maxHp;
    player.xp=0;
    zombies=[];
    bullets=[];
    gameOver=false;
}

/* ================= LOOP ================= */

function update(timestamp){
    deltaTime=(timestamp-lastTime)/1000;
    lastTime=timestamp;

    if(gameOver){
        restartTimer-=deltaTime;
        if(restartTimer<=0){
            restartGame();
        }
    }

    if(!gameOver){

        player.update(deltaTime);

        spawnTimer-=deltaTime;
        if(spawnTimer<=0){
            zombies.push(new Zombie());
            spawnTimer=spawnDelay;
        }

        bullets.forEach((b,i)=>{
            b.update(deltaTime);
            if(b.x<0||b.x>WIDTH||b.y<0||b.y>HEIGHT){
                bullets.splice(i,1);
            }
        });

        zombies.forEach((z,zi)=>{
            z.update(deltaTime);
            bullets.forEach((b,bi)=>{
                if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){
                    z.hp-=b.damage;
                    bullets.splice(bi,1);
                    if(z.hp<=0){
                        player.gainXP(40);
                        zombies.splice(zi,1);
                    }
                }
            });
        });
    }

    draw();
    requestAnimationFrame(update);
}

function draw(){

    ctx.clearRect(0,0,WIDTH,HEIGHT);

    // Saydam Türk Bayrağı
    ctx.save();
    ctx.globalAlpha=0.07;
    ctx.fillStyle="red";
    ctx.fillRect(0,0,WIDTH,HEIGHT);
    ctx.restore();

    bullets.forEach(b=>b.draw());
    zombies.forEach(z=>z.draw());
    player.draw();

    ctx.fillStyle="white";
    ctx.fillText("Wave: "+wave,550,30);
    ctx.fillText("Level: "+player.level,20,20);
    ctx.fillText("Ammo: "+player.ammo,20,40);

    // XP BAR ALTTA
    ctx.fillStyle="#333";
    ctx.fillRect(200,660,800,20);
    ctx.fillStyle="#9b59b6";
    ctx.fillRect(200,660,800*(player.xp/player.xpNeeded),20);

    ctx.fillStyle="white";
    ctx.fillText("Sonraki Level için: "+(player.xpNeeded-player.xp)+" XP",480,655);

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",500,350);
    }
}

requestAnimationFrame(update);

</script>
