<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hamster Arena</title>
<style>
body{margin:0;overflow:hidden;background:#0f172a;font-family:Arial}
canvas{display:block}
.ui{position:fixed;top:20px;right:20px;color:white;text-align:right}
.bar{width:220px;height:18px;background:#334155;border-radius:8px;overflow:hidden;margin-bottom:6px;position:relative}
.fill{height:100%}
.hpText{position:absolute;width:100%;text-align:center;font-size:12px;top:1px}
.upgradePanel{position:fixed;bottom:20px;right:20px;background:#1e293b;padding:15px;border-radius:10px;color:white;width:200px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center}
.menu{background:#1e293b;padding:30px;border-radius:12px;color:white;text-align:center;width:300px}
.menu button{display:block;width:100%;margin:10px 0;padding:10px;border:none;background:#22c55e;color:white;border-radius:6px;cursor:pointer}
</style>
</head>
<body>

<div class="ui">
<div class="bar">
<div id="healthBar" class="fill" style="background:#22c55e;width:100%"></div>
<div id="hpText" class="hpText">100 HP</div>
</div>
<div class="bar"><div id="xpBar" class="fill" style="background:#38bdf8;width:0%"></div></div>
<div id="info">Kill: 0 | Level: 1</div>
<div>Ulti: <span id="ultiCD">Hazır</span></div>
</div>

<div class="upgradePanel">
<b>Eklentiler</b>
<p>Hasar: <span id="uDamage">0</span></p>
<p>Hız: <span id="uSpeed">0</span></p>
<p>Can: <span id="uHealth">0</span></p>
<p>Ateş Hızı: <span id="uFireRate">0</span></p>
</div>

<div class="overlay" id="menuOverlay">
<div class="menu" id="menuBox"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const arena={x:100,y:100,w:canvas.width-200,h:canvas.height-200};

let player,bullets,enemies,keys,mouse,mouseDown;
let kills,level,killNeed,lastShot,lastUlti,ultiEffectTime,running;
let upgrades;

/* INIT */
function initGame(){
player={x:canvas.width/2,y:canvas.height/2,r:22,speed:4,health:100,maxHealth:100,damage:1,fireRate:250};
upgrades={damage:0,speed:0,health:0,fireRate:0};
bullets=[];enemies=[];
keys={};mouse={x:0,y:0};mouseDown=false;
kills=0;level=1;killNeed=10;
lastShot=0;lastUlti=0;ultiEffectTime=0;
running=true;

updateUpgradeUI();
}
initGame();

/* INPUT */
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
document.addEventListener("mousedown",e=>{
if(e.button===0) mouseDown=true;
if(e.button===2) useUlti();
});
document.addEventListener("mouseup",()=>mouseDown=false);
document.addEventListener("contextmenu",e=>e.preventDefault());

function shoot(){
let now=Date.now();
if(now-lastShot<player.fireRate) return;
lastShot=now;
let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({x:player.x,y:player.y,dx:Math.cos(a)*9,dy:Math.sin(a)*9});
}

/* ULTI */
function useUlti(){
let now=Date.now();
if(now-lastUlti<10000) return;
lastUlti=now;
ultiEffectTime=20;
let removed=0;
enemies=enemies.filter(e=>{
let d=Math.hypot(player.x-e.x,player.y-e.y);
if(d<=200){ removed++; return false;}
return true;
});
kills+=removed;
}

/* SPAWN */
function spawnEnemy(type="normal"){
let e={
x:arena.x+Math.random()*arena.w,
y:arena.y+Math.random()*arena.h,
r:20,
maxHealth:5+level,
health:5+level,
speed:1.5+level*0.05,
type:type,
phase:0,
dashTimer:0
};

if(type==="boss"){
e.r=40+level*1.5;
e.maxHealth=40+level*6;
e.health=e.maxHealth;
e.speed=2;
}
if(type==="pentagon"){
e.r=80;
e.maxHealth=250;
e.health=250;
e.speed=1.5;
}

enemies.push(e);
}

/* LEVEL UP */
function openUpgrade(){
running=false;
menuOverlay.style.display="flex";
menuBox.innerHTML=`
<h2>LEVEL ${level}</h2>
<button onclick="upgrade('damage')">Hasar +</button>
<button onclick="upgrade('speed')">Hız +</button>
<button onclick="upgrade('health')">Can +</button>
<button onclick="upgrade('fireRate')">Ateş Hızı +</button>
`;
}

function upgrade(type){
if(type==="damage"){player.damage++;upgrades.damage++;}
if(type==="speed"){player.speed+=0.5;upgrades.speed++;}
if(type==="health"){player.maxHealth+=20;player.health=player.maxHealth;upgrades.health++;}
if(type==="fireRate"){
if(player.fireRate>80){player.fireRate-=20; upgrades.fireRate++;}
}
updateUpgradeUI();
menuOverlay.style.display="none";
running=true;
}

function updateUpgradeUI(){
uDamage.innerText=upgrades.damage;
uSpeed.innerText=upgrades.speed;
uHealth.innerText=upgrades.health;
uFireRate.innerText=upgrades.fireRate;
}

/* GAME LOOP */
function gameLoop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="white";
ctx.lineWidth=4;
ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);

if(running){

if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

player.x=Math.max(arena.x+player.r,Math.min(arena.x+arena.w-player.r,player.x));
player.y=Math.max(arena.y+player.r,Math.min(arena.y+arena.h-player.r,player.y));

if(mouseDown) shoot();

/* BULLETS */
bullets.forEach((b,i)=>{
b.x+=b.dx;b.y+=b.dy;
ctx.fillStyle="#facc15";
ctx.beginPath();ctx.arc(b.x,b.y,4,0,6.28);ctx.fill();

enemies.forEach((e,j)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
e.health-=player.damage;
bullets.splice(i,1);
if(e.health<=0){enemies.splice(j,1);kills++;}
}
});
});

/* ENEMIES */
enemies.forEach(e=>{
let ang=Math.atan2(player.y-e.y,player.x-e.x);

if(e.type==="boss"){
e.dashTimer++;
if(e.phase===0){
e.x+=Math.cos(ang)*6;
e.y+=Math.sin(ang)*6;
if(e.dashTimer>40){e.phase=1;e.dashTimer=0;}
}
else{
e.x+=Math.cos(ang)*1.5;
e.y+=Math.sin(ang)*1.5;
if(e.dashTimer>120){e.phase=0;e.dashTimer=0;}
}
}
else{
e.x+=Math.cos(ang)*e.speed;
e.y+=Math.sin(ang)*e.speed;
}

/* DRAW */
if(e.type==="pentagon"){
ctx.beginPath();
for(let i=0;i<5;i++){
let angle=i*2*Math.PI/5;
let px=e.x+Math.cos(angle)*e.r;
let py=e.y+Math.sin(angle)*e.r;
if(i===0) ctx.moveTo(px,py);
else ctx.lineTo(px,py);
}
ctx.closePath();
ctx.fillStyle="orange";
ctx.fill();
}
else{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,6.28);
ctx.fillStyle=e.type==="boss"?"purple":"red";
ctx.fill();
}

ctx.fillStyle="black";
ctx.fillRect(e.x-30,e.y-e.r-15,60,6);
ctx.fillStyle="lime";
ctx.fillRect(e.x-30,e.y-e.r-15,60*(e.health/e.maxHealth),6);

if(Math.hypot(player.x-e.x,player.y-e.y)<player.r+e.r){
player.health-=0.3;
}
});

/* LEVEL CHECK */
if(kills>=killNeed){
level++;
kills=0;
killNeed+=10;
openUpgrade();

if(level%5===0){
if(level===10) spawnEnemy("pentagon");
else spawnEnemy("boss");
}
}

/* UI */
healthBar.style.width=(player.health/player.maxHealth*100)+"%";
hpText.innerText=Math.max(0,Math.floor(player.health))+" HP";
xpBar.style.width=(kills/killNeed*100)+"%";
info.innerText="Kill: "+kills+" / "+killNeed+" | Level: "+level;
}

/* HAMSTER */
ctx.beginPath();
ctx.arc(player.x,player.y,22,0,6.28);
ctx.fillStyle="#d2b48c";
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(player.x-7,player.y-5,3,0,6.28);ctx.fill();
ctx.beginPath();
ctx.arc(player.x+7,player.y-5,3,0,6.28);ctx.fill();

/* GUN */
let ang=Math.atan2(mouse.y-player.y,mouse.x-player.x);
ctx.save();
ctx.translate(player.x,player.y);
ctx.rotate(ang);
ctx.fillStyle="#444";
ctx.fillRect(10,-4,28,8);
ctx.restore();

/* ULTI EFFECT */
if(ultiEffectTime>0){
ctx.beginPath();
ctx.arc(player.x,player.y,200-ultiEffectTime*5,0,6.28);
ctx.strokeStyle="rgba(0,200,255,0.6)";
ctx.lineWidth=8;
ctx.stroke();
ultiEffectTime--;
}

/* GAME OVER */
if(player.health<=0 && running){
running=false;
menuOverlay.style.display="flex";
menuBox.innerHTML="<h2>Oyun Bitti</h2><button onclick='resetGame()'>Tekrar Oyna</button>";
}

requestAnimationFrame(gameLoop);
}

function resetGame(){
menuOverlay.style.display="none";
initGame();
}

setInterval(()=>{
if(running && level%5!==0){
spawnEnemy();
}
},1500);

gameLoop();
</script>
</body>
</html>
