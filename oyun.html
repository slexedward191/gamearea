<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameArea Fight - Progressive XP System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap');

:root {
--neon-blue: #00f2ff;
--neon-red: #ff003c;
--neon-purple: #bc13fe;
--neon-gold: #ffcc00;
}

body {
margin:0;
background:#050505;
color:white;
font-family:'Orbitron',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#game-container{
position:relative;
width:1250px;
height:800px;
display:flex;
justify-content:center;
align-items:center;
}

#arena-wrapper{
position:relative;
width:1250px;
height:800px;
border:10px solid;
border-image:linear-gradient(90deg,var(--neon-red)50%,#ffffff50%)1;
box-shadow:0 0 40px rgba(255,0,0,0.4);
background:#111;
overflow:hidden;
z-index:5;
}

canvas{display:block;}

#enemy-counter{
position:absolute;
top:20px;
right:20px;
font-size:18px;
font-weight:bold;
color:#ff003c;
background:rgba(0,0,0,0.7);
padding:8px 14px;
border:2px solid #ff003c;
border-radius:6px;
z-index:200;
}

.ui-panel{
position:absolute;
background:rgba(0,0,0,0.85);
border:2px solid var(--neon-blue);
padding:10px;
border-radius:8px;
box-shadow:0 0 10px var(--neon-blue);
z-index:10;
}

#stats-panel{bottom:-50px;left:-160px;width:140px;color:var(--neon-blue);}
#xp-log{right:-160px;top:50%;transform:translateY(-50%);width:140px;max-height:300px;overflow:hidden;border-color:var(--neon-purple);}
#gold-display{top:-50px;left:0;color:var(--neon-gold);font-weight:bold;border-color:var(--neon-gold);}

#market-btn{
position:absolute;
bottom:-50px;
right:0;
padding:10px 25px;
background:var(--neon-gold);
color:black;
font-weight:bold;
border-radius:5px;
cursor:pointer;
box-shadow:0 0 15px var(--neon-gold);
z-index:20;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

.auth-box{
background:#111;
padding:30px;
border:3px solid var(--neon-purple);
text-align:center;
width:350px;
}

.auth-box input{
width:80%;
padding:10px;
margin:10px 0;
background:#000;
border:1px solid var(--neon-blue);
color:white;
font-family:'Orbitron';
}

.market-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.char-card{
background:#222;
border:2px solid var(--neon-blue);
padding:15px;
text-align:center;
width:180px;
}

.char-card.selected{
border-color:var(--neon-gold);
box-shadow:0 0 15px var(--neon-gold);
}

.btn-gif{
width:180px;
height:60px;
background:url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxxSTvT5Sqk/giphy.gif');
background-size:cover;
border:3px solid #fff;
color:white;
font-family:'Press Start 2P',cursive;
font-size:10px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
margin:10px;
}

#announcement{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:5rem;
color:var(--neon-red);
font-weight:bold;
display:none;
z-index:500;
}

#xp-bar-container{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:80%;
height:16px;
background:#fff;
border:2px solid #000;
z-index:5;
}

#xp-bar-fill{
height:100%;
width:0%;
background:var(--neon-purple);
transition:0.3s;
}
</style>
</head>

<body>

<div id="game-container">

<div id="arena-wrapper">

<div id="bg-title" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:65px;opacity:0.12;white-space:nowrap;pointer-events:none;z-index:1">
⚔️ GameArea Fight ⚔️
</div>

<canvas id="gameCanvas" width="1250" height="800"></canvas>

<div id="announcement">DALGA 1</div>

<div id="enemy-counter">KALAN DÜŞMAN: 0</div>

<div id="xp-bar-container"><div id="xp-bar-fill"></div></div>

</div>

<div id="gold-display" class="ui-panel">ALTIN: <span id="gold-count">0</span></div>

</div>

<script>

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

let enemies=[];
let bullets=[];
let particles=[];
let enemiesRemaining=0;

function updateEnemyCounter(){
document.getElementById("enemy-counter").innerText="KALAN DÜŞMAN: "+enemiesRemaining;
}

function spawnEnemies(count){

for(let i=0;i<count;i++){
enemies.push({
x:Math.random()*1250,
y:-30,
hp:250,
size:25,
speed:2
});
}

enemiesRemaining=enemies.length;
updateEnemyCounter();

}

let player={x:625,y:400};

function loop(){

ctx.clearRect(0,0,1250,800);

enemies.forEach((e,i)=>{

const ang=Math.atan2(player.y-e.y,player.x-e.x);

e.x+=Math.cos(ang)*e.speed;
e.y+=Math.sin(ang)*e.speed;

ctx.fillStyle="red";
ctx.fillRect(e.x-10,e.y-10,20,20);

bullets.forEach((b,bi)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<20){

e.hp-=50;

bullets.splice(bi,1);

if(e.hp<=0){

enemies.splice(i,1);
enemiesRemaining--;
updateEnemyCounter();

}

}

});

});

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,7);
ctx.fill();

requestAnimationFrame(loop);

}

spawnEnemies(15);
loop();

</script>

</body>
</html>
