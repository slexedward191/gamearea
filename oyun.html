<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Derby Legends: Pro Tycoon</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-gold: #ffcc00;
            --neon-blue: #00d4ff;
            --deep-red: #ff2e63;
            --ui-dark: #0f172a;
            --success: #00ff88;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #020617; font-family: 'Ubuntu', sans-serif; color: #f8fafc;
        }

        /* --- PROFESYONEL HUD --- */
        #ui-container { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .pointer { pointer-events: all; }

        .top-nav {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 2px solid var(--neon-gold);
            padding: 15px 50px; display: flex; justify-content: space-between; align-items: center;
        }

        .balance-tag { font-size: 28px; font-weight: 700; color: var(--neon-gold); filter: drop-shadow(0 0 5px var(--neon-gold)); }

        /* ANA PANEL */
        #garage-panel {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 900px; background: var(--ui-dark); border-radius: 24px;
            padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }

        .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }

        /* STATS & UPGRADES */
        .card { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .bar-container { height: 12px; background: #1e293b; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* YARIŞ MEKANİKLERİ */
        #race-field {
            position: fixed; inset: 0; background: #064e3b; display: none;
            perspective: 1000px;
        }
        .turf {
            height: 100%; width: 100%; 
            background: linear-gradient(90deg, #065f46 50%, #064e3b 50%);
            background-size: 200px 100%;
        }

        .horse-unit {
            position: absolute; width: 120px; height: 80px; 
            transition: left 0.1s linear; transform-style: preserve-3d;
        }

        /* KAMÇI BUTONU (Yarış Anında) */
        #action-bar {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px;
        }

        .whip-btn {
            width: 100px; height: 100px; border-radius: 50%; background: var(--deep-red);
            border: 4px solid #fff; color: #fff; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 46, 99, 0.4);
        }

        .whip-btn:active { transform: scale(0.9); background: #fff; color: var(--deep-red); }

        /* HAVA DURUMU PANELİ */
        .weather-tag { font-size: 14px; padding: 5px 15px; border-radius: 20px; background: #1e293b; margin-top: 10px; display: inline-block; }

        .btn-pro {
            background: linear-gradient(135deg, var(--neon-gold), #ffaa00);
            color: #000; border: none; padding: 15px 40px; border-radius: 12px;
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-pro:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="top-nav">
        <div class="balance-tag">🪙 <span id="gold-ui">1500</span></div>
        <div id="weather-ui" class="weather-tag">☁️ HAVA: BULUTLU</div>
        <div style="font-family: 'Oswald'; font-size: 20px; color: var(--neon-blue);">PRO DERBY LEGENDS</div>
    </div>

    <div id="garage-panel" class="pointer">
        <div class="grid">
            <div class="card">
                <div class="stat-header">
                    <h2 style="margin:0">SAF KAN SAVAŞÇI</h2>
                    <span id="horse-lvl" style="color:var(--neon-gold)">LVL 1</span>
                </div>

                <div style="margin-bottom: 25px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px"><span>HIZ (MAX KM/H)</span> <span id="val-speed">40</span></div>
                    <div class="bar-container"><div id="bar-speed" class="bar-fill" style="width:40%; background:var(--neon-blue)"></div></div>
                    <button class="btn-pro pointer" style="padding:5px 15px; font-size:10px" onclick="Game.upgrade('speed')">GÜÇLENDİR (300 🪙)</button>
                </div>

                <div style="margin-bottom: 25px;">
                    <div style="display:flex; justify-content:space-between; font-size:12px"><span>DAYANIKLILIK (STAMINA)</span> <span id="val-stam">100</span></div>
                    <div class="bar-container"><div id="bar-stam" class="bar-fill" style="width:50%; background:var(--success)"></div></div>
                    <button class="btn-pro pointer" style="padding:5px 15px; font-size:10px" onclick="Game.upgrade('stamina')">GÜÇLENDİR (400 🪙)</button>
                </div>
            </div>

            <div class="card" style="text-align:center">
                <div style="font-size: 14px; color: #888;">FORM DURUMU</div>
                <div id="moral-emoji" style="font-size: 50px; margin: 10px 0;">🔥</div>
                <p id="moral-text" style="font-size: 12px;">Atın çok enerjik! Yarışlarda +%10 hız bonusu alır.</p>
                <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
                <button class="btn-pro pointer" style="width:100%" onclick="Game.prepareRace()">BÜYÜK YARIŞA GİR (200 🪙)</button>
            </div>
        </div>
    </div>

    <div id="action-bar" class="hidden">
        <button class="whip-btn pointer" onclick="Game.applyWhip()">KAMÇI!</button>
        <div style="background:rgba(0,0,0,0.8); padding:10px 30px; border-radius:20px;">
            <div style="font-size:10px">KAMÇI ENERJİSİ</div>
            <div class="bar-container" style="width:150px; height:6px;"><div id="whip-energy" class="bar-fill" style="width:100%; background:var(--deep-red)"></div></div>
        </div>
    </div>
</div>

<div id="race-field">
    <div class="turf" id="turf-bg"></div>
    <div id="horse-lanes"></div>
</div>

<canvas id="fx-canvas"></canvas>

<div id="finish-modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 id="rank-text" style="font-size:80px; font-family:'Oswald'; color:var(--neon-gold)">1. OLDUN!</h1>
    <p id="payout-text" style="font-size:24px">KAZANCIN: 1000 🪙</p>
    <button class="btn-pro pointer" style="margin-top:30px" onclick="Game.closeResults()">AHIRA GERİ DÖN</button>
</div>

<script>
/**
 * DERBY LEGENDS: ENGINE V3.0 PRO
 */
const Game = {
    gold: 1500,
    horse: { speed: 40, stamina: 100, level: 1, energy: 100, moral: 1.1 },
    weather: "Bulutlu",
    isRacing: false,
    trackDist: 10000,
    playerPos: 0,
    rivals: [],
    whipEnergy: 100,

    init() {
        this.updateUI();
        this.changeWeather();
    },

    changeWeather() {
        const list = ["Güneşli", "Yağmurlu", "Fırtınalı", "Bulutlu"];
        this.weather = list[Math.floor(Math.random()*list.length)];
        const emojis = { "Güneşli": "☀️", "Yağmurlu": "🌧️", "Fırtınalı": "⚡", "Bulutlu": "☁️" };
        document.getElementById('weather-ui').innerText = emojis[this.weather] + " HAVA: " + this.weather.toUpperCase();
    },

    upgrade(type) {
        let cost = type === 'speed' ? 300 : 400;
        if(this.gold >= cost) {
            this.gold -= cost;
            this.horse[type] += 5;
            this.horse.level++;
            this.updateUI();
            this.playAudio(600, 'square', 0.1);
        }
    },

    prepareRace() {
        if(this.gold < 200) return;
        this.gold -= 200;
        this.isRacing = true;
        this.playerPos = 0;
        this.whipEnergy = 100;
        
        document.getElementById('garage-panel').classList.add('hidden');
        document.getElementById('race-field').style.display = 'block';
        document.getElementById('action-bar').classList.remove('hidden');
        
        this.setupLanes();
        this.raceLoop();
    },

    setupLanes() {
        const container = document.getElementById('horse-lanes');
        container.innerHTML = '';
        this.rivals = [];
        
        const laneH = window.innerHeight / 6;
        for(let i=0; i<6; i++) {
            const lane = document.createElement('div');
            lane.style.position = 'absolute';
            lane.style.top = (i * laneH) + 'px';
            lane.style.width = '100%';
            lane.style.height = laneH + 'px';
            lane.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
            
            const horse = document.createElement('div');
            horse.className = 'horse-unit';
            horse.style.backgroundColor = i === 0 ? 'var(--neon-gold)' : '#334155';
            horse.style.borderRadius = '8px';
            horse.style.top = '20px';
            
            lane.appendChild(horse);
            container.appendChild(lane);
            
            if(i === 0) {
                this.playerEl = horse;
            } else {
                this.rivals.push({
                    el: horse,
                    pos: 0,
                    speed: (this.horse.speed * 0.8) + Math.random() * 15,
                    power: 0
                });
            }
        }
    },

    applyWhip() {
        if(this.whipEnergy >= 20) {
            this.whipEnergy -= 20;
            this.horse.energy += 15; // Anlık hız patlaması
            this.playAudio(200, 'sawtooth', 0.05);
            this.updateUI();
        }
    },

    raceLoop() {
        if(!this.isRacing) return;

        // Arka plan kaydırma efekti (Parallax)
        const turf = document.getElementById('turf-bg');
        turf.style.backgroundPositionX = (-this.playerPos * 2) + "px";

        // Oyuncu Hareket Mantığı
        let weatherPenalty = (this.weather === "Yağmurlu" || this.weather === "Fırtınalı") ? 0.8 : 1.0;
        let baseSpeed = (this.horse.speed / 10) * this.horse.moral * weatherPenalty;
        
        // Kamçı etkisi sönümlenmesi
        this.horse.energy *= 0.95;
        this.playerPos += baseSpeed + (this.horse.energy / 15);
        
        // Görsel Konumlandırma (Rakiplere göre farkı gösterir)
        const screenW = window.innerWidth - 200;
        this.playerEl.style.left = "100px"; // Oyuncu merkezde, rakipler ona göre geri/ileri gider

        // Rakipleri oyuncuya göre konumlandır
        this.rivals.forEach(r => {
            r.pos += r.speed / 10;
            let relativePos = 100 + (r.pos - this.playerPos);
            r.el.style.left = relativePos + "px";
            
            // Eğer rakip bitişe ulaştıysa (Yarış biter)
            if(r.pos >= this.trackDist) this.finishRace(false);
        });

        if(this.playerPos >= this.trackDist) {
            this.finishRace(true);
        } else {
            // Kamçı enerjisi yavaşça dolar
            if(this.whipEnergy < 100) this.whipEnergy += 0.1;
            document.getElementById('whip-energy').style.width = this.whipEnergy + "%";
            requestAnimationFrame(() => this.raceLoop());
        }
    },

    finishRace(won) {
        this.isRacing = false;
        document.getElementById('finish-modal').classList.remove('hidden');
        const rText = document.getElementById('rank-text');
        const pText = document.getElementById('payout-text');
        
        if(won) {
            rText.innerText = "1. OLDUN!";
            rText.style.color = "var(--neon-gold)";
            this.gold += 1000;
            pText.innerText = "KAZANCIN: 1000 🪙";
        } else {
            rText.innerText = "ELENDİN!";
            rText.style.color = "var(--deep-red)";
            pText.innerText = "Rakipler seni geçti.";
        }
        this.updateUI();
    },

    closeResults() {
        document.getElementById('finish-modal').classList.add('hidden');
        document.getElementById('race-field').style.display = 'none';
        document.getElementById('action-bar').classList.add('hidden');
        document.getElementById('garage-panel').classList.remove('hidden');
        this.changeWeather();
    },

    updateUI() {
        document.getElementById('gold-ui').innerText = Math.floor(this.gold);
        document.getElementById('val-speed').innerText = this.horse.speed;
        document.getElementById('bar-speed').style.width = this.horse.speed + "%";
        document.getElementById('val-stam').innerText = this.horse.stamina;
        document.getElementById('bar-stam').style.width = (this.horse.stamina / 2) + "%";
        document.getElementById('horse-lvl').innerText = "LVL " + this.horse.level;
    },

    playAudio(f, t, d) {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(ac.currentTime + d);
    }
};

Game.init();
</script>
</body>
</html>
