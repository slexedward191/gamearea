<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameArea Fight - Final Fix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --neon-purple: #bc13fe;
            --neon-gold: #ffcc00;
        }

        body { margin: 0; background-color: #050505; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 1250px; height: 800px; }
        #arena-wrapper { position: relative; width: 1250px; height: 800px; border: 10px solid; border-image: linear-gradient(90deg, var(--neon-red) 50%, #ffffff 50%) 1; background: #111; overflow: hidden; z-index: 5; }
        canvas { display: block; }

        .ui-panel { position: absolute; background: rgba(0, 0, 0, 0.85); border: 2px solid var(--neon-blue); padding: 10px; border-radius: 8px; z-index: 10; }
        #stats-panel { bottom: 10px; left: 10px; width: 160px; color: var(--neon-blue); }
        #xp-log { right: 10px; top: 50%; transform: translateY(-50%); width: 140px; border-color: var(--neon-purple); }
        #gold-display { top: 10px; left: 10px; color: var(--neon-gold); font-weight: bold; border-color: var(--neon-gold); }
        #enemy-counter { top: 10px; right: 10px; color: var(--neon-red); font-weight: bold; display: none; }
        #market-btn { position: absolute; bottom: 10px; right: 10px; padding: 10px 25px; background: var(--neon-gold); color: black; font-weight: bold; border-radius: 5px; cursor: pointer; z-index: 20; }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .auth-box { background: #111; padding: 30px; border: 3px solid var(--neon-purple); text-align: center; width: 350px; }
        .auth-box input { width: 80%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--neon-blue); color: white; font-family: 'Orbitron'; }
        
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .level-card { background: #222; border: 2px solid #444; padding: 15px; text-align: center; cursor: pointer; opacity: 0.4; pointer-events: none; transition: 0.3s; }
        .level-card.unlocked { opacity: 1; border-color: var(--neon-blue); pointer-events: auto; }
        .level-card.unlocked:hover { background: var(--neon-blue); color: black; }

        #xp-bar-container { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 80%; height: 16px; background: #333; border: 2px solid #000; z-index: 5; }
        #xp-bar-fill { height: 100%; width: 0%; background: var(--neon-purple); transition: 0.3s; }
        #announcement { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 5rem; color: var(--neon-red); display: none; z-index: 500; font-weight: bold; }
        #cooldown-display { position: absolute; color: var(--neon-red); font-size: 14px; display: none; z-index: 100; pointer-events: none; text-shadow: 0 0 5px black; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="arena-wrapper">
        <canvas id="gameCanvas" width="1250" height="800"></canvas>
        <div id="announcement">DALGA 1</div>
        <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
        <div id="cooldown-display">BEKLEME: <span id="cooldown-timer">15</span>s</div>
    </div>

    <div id="gold-display" class="ui-panel">ALTIN: <span id="gold-count">0</span></div>
    <div id="enemy-counter" class="ui-panel">KALAN: <span id="enemy-count">0</span></div>
    <div id="stats-panel" class="ui-panel"><h5 style="margin:0 0 5px 0">STATS</h5><div id="stat-list" style="font-size: 11px;">• Henüz eklenti yok</div></div>
    <div id="xp-log" class="ui-panel"><h5 style="margin:0 0 5px 0">ÖLDÜRME</h5><div id="log-list" style="font-size: 10px;"></div></div>
    <div id="market-btn" onclick="toggleMarket()">MARKET</div>

    <div id="auth-screen" class="overlay">
        <div class="auth-box">
            <h2 style="color:var(--neon-blue)">GİRİŞ YAP</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                <button onclick="handleAuth('login')" style="background:var(--neon-purple); border:none; color:white; padding:12px; cursor:pointer; font-weight:bold;">GİRİŞ YAP / KAYDOL</button>
                <button onclick="handleAuth('guest')" style="background:#444; border:none; color:white; padding:10px; cursor:pointer;">MİSAFİR OLARAK OYNA</button>
                <button onclick="showGuide()" style="background:transparent; border:1px solid var(--neon-blue); color:var(--neon-blue); padding:10px; cursor:pointer;">NASIL OYNANIR?</button>
            </div>
        </div>
    </div>

    <div id="start-screen" class="overlay" style="display:none">
        <h1 style="color: var(--neon-red); font-size: 45px; margin-bottom:0;">BÖLÜM SEÇ</h1>
        <p id="welcome-msg" style="color:var(--neon-blue); margin-bottom:20px;"></p>
        <div class="level-grid" id="level-grid"></div>
        <button onclick="toggleMarket()" style="margin-top:30px; background:var(--neon-gold); border:none; padding:10px 40px; font-weight:bold; cursor:pointer;">MARKET</button>
    </div>

    <div id="upgrade-screen" class="overlay" style="display:none">
        <h2 style="color:var(--neon-purple)">EKLENTİ SEÇ</h2>
        <div id="upgrade-options" style="display:flex; gap:15px;"></div>
    </div>

    <div id="death-screen" class="overlay" style="display:none">
        <h1 style="color: white; font-size: 60px;">ÖLDÜN!</h1>
        <button onclick="location.reload()" style="padding:15px 40px; background:var(--neon-red); color:white; border:none; cursor:pointer; font-family:'Orbitron';">TEKRAR DENE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentUser = null, isGuest = false;

    const ENEMY_COLORS = ['#ff003c', '#00ff00', '#bc13fe', '#ffcc00', '#ffffff', '#00f2ff'];
    const CHARS = [
        { id: 'std', name: 'Standart', hp: 100, armor: 0, color: '#00f2ff' },
        { id: 'mus', name: 'Kaslı', hp: 500, armor: 20, color: '#ff003c' }
    ];

    let gameState = {
        isRunning: false, wave: 0, xp: 0, xpRequired: 50, level: 1, gold: 0,
        unlockedLevel: 1, selectedChar: 'std'
    };

    function handleAuth(type) {
        if (type === 'guest') { 
            isGuest = true; currentUser = "Misafir"; 
            gameState.unlockedLevel = 1;
        } else {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (!u || !p) return alert("Alanları doldur!");
            let users = JSON.parse(localStorage.getItem('gf_users') || '{}');
            if (users[u]) {
                if (users[u].password !== p) return alert("Hatalı şifre!");
                gameState = users[u].state;
            } else {
                users[u] = { password: p, state: gameState };
                localStorage.setItem('gf_users', JSON.stringify(users));
            }
            currentUser = u;
        }
        showStart();
    }

    function showStart() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('welcome-msg').innerText = `Hoş geldin, ${currentUser}!`;
        renderLevels();
    }

    function renderLevels() {
        const grid = document.getElementById('level-grid');
        grid.innerHTML = '';
        // En az 1. bölüm açık olmalı
        if(!gameState.unlockedLevel) gameState.unlockedLevel = 1;

        for(let i=1; i<=20; i++) {
            const div = document.createElement('div');
            const isUnlocked = i <= gameState.unlockedLevel;
            div.className = `level-card ${isUnlocked ? 'unlocked' : ''}`;
            div.innerText = `Bölüm ${i}`;
            if(isUnlocked) div.onclick = () => { gameState.currentMission = i; startGame(); };
            grid.appendChild(div);
        }
    }

    function showGuide() {
        alert("KONTROLLER:\nW-A-S-D: Hareket\nSOL TIK: Ateş Et\nSAĞ TIK: Alan Hasarı (Yetenek)\n\nDüşmanları öldürerek XP topla ve geliş!");
    }

    // OYUN MOTORU DEĞİŞKENLERİ
    let enemies = [], bullets = [], particles = [], keys = {}, mousePressed = false;
    let lastShot = 0, lastAreaDamageTime = 0, areaDamageCooldown = 15000, player = {};

    function startGame() {
        const char = CHARS.find(c => c.id === gameState.selectedChar);
        player = { 
            x: 625, y: 400, hp: char.hp, maxHp: char.hp, armor: char.armor, 
            speed: 4, dmg: 35, shootSpeed: 300, upgrades: [], color: char.color 
        };
        enemies = []; bullets = []; particles = [];
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('enemy-counter').style.display = 'block';
        gameState.isRunning = true; gameState.wave = 0; gameState.xp = 0;
        nextWave();
        requestAnimationFrame(loop);
    }

    function nextWave() {
        if (gameState.wave >= 5) {
            gameState.isRunning = false;
            if(gameState.currentMission >= gameState.unlockedLevel) gameState.unlockedLevel++;
            saveGame();
            alert("TEBRİKLER! Bölüm Tamamlandı.");
            location.reload();
            return;
        }
        gameState.wave++;
        gameState.isRunning = false;
        const ann = document.getElementById('announcement');
        ann.innerText = `DALGA ${gameState.wave}`;
        ann.style.display = 'block';
        setTimeout(() => { ann.style.display = 'none'; spawnEnemies(); gameState.isRunning = true; }, 2000);
    }

    function spawnEnemies() {
        const count = gameState.wave * 4;
        for(let i=0; i<count; i++) {
            enemies.push({
                x: Math.random() * 1200, y: Math.random() < 0.5 ? -50 : 850,
                hp: 100 + (gameState.wave * 20),
                size: 25,
                speed: 1.5 + (Math.random()),
                color: ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)] // RENKLER BURADA
            });
        }
        updateEnemyUI();
    }

    function performAreaDamage() {
        const now = Date.now();
        if (now - lastAreaDamageTime < areaDamageCooldown) return;
        lastAreaDamageTime = now;
        particles.push({ type: 'area', radius: 180, life: 1.0, color: '#00f2ff' });
    }

    function updateEnemyUI() { document.getElementById('enemy-count').innerText = enemies.length; }
    function saveGame() { if(!isGuest) { let users = JSON.parse(localStorage.getItem('gf_users')); users[currentUser].state = gameState; localStorage.setItem('gf_users', JSON.stringify(users)); }}

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;
    canvas.onmousedown = e => { if(e.button === 0) mousePressed = true; if(e.button === 2) performAreaDamage(); };
    window.onmouseup = () => mousePressed = false;
    canvas.oncontextmenu = e => e.preventDefault();

    function loop() {
        if (!gameState.isRunning) return;
        ctx.clearRect(0,0,1250,800);

        // Hareket
        if (keys['KeyW'] && player.y > 25) player.y -= player.speed;
        if (keys['KeyS'] && player.y < 775) player.y += player.speed;
        if (keys['KeyA'] && player.x > 25) player.x -= player.speed;
        if (keys['KeyD'] && player.x < 1225) player.x += player.speed;

        // Ateş
        if (mousePressed && Date.now() - lastShot > player.shootSpeed) {
            bullets.push({ x: player.x, y: player.y, vx: 10, vy: 0 }); // Basit yön, mouse takibi eklenebilir
            lastShot = Date.now();
        }

        // Alan Hasarı Efekti (Sağ Tık)
        particles.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(player.x, player.y, p.radius * (1-p.life + 0.5), 0, Math.PI*2);
            ctx.strokeStyle = p.color; ctx.lineWidth = 5; ctx.stroke();
            enemies.forEach(e => { if(Math.hypot(e.x-player.x, e.y-player.y) < p.radius) e.hp -= 2; });
            p.life -= 0.02; if(p.life <= 0) particles.splice(i,1);
        });

        // Düşman İşleme
        enemies.forEach((e, i) => {
            const ang = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(ang) * e.speed; e.y += Math.sin(ang) * e.speed;
            
            ctx.fillStyle = e.color;
            ctx.fillRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);

            if (Math.hypot(player.x-e.x, player.y-e.y) < 30) {
                if(player.armor > 0) player.armor -= 0.2; else player.hp -= 0.5;
                if(player.hp <= 0) { gameState.isRunning = false; document.getElementById('death-screen').style.display='flex'; }
            }
            if(e.hp <= 0) { enemies.splice(i,1); gameState.gold += 5; updateEnemyUI(); if(enemies.length === 0) nextWave(); }
        });

        // Oyuncu Çizim
        ctx.fillStyle = player.color;
        ctx.beginPath(); ctx.arc(player.x, player.y, 20, 0, Math.PI*2); ctx.fill();

        // HP & Armor Barları
        ctx.fillStyle = "red"; ctx.fillRect(player.x-25, player.y-40, 50 * (player.hp/player.maxHp), 5);
        ctx.fillStyle = "cyan"; ctx.fillRect(player.x-25, player.y-33, 50 * (player.armor/100), 3);

        // Cooldown UI
        const cd = areaDamageCooldown - (Date.now() - lastAreaDamageTime);
        if(cd > 0) {
            const ui = document.getElementById('cooldown-display'); ui.style.display = 'block';
            ui.style.left = player.x + "px"; ui.style.top = (player.y - 70) + "px";
            document.getElementById('cooldown-timer').innerText = Math.ceil(cd/1000);
        } else document.getElementById('cooldown-display').style.display = 'none';

        requestAnimationFrame(loop);
    }
    
    function toggleMarket() { alert("Market şu an bu bölümde kapalı, önce savaşı kazan!"); }
</script>
</body>
</html>
