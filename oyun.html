<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GameArea Arena</title>
<style>
body{margin:0;overflow:hidden;background:#0f172a;font-family:Arial}
canvas{display:block}

.ui{
position:fixed;
top:20px;
right:20px;
color:white;
text-align:right;
}

.bar{
width:220px;
height:16px;
background:#334155;
border-radius:8px;
overflow:hidden;
margin-bottom:6px;
}

.fill{height:100%}

.upgradePanel{
position:fixed;
bottom:20px;
right:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
color:white;
width:180px;
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.menu{
background:#1e293b;
padding:30px;
border-radius:12px;
color:white;
text-align:center;
width:300px;
}

.menu button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="ui">
<div class="bar"><div id="healthBar" class="fill" style="background:#22c55e;width:100%"></div></div>
<div class="bar"><div id="xpBar" class="fill" style="background:#38bdf8;width:0%"></div></div>
<div id="info">Kill: 0 | Level: 1</div>
<div>Ulti: <span id="ultiCD">Hazır</span></div>
</div>

<div class="upgradePanel">
<b>Geliştirmeler</b>
<p>Hasar: <span id="uDamage">0</span></p>
<p>Hız: <span id="uSpeed">0</span></p>
<p>Can: <span id="uHealth">0</span></p>
</div>

<div class="overlay" id="menuOverlay">
<div class="menu" id="menuBox"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const arena={
x:100,
y:100,
w:canvas.width-200,
h:canvas.height-200
};

let player={
x:canvas.width/2,
y:canvas.height/2,
r:20,
speed:4,
health:100,
maxHealth:100,
damage:1,
fireRate:250
};

let upgrades={damage:0,speed:0,health:0};

let bullets=[],enemies=[];
let keys={},mouse={x:0,y:0},mouseDown=false;

let kills=0;
let level=1;
let killNeed=10;

let lastShot=0;
let lastUlti=0;
let ultiEffectTime=0;

let running=true;

/* INPUT */
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
document.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
document.addEventListener("mousedown",e=>{
if(e.button===0) mouseDown=true;
if(e.button===2) useUlti();
});
document.addEventListener("mouseup",()=>mouseDown=false);
document.addEventListener("contextmenu",e=>e.preventDefault());

/* SHOOT */
function shoot(){
let now=Date.now();
if(now-lastShot<player.fireRate) return;
lastShot=now;

let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(a)*8,
dy:Math.sin(a)*8
});
}

/* ULTI */
function useUlti(){
let now=Date.now();
if(now-lastUlti<10000) return;
lastUlti=now;
ultiEffectTime=20;

enemies=enemies.filter(e=>{
return Math.hypot(player.x-e.x,player.y-e.y)>180;
});
}

/* SPAWN */
function spawnEnemy(){
let isBoss=level%5===0;

let enemy={
x:arena.x+Math.random()*arena.w,
y:arena.y+Math.random()*arena.h,
r:isBoss?40:20,
maxHealth:isBoss?30+level:5+level,
health:isBoss?30+level:5+level,
speed:isBoss?1.2:1.5+level*0.05
};

enemies.push(enemy);
}

/* UPGRADE MENU */
function openUpgrade(){
running=false;
menuOverlay.style.display="flex";
menuBox.innerHTML="<h2>LEVEL "+level+"</h2>"+
"<button onclick='upgrade(\"damage\")'>Hasar +</button>"+
"<button onclick='upgrade(\"speed\")'>Hız +</button>"+
"<button onclick='upgrade(\"health\")'>Can +</button>";
}

function upgrade(type){
if(type==="damage"){player.damage++;upgrades.damage++;}
if(type==="speed"){player.speed+=0.5;upgrades.speed++;}
if(type==="health"){player.maxHealth+=20;player.health=player.maxHealth;upgrades.health++;}

uDamage.innerText=upgrades.damage;
uSpeed.innerText=upgrades.speed;
uHealth.innerText=upgrades.health;

menuOverlay.style.display="none";
running=true;
}

/* GAME LOOP */
function gameLoop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* Arena */
ctx.strokeStyle="white";
ctx.lineWidth=4;
ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);

if(running){

/* Movement */
if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

/* Wall collision */
player.x=Math.max(arena.x+player.r,Math.min(arena.x+arena.w-player.r,player.x));
player.y=Math.max(arena.y+player.r,Math.min(arena.y+arena.h-player.r,player.y));

if(mouseDown) shoot();

/* Bullets */
bullets.forEach((b,i)=>{
b.x+=b.dx;
b.y+=b.dy;

ctx.beginPath();
ctx.arc(b.x,b.y,5,0,6.28);
ctx.fillStyle="#38bdf8";
ctx.fill();

enemies.forEach((e,j)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
e.health-=player.damage;
bullets.splice(i,1);
if(e.health<=0){
enemies.splice(j,1);
kills++;
}
}
});
});

/* Enemies */
enemies.forEach(e=>{
let ang=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(ang)*e.speed;
e.y+=Math.sin(ang)*e.speed;

ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,6.28);
ctx.fillStyle=e.r>20?"purple":"red";
ctx.fill();

/* Enemy Health Bar */
ctx.fillStyle="black";
ctx.fillRect(e.x-20,e.y-e.r-15,40,5);
ctx.fillStyle="lime";
ctx.fillRect(e.x-20,e.y-e.r-15,40*(e.health/e.maxHealth),5);

if(Math.hypot(player.x-e.x,player.y-e.y)<player.r+e.r){
player.health-=0.3;
}
});

/* Level */
if(kills>=killNeed){
level++;
kills=0;
killNeed+=10;
openUpgrade();
}

}

/* Player */
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,6.28);
ctx.fillStyle="#22c55e";
ctx.fill();

/* Gun */
let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);
ctx.beginPath();
ctx.moveTo(player.x,player.y);
ctx.lineTo(player.x+Math.cos(a)*40,player.y+Math.sin(a)*40);
ctx.strokeStyle="white";
ctx.lineWidth=6;
ctx.stroke();

/* Ulti Effect */
if(ultiEffectTime>0){
ctx.beginPath();
ctx.arc(player.x,player.y,200-ultiEffectTime*5,0,6.28);
ctx.strokeStyle="rgba(0,200,255,0.6)";
ctx.lineWidth=8;
ctx.stroke();
ultiEffectTime--;
}

/* UI */
healthBar.style.width=(player.health/player.maxHealth*100)+"%";
xpBar.style.width=(kills/killNeed*100)+"%";
info.innerText="Kill: "+kills+" / "+killNeed+" | Level: "+level;

let cd=Math.max(0,10-Math.floor((Date.now()-lastUlti)/1000));
ultiCD.innerText=cd===0?"Hazır":cd+"s";

/* Death */
if(player.health<=0){
alert("Oyun Bitti");
location.reload();
}

requestAnimationFrame(gameLoop);
}

/* Spawn scaling */
setInterval(()=>{
if(running){
let count=1;
if(level>=10) count=3;
else if(level>=5) count=2;
for(let i=0;i<count;i++) spawnEnemy();
}
},1500);

gameLoop();
</script>
</body>
</html>
