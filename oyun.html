<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dragon Lordz: Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; --green: #2ecc71; }
        body { margin: 0; background: #0b0e11; font-family: 'Poppins', sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-container { position: relative; width: 1000px; height: 600px; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); border: 5px solid var(--gold); border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden; }
        
        /* Battle UI */
        .health-bar-container { position: absolute; width: 300px; height: 30px; background: #333; border: 2px solid white; border-radius: 15px; overflow: hidden; }
        .health-fill { width: 100%; height: 100%; background: var(--green); transition: width 0.5s ease-out; }
        .player-ui { top: 50px; left: 50px; }
        .bot-ui { top: 50px; right: 50px; text-align: right; }
        
        /* Dragon Graphics */
        .dragon { position: absolute; width: 150px; height: 150px; transition: transform 0.2s; }
        #player-dragon { bottom: 150px; left: 150px; background: url('https://cdn-icons-png.flaticon.com/512/606/606553.png') no-repeat center/contain; transform: scaleX(-1); }
        #bot-dragon { bottom: 150px; right: 150px; background: url('https://cdn-icons-png.flaticon.com/512/606/606548.png') no-repeat center/contain; }

        /* Action Menu */
        #action-menu { position: absolute; bottom: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 3px solid var(--gold); }
        .skill-btn { padding: 15px 25px; border: 2px solid var(--gold); background: #222; color: white; border-radius: 10px; cursor: pointer; transition: 0.3s; font-family: 'Cinzel'; }
        .skill-btn:hover:not(:disabled) { background: var(--gold); color: black; transform: translateY(-5px); }
        .skill-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; }

        /* Logs */
        #battle-log { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); text-align: center; font-style: italic; color: #fff; text-shadow: 2px 2px 4px #000; width: 80%; }
        
        /* Animations */
        .attack-anim { transform: translateX(100px) scaleX(-1.2) !important; }
        .bot-attack-anim { transform: translateX(-100px) scale(1.2) !important; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0% { left: 150px; } 25% { left: 140px; } 50% { left: 160px; } 75% { left: 140px; } 100% { left: 150px; } }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="player-ui">
            <h3 id="p-name">Ateş Ejderhası (Lv. 5)</h3>
            <div class="health-bar-container"><div id="p-hp" class="health-fill"></div></div>
            <p>HP: <span id="p-hp-text">100/100</span></p>
        </div>

        <div class="bot-ui">
            <h3 id="b-name">Karanlık Lord (Lv. 7)</h3>
            <div class="health-bar-container"><div id="b-hp" class="health-fill" style="float: right;"></div></div>
            <p style="clear: both;">HP: <span id="b-hp-text">150/150</span></p>
        </div>

        <div id="battle-log">Savaş Başlıyor! Senin sıran...</div>

        <div id="player-dragon" class="dragon"></div>
        <div id="bot-dragon" class="dragon"></div>

        <div id="action-menu">
            <button class="skill-btn" onclick="playerMove('attack')">🔥 ALEV NEFESİ</button>
            <button class="skill-btn" onclick="playerMove('special')">☄️ METEOR ÇARPMASI</button>
            <button class="skill-btn" onclick="playerMove('heal')">🛡️ CANLANMA</button>
        </div>
    </div>

<script>
    let pState = { hp: 100, maxHp: 100, name: "Ejderhan" };
    let bState = { hp: 150, maxHp: 150, name: "Karanlık Lord" };
    let isPlayerTurn = true;

    const log = document.getElementById('battle-log');
    const pBtn = document.querySelectorAll('.skill-btn');

    function updateUI() {
        document.getElementById('p-hp').style.width = (pState.hp / pState.maxHp * 100) + "%";
        document.getElementById('b-hp').style.width = (bState.hp / bState.maxHp * 100) + "%";
        document.getElementById('p-hp-text').innerText = `${Math.ceil(pState.hp)}/${pState.maxHp}`;
        document.getElementById('b-hp-text').innerText = `${Math.ceil(bState.hp)}/${bState.maxHp}`;
        
        pBtn.forEach(btn => btn.disabled = !isPlayerTurn);
    }

    async function playerMove(type) {
        if(!isPlayerTurn) return;
        isPlayerTurn = false;
        
        let dmg = 0;
        const pDrag = document.getElementById('player-dragon');
        const bDrag = document.getElementById('bot-dragon');

        if(type === 'attack') {
            dmg = 15 + Math.random() * 10;
            log.innerText = `${pState.name} Alev Nefesi kullandı!`;
            pDrag.classList.add('attack-anim');
        } else if(type === 'special') {
            dmg = 30 + Math.random() * 15;
            log.innerText = `${pState.name} METEOR ÇAĞIRDI!`;
            bDrag.style.filter = "hue-rotate(90deg) brightness(2)";
        } else {
            let heal = 25;
            pState.hp = Math.min(pState.maxHp, pState.hp + heal);
            log.innerText = `${pState.name} yaralarını iyileştirdi.`;
        }

        bState.hp = Math.max(0, bState.hp - dmg);
        updateUI();
        
        setTimeout(() => {
            pDrag.classList.remove('attack-anim');
            bDrag.style.filter = "none";
            if(bState.hp <= 0) {
                log.innerText = "TEBRİKLER! Karanlık Lord'u yendin!";
                return;
            }
            setTimeout(botMove, 1500);
        }, 600);
    }

    async function botMove() {
        const bDrag = document.getElementById('bot-dragon');
        const pDrag = document.getElementById('player-dragon');
        let dmg = 0;

        // Basit AI: Canı %20'den azsa iyileşmeye çalışır
        if(bState.hp < bState.maxHp * 0.2 && Math.random() > 0.5) {
            bState.hp += 20;
            log.innerText = "Karanlık Lord karanlık güçle iyileşiyor!";
        } else {
            dmg = 10 + Math.random() * 20;
            log.innerText = "Karanlık Lord pençe attı!";
            bDrag.classList.add('bot-attack-anim');
            pDrag.classList.add('shake');
        }

        pState.hp = Math.max(0, pState.hp - dmg);
        updateUI();

        setTimeout(() => {
            bDrag.classList.remove('bot-attack-anim');
            pDrag.classList.remove('shake');
            if(pState.hp <= 0) {
                log.innerText = "YENİLDİN! Ejderhan nakavt oldu.";
                return;
            }
            isPlayerTurn = true;
            log.innerText = "Senin sıran! Ne yapacaksın?";
            updateUI();
        }, 1000);
    }

    updateUI();
</script>
</body>
</html>
