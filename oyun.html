<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arena Zombi v3.0</title>
<style>
body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
}
canvas{
    background:#181818;
    border:4px solid #333;
}
#overlay{
    position:absolute;
    width:1200px;
    height:700px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
    visibility:hidden;
    text-align:center;
}
button{
    padding:10px 20px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}
#infoBtn{
    position:absolute;
    top:10px;
    left:10px;
}
#upgradePanel{
    position:absolute;
    left:10px;
    bottom:10px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    font-size:14px;
}
#perkPanel{
    position:absolute;
    right:10px;
    bottom:10px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    font-size:14px;
}
</style>
</head>
<body>

<button id="infoBtn">Oyun Hakkında</button>

<canvas id="game" width="1200" height="700"></canvas>

<div id="overlay"></div>
<div id="upgradePanel"><b>Upgrades:</b><br></div>
<div id="perkPanel"><b>Perk Slotları (0/3)</b><br></div>

<script>

/* ================= CORE ================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const upgradePanel = document.getElementById("upgradePanel");
const perkPanel = document.getElementById("perkPanel");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let lastTime = 0;
let deltaTime = 0;
let gameOver = false;
let paused = false;

/* ================= AUDIO ================= */

const shootSound = new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
shootSound.volume = 0.2;

const hitSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
hitSound.volume = 0.2;

/* ================= INPUT ================= */

let keys = {};
let mouse = {x:0,y:0};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

/* ================= WAVE ================= */

let wave = 1;
let zombiesToSpawn = 10;
let spawnTimer = 0;
let spawnDelay = 2;

/* ================= PERK SYSTEM ================= */

let perks = [];
let maxPerks = 3;

function addPerk(name, apply){
    if(perks.length>=maxPerks) return;
    if(perks.includes(name)) return;
    perks.push(name);
    apply();
    updatePerkPanel();
}

function updatePerkPanel(){
    perkPanel.innerHTML = "<b>Perk Slotları ("+perks.length+"/3)</b><br>";
    perks.forEach(p=> perkPanel.innerHTML += p+"<br>");
}

/* ================= PLAYER ================= */

class Player{
    constructor(){
        this.x = WIDTH/2;
        this.y = HEIGHT/2;
        this.r = 16;
        this.speed = 220;
        this.maxHp = 100;
        this.hp = 100;
        this.maxAmmo = 30;
        this.ammo = 30;
        this.reloadTime = 1.2;
        this.reloadTimer = 0;
        this.fireRate = 0.2;
        this.fireTimer = 0;
        this.damage = 20;
        this.critChance = 0.15;
        this.level = 1;
        this.xp = 0;
        this.xpNeeded = 100;
        this.riskMode = false;
    }

    update(dt){

        let vx=0, vy=0;
        if(keys["w"]) vy-=1;
        if(keys["s"]) vy+=1;
        if(keys["a"]) vx-=1;
        if(keys["d"]) vx+=1;

        let len = Math.hypot(vx,vy);
        if(len>0){ vx/=len; vy/=len; }

        this.x += vx*this.speed*dt;
        this.y += vy*this.speed*dt;

        this.x = Math.max(this.r,Math.min(WIDTH-this.r,this.x));
        this.y = Math.max(this.r,Math.min(HEIGHT-this.r,this.y));

        if(this.reloadTimer>0){
            this.reloadTimer-=dt;
            if(this.reloadTimer<=0){
                this.ammo=this.maxAmmo;
            }
        }

        if(this.ammo<=0 && this.reloadTimer<=0){
            this.reloadTimer=this.reloadTime;
        }

        this.fireTimer-=dt;
        if(this.fireTimer<=0 && this.ammo>0 && this.reloadTimer<=0){
            this.shoot();
            this.fireTimer=this.fireRate;
        }
    }

    shoot(){
        this.ammo--;
        shootSound.currentTime=0;
        shootSound.play();

        let angle = Math.atan2(mouse.y-this.y, mouse.x-this.x);
        bullets.push(new Bullet(this.x,this.y,Math.cos(angle),Math.sin(angle),this.damage));
    }

    gainXP(amount){
        this.xp+=amount;
        if(this.xp>=this.xpNeeded){
            this.level++;
            this.xp=0;
            this.xpNeeded+=80;
            levelUp();
        }
    }

    draw(){
        ctx.fillStyle="#3498db";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

const player = new Player();

/* ================= BULLET ================= */

class Bullet{
    constructor(x,y,dx,dy,damage){
        this.x=x; this.y=y;
        this.dx=dx; this.dy=dy;
        this.speed=600;
        this.r=4;
        this.damage=damage;
    }
    update(dt){
        this.x+=this.dx*this.speed*dt;
        this.y+=this.dy*this.speed*dt;
    }
    draw(){
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

let bullets=[];

/* ================= ZOMBIE TYPES ================= */

class Zombie{
    constructor(type="normal"){
        this.type=type;

        this.x=Math.random()<0.5?0:WIDTH;
        this.y=Math.random()*HEIGHT;

        if(type==="fast"){
            this.speed=180;
            this.maxHp=500;
            this.color="orange";
        }else if(type==="tank"){
            this.speed=60;
            this.maxHp=5000;
            this.color="purple";
        }else if(type==="boss"){
            this.speed=40;
            this.maxHp=20000;
            this.color="red";
        }else{
            this.speed=100;
            this.maxHp=250;
            this.color="green";
        }

        this.maxHp *= Math.pow(2,wave-1);
        this.hp=this.maxHp;
        this.r=18;
    }

    update(dt){
        let angle=Math.atan2(player.y-this.y,player.x-this.x);
        this.x+=Math.cos(angle)*this.speed*dt;
        this.y+=Math.sin(angle)*this.speed*dt;

        if(Math.hypot(player.x-this.x,player.y-this.y)<player.r+this.r){
            let dmg=30*dt;
            if(player.riskMode) dmg*=1.1;
            player.hp-=dmg;
            if(player.hp<=0){
                triggerGameOver();
            }
        }
    }

    draw(){
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

let zombies=[];

/* ================= LEVEL UP ================= */

function levelUp(){
    paused=true;
    overlay.style.visibility="visible";
    overlay.innerHTML="<h1>LEVEL UP!</h1>";

    let upgrades=[
        {text:"+20 Hasar",apply:()=>player.damage+=20},
        {text:"+%20 Ateş Hızı",apply:()=>player.fireRate*=0.8},
        {text:"+30 Max HP",apply:()=>{player.maxHp+=30;player.hp+=30}},
        {text:"+%10 Kritik",apply:()=>player.critChance+=0.1},
        {text:"+2 Max Mermi",apply:()=>player.maxAmmo+=2}
    ];

    upgrades.sort(()=>0.5-Math.random());
    upgrades.slice(0,3).forEach(up=>{
        let btn=document.createElement("button");
        btn.textContent=up.text;
        btn.onclick=()=>{
            up.apply();
            upgradePanel.innerHTML+="<br>"+up.text;
            overlay.style.visibility="hidden";
            paused=false;
        };
        overlay.appendChild(btn);
    });
}

/* ================= GAME OVER ================= */

function triggerGameOver(){
    gameOver=true;
    overlay.style.visibility="visible";
    overlay.innerHTML="<h1>GAME OVER</h1>";
}

/* ================= WAVE SYSTEM ================= */

function nextWave(){
    wave++;
    zombiesToSpawn=10+wave*5;
    spawnDelay=Math.max(0.5,2-wave*0.1);

    if(wave%10===0){
        zombies.push(new Zombie("boss"));
    }
}

/* ================= LOOP ================= */

function update(timestamp){
    deltaTime=(timestamp-lastTime)/1000;
    lastTime=timestamp;

    if(!gameOver && !paused){

        player.update(deltaTime);

        spawnTimer-=deltaTime;
        if(spawnTimer<=0 && zombiesToSpawn>0){
            let rand=Math.random();
            if(rand<0.2) zombies.push(new Zombie("fast"));
            else if(rand<0.3) zombies.push(new Zombie("tank"));
            else zombies.push(new Zombie("normal"));

            zombiesToSpawn--;
            spawnTimer=spawnDelay;
        }

        if(zombiesToSpawn<=0 && zombies.length===0){
            nextWave();
        }

        bullets.forEach((b,i)=>{
            b.update(deltaTime);
            if(b.x<0||b.x>WIDTH||b.y<0||b.y>HEIGHT){
                bullets.splice(i,1);
            }
        });

        zombies.forEach((z,zi)=>{
            z.update(deltaTime);
            bullets.forEach((b,bi)=>{
                if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){
                    z.hp-=b.damage;
                    bullets.splice(bi,1);
                    if(z.hp<=0){
                        hitSound.currentTime=0;
                        hitSound.play();
                        player.gainXP(40);
                        zombies.splice(zi,1);
                    }
                }
            });
        });
    }

    draw();
    requestAnimationFrame(update);
}

function draw(){

    ctx.clearRect(0,0,WIDTH,HEIGHT);

    /* TÜRK BAYRAĞI */
    ctx.save();
    ctx.globalAlpha=0.07;
    ctx.fillStyle="red";
    ctx.fillRect(0,0,WIDTH,HEIGHT);
    ctx.restore();

    bullets.forEach(b=>b.draw());
    zombies.forEach(z=>z.draw());
    player.draw();

    ctx.fillStyle="white";
    ctx.fillText("Wave: "+wave,550,30);
    ctx.fillText("Level: "+player.level,20,20);
    ctx.fillText("Ammo: "+player.ammo,20,40);
}

requestAnimationFrame(update);

/* ================= INFO BUTTON ================= */

document.getElementById("infoBtn").onclick=function(){
    paused=true;
    overlay.style.visibility="visible";
    overlay.innerHTML="<h2>Oyun Bilgisi</h2>WASD ile hareket<br>Mouse ile ateş<br>Wave ilerledikçe zorlaşır<br>3 Perk seçebilirsin<br><br><button onclick='overlay.style.visibility=\"hidden\";paused=false;'>Kapat</button>";
};

</script>
</body>
</html>
