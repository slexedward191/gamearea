<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE LAST PROTOCOL: NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --void: #0a0a12; --danger: #ff004c; --gold: #ffcc00; }
        body { margin: 0; overflow: hidden; background: var(--void); font-family: 'JetBrains Mono', monospace; color: #fff; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }

        /* --- PROFESSIONAL UI LAYER --- */
        #ui-root { position: absolute; inset: 0; pointer-events: none; padding: 25px; }
        
        /* Health & XP */
        .bars { width: 350px; }
        .bar-container { height: 10px; background: rgba(0,0,0,0.7); border: 1px solid #333; margin-top: 8px; border-radius: 10px; overflow: hidden; position: relative; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, var(--danger), #ff5e00); transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon), #7d00ff); transition: 0.4s; }
        
        /* Stats Dashboard */
        #dashboard { position: absolute; bottom: 25px; left: 25px; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); padding: 15px; border-radius: 8px; font-size: 12px; min-width: 200px; backdrop-filter: blur(5px); }
        .stat-item { display: flex; justify-content: space-between; margin: 4px 0; color: #aaa; }
        .stat-item span { color: var(--neon); font-weight: 800; }

        /* Level Up Screen */
        #level-screen { position: fixed; inset: 0; background: rgba(5,5,10,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: all; }
        .upgrade-grid { display: flex; gap: 20px; }
        .card { width: 260px; height: 380px; background: #161625; border: 2px solid #2a2a40; border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-15px); border-color: var(--neon); box-shadow: 0 0 40px rgba(0,242,255,0.2); }
        .card h3 { color: var(--neon); font-size: 18px; margin-bottom: 20px; }
        .card p { color: #888; font-size: 13px; line-height: 1.6; }
        .rarity { font-size: 10px; padding: 3px 8px; background: #333; border-radius: 4px; position: absolute; top: 15px; right: 15px; }

        /* Notifications */
        #alert { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 60px; font-weight: 800; color: var(--danger); text-shadow: 0 0 20px var(--danger); display: none; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="ui-root">
    <div class="bars">
        <div style="font-size: 12px; letter-spacing: 2px;">PILOT_INTEGRITY</div>
        <div class="bar-container"><div id="hp-bar"></div></div>
        <div style="font-size: 12px; letter-spacing: 2px; margin-top: 15px;">DATA_SYNC (LVL <span id="lvl-txt">1</span>)</div>
        <div class="bar-container"><div id="xp-bar"></div></div>
    </div>

    <div id="dashboard">
        <div class="stat-item">HASAR: <span id="st-dmg">45</span></div>
        <div class="stat-item">ATIS_HIZI: <span id="st-rate">0.3s</span></div>
        <div class="stat-item">KRITIK: <span id="st-crit">%8</span></div>
        <div class="stat-item">MERMI_SAYISI: <span id="st-proj">1</span></div>
        <div class="stat-item">HAREKET: <span id="st-spd">1.0x</span></div>
    </div>

    <div style="position: absolute; top: 25px; right: 25px; text-align: right;">
        <div id="score-txt" style="font-size: 48px; font-weight: 800; color: var(--neon);">0000</div>
        <div style="font-size: 10px; color: #444;">IMHA_EDILEN_VERI</div>
    </div>
</div>

<div id="alert">BOSS DETECTED</div>

<div id="level-screen">
    <h1 style="letter-spacing: 12px; margin-bottom: 40px;">SISTEM_GUNCELLEMESI</h1>
    <div class="upgrade-grid" id="upgrade-options"></div>
</div>

<canvas id="game"></canvas>

<script>
/** * PROFESSIONAL SURVIVOR ENGINE CORE
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- GAME STATE & CONFIG ---
const Game = {
    active: true, paused: false, frame: 0,
    camera: { x: 0, y: 0 },
    player: null,
    enemies: [], bullets: [], particles: [], gems: [],
    wave: 1, score: 0, shake: 0,
    keys: {}, mouse: { x: 0, y: 0, down: false }
};

class Player {
    constructor() {
        this.x = 0; this.y = 0; // World Coordinates
        this.r = 20; this.hp = 100; this.maxHp = 100;
        this.lvl = 1; this.xp = 0; this.nextXp = 100;
        this.stats = { dmg: 45, rate: 350, spd: 4.8, crit: 0.08, proj: 1, range: 600 };
        this.lastFire = 0;
    }

    update() {
        // Smooth Movement
        let mx = 0, my = 0;
        if(Game.keys['w']) my -= this.stats.spd;
        if(Game.keys['s']) my += this.stats.spd;
        if(Game.keys['a']) mx -= this.stats.spd;
        if(Game.keys['d']) mx += this.stats.spd;
        
        this.x += mx; this.y += my;
        
        // Weapon Logic
        if(Game.mouse.down) this.shoot();
        this.draw();
    }

    draw() {
        const screenX = canvas.width/2;
        const screenY = canvas.height/2;
        const angle = Math.atan2(Game.mouse.y - screenY, Game.mouse.x - screenX);

        // Player Shadow/Glow
        ctx.save();
        ctx.translate(screenX, screenY);
        ctx.rotate(angle);
        
        // Neon Body
        ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(18, 0); ctx.lineTo(-12, -14); ctx.lineTo(-12, 14); ctx.closePath();
        ctx.stroke();
        
        // Engine Core
        ctx.fillStyle = '#ff00ff';
        ctx.fillRect(-16, -4, 4, 8);
        ctx.restore();
    }

    shoot() {
        const now = Date.now();
        if(now - this.lastFire > this.stats.rate) {
            const screenX = canvas.width/2;
            const screenY = canvas.height/2;
            const angle = Math.atan2(Game.mouse.y - screenY, Game.mouse.x - screenX);
            
            for(let i=0; i<this.stats.proj; i++) {
                const spread = (i - (this.stats.proj-1)/2) * 0.15;
                const isCrit = Math.random() < this.stats.crit;
                const dmg = isCrit ? this.stats.dmg * 2.5 : this.stats.dmg;
                Game.bullets.push(new Bullet(this.x, this.y, angle + spread, dmg, isCrit));
            }
            this.lastFire = now;
            Game.shake = 6;
        }
    }
}

class Enemy {
    constructor(isBoss = false) {
        this.isBoss = isBoss;
        const angle = Math.random() * Math.PI * 2;
        const dist = canvas.width;
        this.x = Game.player.x + Math.cos(angle) * dist;
        this.y = Game.player.y + Math.sin(angle) * dist;
        
        this.r = isBoss ? 60 : 22;
        this.hp = (isBoss ? 2500 : 60) * (1 + Game.wave * 0.4);
        this.maxHp = this.hp;
        this.speed = isBoss ? 1.6 : 2 + Math.random() + (Game.wave * 0.1);
        this.color = isBoss ? '#ff004c' : '#76ff03';
    }

    update() {
        const angle = Math.atan2(Game.player.y - this.y, Game.player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;

        const screenX = this.x - Game.player.x + canvas.width/2;
        const screenY = this.y - Game.player.y + canvas.height/2;

        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color;
        ctx.fillStyle = '#111';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(screenX, screenY, this.r, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        
        // HP Bar
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(screenX - this.r, screenY - this.r - 15, this.r*2, 6);
        ctx.fillStyle = '#ff004c';
        ctx.fillRect(screenX - this.r, screenY - this.r - 15, (this.r*2) * (this.hp/this.maxHp), 6);
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, ang, dmg, crit) {
        this.x = x; this.y = y;
        this.vx = Math.cos(ang) * 16;
        this.vy = Math.sin(ang) * 16;
        this.dmg = dmg; this.crit = crit;
        this.life = 100;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life--;
        const sx = this.x - Game.player.x + canvas.width/2;
        const sy = this.y - Game.player.y + canvas.height/2;
        
        ctx.fillStyle = this.crit ? '#ff00ff' : '#00f2ff';
        ctx.shadowBlur = this.crit ? 15 : 0;
        ctx.beginPath(); ctx.arc(sx, sy, this.crit ? 7 : 4, 0, Math.PI*2); ctx.fill();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random()-0.5)*12;
        this.vy = (Math.random()-0.5)*12;
        this.alpha = 1;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.alpha -= 0.02;
        const sx = this.x - Game.player.x + canvas.width/2;
        const sy = this.y - Game.player.y + canvas.height/2;
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(sx, sy, 3, 3);
        ctx.globalAlpha = 1;
    }
}

/**
 * CORE SYSTEMS
 */

function spawnWave() {
    const count = 5 + (Game.wave * 4);
    for(let i=0; i<count; i++) {
        setTimeout(() => {
            if(!Game.paused) Game.enemies.push(new Enemy());
        }, i * 400);
    }
    if(Game.wave % 5 === 0) {
        document.getElementById('alert').style.display = 'block';
        setTimeout(() => {
            Game.enemies.push(new Enemy(true));
            document.getElementById('alert').style.display = 'none';
        }, 3000);
    }
}

function showUpgrade() {
    Game.paused = true;
    const screen = document.getElementById('level-screen');
    const container = document.getElementById('upgrade-options');
    screen.style.display = 'flex';
    container.innerHTML = '';

    const upgrades = [
        { t: "HYPER-THREADING", d: "Mermi sayısını +1 artırır.", f: () => Game.player.stats.proj++ },
        { t: "OVERCLOCK", d: "Ateş hızını %30 artırır.", f: () => Game.player.stats.rate *= 0.7 },
        { t: "CORE REPAIR", d: "Maksimum canı +50 artırır.", f: () => { Game.player.maxHp += 50; Game.player.hp = Game.player.maxHp; }},
        { t: "CRITICAL RUNTIME", d: "Kritik vuruş şansını %15 artırır.", f: () => Game.player.stats.crit += 0.15 },
        { t: "TURBO-DRIVE", d: "Hareket hızını %20 artırır.", f: () => Game.player.stats.spd *= 1.2 }
    ];

    upgrades.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(upg => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="rarity">LEGENDARY</div><h3>${upg.t}</h3><p>${upg.d}</p>`;
        card.onclick = () => {
            upg.f(); Game.paused = false; screen.style.display = 'none'; updateDashboard();
        };
        container.appendChild(card);
    });
}

function updateDashboard() {
    const p = Game.player;
    document.getElementById('st-dmg').innerText = p.stats.dmg.toFixed(0);
    document.getElementById('st-rate').innerText = (p.stats.rate/1000).toFixed(2) + 's';
    document.getElementById('st-crit').innerText = `%${(p.stats.crit * 100).toFixed(0)}`;
    document.getElementById('st-proj').innerText = p.stats.proj;
    document.getElementById('st-spd').innerText = (p.stats.spd / 4.8).toFixed(1) + 'x';
}

function loop() {
    if(!Game.paused) {
        // Render Background (Grid-Based Environment)
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw Grid Lines (Camera Relative)
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 1;
        const gridSize = 100;
        const offsetX = -Game.player.x % gridSize;
        const offsetY = -Game.player.y % gridSize;
        
        for(let x = offsetX; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for(let y = offsetY; y < canvas.height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        if(Game.shake > 0) {
            ctx.save();
            ctx.translate((Math.random()-0.5)*Game.shake, (Math.random()-0.5)*Game.shake);
            Game.shake *= 0.9;
        }

        Game.player.update();

        // Entity Processing
        Game.bullets.forEach((b, bi) => {
            b.update();
            if(b.life <= 0) Game.bullets.splice(bi, 1);
            
            Game.enemies.forEach((en, ei) => {
                const dist = Math.hypot(b.x - en.x, b.y - en.y);
                if(dist < en.r) {
                    en.hp -= b.dmg;
                    Game.bullets.splice(bi, 1);
                    for(let i=0; i<6; i++) Game.particles.push(new Particle(b.x, b.y, en.color));
                    
                    if(en.hp <= 0) {
                        Game.score += en.isBoss ? 1000 : 100;
                        Game.player.xp += en.isBoss ? 200 : 25;
                        Game.enemies.splice(ei, 1);
                        if(Game.player.xp >= Game.player.nextXp) {
                            Game.player.lvl++; Game.player.xp = 0; Game.player.nextXp *= 1.5;
                            showUpgrade();
                        }
                    }
                }
            });
        });

        Game.enemies.forEach((en, ei) => {
            en.update();
            const d = Math.hypot(en.x - Game.player.x, en.y - Game.player.y);
            if(d < en.r + Game.player.r) {
                Game.player.hp -= 0.4;
                Game.shake = 10;
                if(Game.player.hp <= 0) { alert("PROTOCOL TERMINATED. SCORE: " + Game.score); location.reload(); }
            }
        });

        Game.particles.forEach((p, i) => {
            p.update();
            if(p.alpha <= 0) Game.particles.splice(i, 1);
        });

        if(Game.enemies.length === 0 && !Game.paused) {
            Game.wave++; spawnWave();
        }

        // UI SYNC
        document.getElementById('hp-bar').style.width = (Game.player.hp / Game.player.maxHp * 100) + '%';
        document.getElementById('xp-bar').style.width = (Game.player.xp / Game.player.nextXp * 100) + '%';
        document.getElementById('score-txt').innerText = Game.score.toString().padStart(4, '0');
        document.getElementById('lvl-txt').innerText = Game.player.lvl;

        if(Game.shake > 0) ctx.restore();
    }
    Game.frame++;
    requestAnimationFrame(loop);
}

// Setup
window.onkeydown = e => Game.keys[e.key.toLowerCase()] = true;
window.onkeyup = e => Game.keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { Game.mouse.x = e.clientX; Game.mouse.y = e.clientY; };
window.onmousedown = () => Game.mouse.down = true;
window.onmouseup = () => Game.mouse.down = false;

Game.player = new Player();
spawnWave();
loop();
</script>
</body>
</html>
