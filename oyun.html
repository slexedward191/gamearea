<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arena Zombi v5.0</title>
<style>
body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    color:white;
}
canvas{
    background:#181818;
    border:4px solid #333;
}
#overlay{
    position:absolute;
    width:1200px;
    height:700px;
    background:rgba(0,0,0,0.92);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}
button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}
#upgradePanel{
    position:absolute;
    bottom:10px;
    left:10px;
    width:260px;
    background:rgba(0,0,0,0.7);
    padding:10px;
}
#statsPanel{
    position:absolute;
    bottom:10px;
    right:10px;
    width:260px;
    background:rgba(0,0,0,0.7);
    padding:10px;
}
</style>
</head>
<body>

<canvas id="game" width="1200" height="700"></canvas>
<div id="overlay"></div>
<div id="upgradePanel"></div>
<div id="statsPanel"></div>

<script>

/* ================= CORE ================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const upgradePanel = document.getElementById("upgradePanel");
const statsPanel = document.getElementById("statsPanel");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let lastTime=0, deltaTime=0;
let gameStarted=false;
let gameOver=false;
let paused=true;

/* ================= START SCREEN ================= */

overlay.innerHTML = `
<h1>ARENA ZOMBİ</h1>
<p>WASD ile hareket</p>
<p>Mouse ile ateş</p>
<p>Her level atladığında güç seçersin</p>
<p>Her 5 wave'de BOSS gelir</p>
<button onclick="startGame()">BAŞLA</button>
`;

function startGame(){
    overlay.style.display="none";
    paused=false;
    gameStarted=true;
}

/* ================= INPUT ================= */

let keys={};
let mouse={x:0,y:0};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove",e=>{
    const rect=canvas.getBoundingClientRect();
    mouse.x=e.clientX-rect.left;
    mouse.y=e.clientY-rect.top;
});

/* ================= PLAYER ================= */

class Player{
constructor(){
this.reset();
}

reset(){
this.x=WIDTH/2;
this.y=HEIGHT/2;
this.r=16;
this.speed=230;
this.maxHp=100;
this.hp=100;
this.hearts=5;
this.maxAmmo=30;
this.ammo=30;
this.damage=20;
this.fireRate=0.25;
this.fireTimer=0;
this.level=1;
this.xp=0;
this.xpNeeded=100;
this.upgrades=[];
}

update(dt){
let vx=0,vy=0;
if(keys["w"])vy-=1;
if(keys["s"])vy+=1;
if(keys["a"])vx-=1;
if(keys["d"])vx+=1;
let len=Math.hypot(vx,vy);
if(len>0){vx/=len;vy/=len;}
this.x+=vx*this.speed*dt;
this.y+=vy*this.speed*dt;
this.x=Math.max(this.r,Math.min(WIDTH-this.r,this.x));
this.y=Math.max(this.r,Math.min(HEIGHT-this.r,this.y));

this.fireTimer-=dt;
if(this.fireTimer<=0){
this.shoot();
this.fireTimer=this.fireRate;
}
}

shoot(){
this.ammo--;
let angle=Math.atan2(mouse.y-this.y,mouse.x-this.x);
bullets.push(new Bullet(this.x,this.y,Math.cos(angle),Math.sin(angle),this.damage));
}

gainXP(amount){
this.xp+=amount;
if(this.xp>=this.xpNeeded){
this.level++;
this.xp=0;
this.xpNeeded+=80;
showUpgradeMenu();
}
}

draw(){
ctx.fillStyle="#3498db";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}

const player=new Player();

/* ================= BULLET ================= */

class Bullet{
constructor(x,y,dx,dy,damage){
this.x=x;this.y=y;
this.dx=dx;this.dy=dy;
this.speed=600;
this.r=4;
this.damage=damage;
}
update(dt){
this.x+=this.dx*this.speed*dt;
this.y+=this.dy*this.speed*dt;
}
draw(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}

let bullets=[];

/* ================= ENEMY ================= */

class Zombie{
constructor(isBoss=false){
this.isBoss=isBoss;
this.r=isBoss?45:18;
this.speed=isBoss?80:100+wave*10;
this.maxHp=isBoss?2000:200+wave*50;
this.hp=this.maxHp;
this.x=Math.random()<0.5?0:WIDTH;
this.y=Math.random()*HEIGHT;
}

update(dt){
let angle=Math.atan2(player.y-this.y,player.x-this.x);
this.x+=Math.cos(angle)*this.speed*dt;
this.y+=Math.sin(angle)*this.speed*dt;

if(Math.hypot(player.x-this.x,player.y-this.y)<player.r+this.r){
player.hp-=40*dt;
if(player.hp<=0)loseHeart();
}
}

draw(){
ctx.fillStyle=this.isBoss?"purple":"green";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}

let zombies=[];

/* ================= HEART SYSTEM ================= */

function loseHeart(){
player.hearts--;
player.hp=player.maxHp;
if(player.hearts<=0)triggerGameOver();
}

/* ================= WAVE ================= */

let wave=1;
let zombiesToSpawn=10;
let spawnTimer=0;

function nextWave(){
wave++;
zombiesToSpawn=10+wave*5;
if(wave%5===0){
zombies.push(new Zombie(true));
}
}

/* ================= UPGRADE MENU ================= */

function showUpgradeMenu(){
paused=true;
overlay.style.display="flex";
overlay.innerHTML="<h1>GÜÇ SEÇ</h1>";

let upgrades=[
{text:"+10 Hasar",apply:()=>player.damage+=10},
{text:"Ateş Hızı Artır",apply:()=>player.fireRate*=0.85},
{text:"+1 Kalp",apply:()=>player.hearts++},
{text:"+20 Max HP",apply:()=>player.maxHp+=20}
];

upgrades.sort(()=>0.5-Math.random());
upgrades.slice(0,3).forEach(u=>{
let btn=document.createElement("button");
btn.textContent=u.text;
btn.onclick=()=>{
u.apply();
player.upgrades.push(u.text);
overlay.style.display="none";
paused=false;
};
overlay.appendChild(btn);
});
}

/* ================= GAME OVER ================= */

function triggerGameOver(){
gameOver=true;
paused=true;
overlay.style.display="flex";
overlay.innerHTML="<h1>OYUN BİTTİ</h1><button onclick='restartGame()'>Yeniden Başla</button>";
}

function restartGame(){
player.reset();
wave=1;
zombies=[];
bullets=[];
zombiesToSpawn=10;
spawnTimer=0;
gameOver=false;
paused=false;
overlay.style.display="none";
}

/* ================= LOOP ================= */

function update(timestamp){
deltaTime=(timestamp-lastTime)/1000;
lastTime=timestamp;

if(!paused && gameStarted){

player.update(deltaTime);

spawnTimer-=deltaTime;
if(spawnTimer<=0 && zombiesToSpawn>0){
zombies.push(new Zombie());
zombiesToSpawn--;
spawnTimer=1.5;
}

if(zombiesToSpawn<=0 && zombies.length===0){
nextWave();
}

bullets.forEach((b,bi)=>{
b.update(deltaTime);
zombies.forEach((z,zi)=>{
if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){
z.hp-=b.damage;
bullets.splice(bi,1);
if(z.hp<=0){
player.gainXP(z.isBoss?300:40);
zombies.splice(zi,1);
}
}
});
});
}

draw();
requestAnimationFrame(update);
}

function draw(){
ctx.clearRect(0,0,WIDTH,HEIGHT);
bullets.forEach(b=>b.draw());
zombies.forEach(z=>z.draw());
player.draw();

/* Hearts */
ctx.fillStyle="red";
for(let i=0;i<player.hearts;i++){
ctx.fillRect(10+i*25,10,20,20);
}

/* XP */
ctx.fillStyle="purple";
ctx.fillRect(200,660,800*(player.xp/player.xpNeeded),20);

/* Wave */
ctx.fillStyle="white";
ctx.fillText("Wave: "+wave,550,30);

/* Panels */
upgradePanel.innerHTML="<b>Güçler:</b><br>"+player.upgrades.join("<br>");
statsPanel.innerHTML=`
<b>İstatistik</b><br>
Hasar: ${player.damage}<br>
Ateş Hızı: ${(1/player.fireRate).toFixed(1)}<br>
Max HP: ${player.maxHp}<br>
Kalp: ${player.hearts}
`;
}

requestAnimationFrame(update);

</script>
</body>
</html>
