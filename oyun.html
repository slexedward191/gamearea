<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dragon Lordz: Pantheon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --gem: #00d2ff; --bg: #05070a; --panel: #1a1d23; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Dashboard */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #top-stats { 
            height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: center; gap: 50px; align-items: center; pointer-events: auto;
        }
        .stat { font-family: 'Cinzel'; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px rgba(241,196,15,0.5); }

        /* City View */
        #city-view { 
            width: 100vw; height: 100vh; background: radial-gradient(circle, #1e3a22 0%, #05070a 100%);
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 100px;
            overflow-y: auto; gap: 20px;
        }
        .habitat {
            width: 220px; height: 260px; background: var(--panel); border: 2px solid #34495e;
            border-radius: 20px; display: flex; flex-direction: column; align-items: center;
            padding: 15px; position: relative; transition: 0.3s; pointer-events: auto;
        }
        .habitat:hover { border-color: var(--gold); transform: translateY(-5px); }
        .hab-icon { font-size: 60px; margin: 20px 0; }
        .bubble { 
            position: absolute; top: -20px; background: var(--gold); color: #000; 
            padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;
            animation: bounce 2s infinite;
        }

        /* Battle Overlay */
        #battle-screen { 
            position: absolute; inset: 0; background: #000; z-index: 1000; 
            display: none; flex-direction: column;
        }
        .arena-bg { 
            flex-grow: 1; display: flex; justify-content: space-around; align-items: center;
            background: linear-gradient(to bottom, #141e30, #243b55);
        }
        .fighter { width: 300px; text-align: center; }
        .hp-bar { width: 100%; height: 15px; background: #444; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: 0.3s; }

        /* Menu Panels */
        .side-menu {
            position: absolute; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto;
        }
        .menu-btn {
            width: 60px; height: 60px; background: var(--panel); border: 2px solid var(--gold);
            border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 25px; transition: 0.3s;
        }
        .menu-btn:hover { background: var(--gold); }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="top-stats">
        <div class="stat">💰 ALTIN: <span id="gold">1000</span></div>
        <div class="stat" style="color:var(--gem)">💎 ELMAS: <span id="gems">50</span></div>
        <div class="stat" style="color:#ff4757">🥩 YEMEK: <span id="food">20</span></div>
    </div>

    <div class="side-menu">
        <div class="menu-btn" onclick="game.openMarket()">🛒</div>
        <div class="menu-btn" onclick="game.openCollection()">🐉</div>
        <div class="menu-btn" onclick="battle.init()">⚔️</div>
    </div>
</div>

<div id="city-view">
    </div>

<div id="battle-screen">
    <div class="arena-bg">
        <div class="fighter" id="player-f">
            <h2 id="p-name">Dragon</h2>
            <div class="hp-bar"><div id="p-hp" class="hp-fill"></div></div>
            <div id="p-sprite" style="font-size: 150px;">🔥</div>
        </div>
        <div style="font-family: 'Cinzel'; font-size: 60px; color: var(--gold);">VS</div>
        <div class="fighter" id="bot-f">
            <h2 id="b-name">Vahşi Titan</h2>
            <div class="hp-bar"><div id="b-hp" class="hp-fill"></div></div>
            <div id="b-sprite" style="font-size: 150px;">💀</div>
        </div>
    </div>
    <div id="battle-actions" style="height: 150px; background: #111; display: flex; justify-content: center; align-items: center; gap: 20px;">
        <button onclick="battle.attack(1.0)" style="padding: 15px 40px; background: var(--gold); border: none; font-weight: bold; cursor: pointer;">SALDIR</button>
        <button onclick="battle.attack(1.8)" style="padding: 15px 40px; background: #e74c3c; border: none; color: white; font-weight: bold; cursor: pointer;">KRİTİK NEFES</button>
    </div>
</div>

<script>
/**
 * DRAGON LORDZ PANTHEON ENGINE
 * ----------------------------
 * Game State, Economy, and Battle Logic
 */

const game = {
    gold: 1000, gems: 50, food: 20,
    dragons: [{ id: 1, name: "İlksel Ejder", type: "fire", lvl: 1, atk: 20, hp: 150, sprite: "🐲" }],
    habitats: [],
    
    init() {
        this.load();
        this.updateUI();
        this.startIncomeTimer();
        this.renderHabitats();
    },

    updateUI() {
        document.getElementById('gold').innerText = Math.floor(this.gold);
        document.getElementById('gems').innerText = this.gems;
        document.getElementById('food').innerText = this.food;
    },

    // Idle Gelir Sistemi
    startIncomeTimer() {
        setInterval(() => {
            this.habitats.forEach(h => {
                if(h.produced < 100) h.produced += 1;
            });
            this.renderHabitats();
        }, 3000);
    },

    renderHabitats() {
        const view = document.getElementById('city-view');
        view.innerHTML = "";
        
        // Habitat Satın Alma Kartı
        view.innerHTML += `
            <div class="habitat" onclick="game.buyHabitat()" style="border-style: dashed; cursor: pointer;">
                <div class="hab-icon">➕</div>
                <h3>HABİTAT KUR</h3>
                <p>500 Altın</p>
            </div>
        `;

        this.habitats.forEach((h, index) => {
            view.innerHTML += `
                <div class="habitat">
                    ${h.produced >= 10 ? `<div class="bubble" onclick="game.collect(${index})">💰 ${h.produced}</div>` : ''}
                    <div class="hab-icon">🌋</div>
                    <h3>${h.name}</h3>
                    <p>Gelir: 1/3s</p>
                </div>
            `;
        });
    },

    buyHabitat() {
        if(this.gold >= 500) {
            this.gold -= 500;
            this.habitats.push({ name: "Ateş İni", produced: 0 });
            this.updateUI();
            this.renderHabitats();
        }
    },

    collect(index) {
        this.gold += this.habitats[index].produced;
        this.habitats[index].produced = 0;
        this.updateUI();
        this.renderHabitats();
    },

    save() {
        const data = { gold: this.gold, gems: this.gems, food: this.food, habitats: this.habitats, dragons: this.dragons };
        localStorage.setItem('pantheon_save', JSON.stringify(data));
    },

    load() {
        const saved = localStorage.getItem('pantheon_save');
        if(saved) {
            const d = JSON.parse(saved);
            this.gold = d.gold; this.gems = d.gems; this.food = d.food;
            this.habitats = d.habitats; this.dragons = d.dragons;
        }
    }
};

const battle = {
    p_hp: 0, b_hp: 0, active: false,
    
    init() {
        const playerD = game.dragons[0];
        this.p_hp = playerD.hp;
        this.b_hp = 100 + (playerD.lvl * 50);
        
        document.getElementById('battle-screen').style.display = 'flex';
        document.getElementById('p-name').innerText = playerD.name;
        document.getElementById('p-sprite').innerText = playerD.sprite;
        this.active = true;
        this.update();
    },

    update() {
        document.getElementById('p-hp').style.width = (this.p_hp / game.dragons[0].hp * 100) + "%";
        document.getElementById('b-hp').style.width = (this.b_hp / (100 + game.dragons[0].lvl * 50) * 100) + "%";
    },

    attack(mult) {
        if(!this.active) return;
        
        // Oyuncu Hamlesi
        let dmg = game.dragons[0].atk * mult;
        this.b_hp -= dmg;
        this.update();

        if(this.b_hp <= 0) {
            alert("Zafer! 300 Altın kazandın.");
            game.gold += 300;
            this.end();
            return;
        }

        // Bot Hamlesi
        this.active = false;
        setTimeout(() => {
            this.p_hp -= 15 + (game.dragons[0].lvl * 2);
            this.update();
            if(this.p_hp <= 0) {
                alert("Yenildin...");
                this.end();
            } else {
                this.active = true;
            }
        }, 600);
    },

    end() {
        document.getElementById('battle-screen').style.display = 'none';
        game.updateUI();
        game.save();
    }
};

window.onload = () => game.init();
</script>
</body>
</html>
